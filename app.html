// ── T8: EXPORT PHOTO COMPRESSION ─────────────────────────────────────
// Shrinks photos inside exports only. Stored data on-device is never
// modified. Originals stay full-resolution in IndexedDB. Applied to
// both backupData() (plain JSON download) and shareCollection() (packet).
//
// Photo shape is a data URI (data:image/...;base64,...). Non-data-URI
// values (empty, URL, malformed) pass through untouched.
//
// Settings:
//   Baseline: 1600px long edge, JPEG quality 0.85
//   Hard cap: retry at 0.75 -> 0.60 -> 1200px/0.60 if output > 500 KB
//   Size guard: if compressed output >= original, return original
// ─────────────────────────────────────────────────────────────────────

var _T8_BASELINE_EDGE = 1600;
var _T8_BASELINE_QUALITY = 0.85;
var _T8_PER_PHOTO_CAP_KB = 500;

// Rough estimate of total photo bytes in a guns[] array (pre-compression).
// Base64 payload size ~ string.length * 0.75.
function _photoBytesRoughEstimate(gs){
  var total = 0;
  for(var i = 0; i < gs.length; i++){
    var g = gs[i];
    if(g.photos && g.photos.length){
      for(var j = 0; j < g.photos.length; j++){
        if(typeof g.photos[j] === 'string') total += g.photos[j].length * 0.75;
      }
    }
    if(g.photo && typeof g.photo === 'string') total += g.photo.length * 0.75;
  }
  return total;
}

// Count total photos across a guns[] array (photos[] + legacy .photo).
function _countPhotos(gs){
  var n = 0;
  for(var i = 0; i < gs.length; i++){
    var g = gs[i];
    if(g.photos && g.photos.length) n += g.photos.length;
    if(g.photo) n += 1;
  }
  return n;
}

// 2026-04-25-D: Capture-time alias for the export compressor. Photos are
// now compressed at capture time (onPhoto, onSch, handleRangePhotos)
// instead of only at export — fixes IndexedDB bloat and sluggish detail
// rendering. Export-time compression is retained as defense-in-depth.
// The underlying logic is identical for both use cases.
function _compressPhotoForStorage(dataUri){
  return _compressPhotoForExport(dataUri);
}

// Core compressor. Returns Promise<string>.
// Non-data-URI inputs, tiny photos, and decode failures pass through unchanged.
function _compressPhotoForExport(dataUri){
  return new Promise(function(resolve){
    if(!dataUri || typeof dataUri !== 'string') return resolve(dataUri || '');
    if(dataUri.indexOf('data:') !== 0) return resolve(dataUri);
    // Fast-path: skip anything already small (~<50 KB raw)
    if(dataUri.length < 70000) return resolve(dataUri);

    var img = new Image();
    var settled = false;
    var tm = setTimeout(function(){
      if(settled) return;
      settled = true; resolve(dataUri);
    }, 10000);

    img.onload = function(){
      if(settled) return;
      settled = true; clearTimeout(tm);
      _compressAttempt(img, dataUri, _T8_BASELINE_EDGE, _T8_BASELINE_QUALITY, 0, resolve);
    };
    img.onerror = function(){
      if(settled) return;
      settled = true; clearTimeout(tm);
      resolve(dataUri);
    };
    img.src = dataUri;
  });
}

// Single compression attempt with retry ladder for oversized outputs.
function _compressAttempt(img, originalDataUri, maxEdge, quality, attemptIdx, resolve){
  var w = img.naturalWidth, h = img.naturalHeight;
  if(!w || !h) return resolve(originalDataUri);

  var scale = Math.min(1, maxEdge / Math.max(w, h));
  var tw = Math.max(1, Math.round(w * scale));
  var th = Math.max(1, Math.round(h * scale));

  var canvas = document.createElement('canvas');
  canvas.width = tw;
  canvas.height = th;
  var ctx = canvas.getContext('2d');
  if(!ctx) return resolve(originalDataUri);

  // White fill — JPEG has no alpha, transparent sources shouldn't go black.
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, tw, th);
  ctx.drawImage(img, 0, 0, tw, th);

  var output;
  try{ output = canvas.toDataURL('image/jpeg', quality); }
  catch(e){ return resolve(originalDataUri); }

  // Sanity: output must be a valid JPEG data URI
  if(!output || output.indexOf('data:image/jpeg') !== 0) return resolve(originalDataUri);

  // Size guard: if didn't shrink, return original
  if(output.length >= originalDataUri.length) return resolve(originalDataUri);

  // Hard cap retry ladder (approx bytes from base64 length * 0.75)
  var approxKb = (output.length * 0.75) / 1024;
  if(approxKb > _T8_PER_PHOTO_CAP_KB && attemptIdx < 3){
    var nextEdge = maxEdge, nextQ = quality;
    if(attemptIdx === 0){ nextQ = 0.75; }
    else if(attemptIdx === 1){ nextQ = 0.60; }
    else if(attemptIdx === 2){ nextEdge = 1200; nextQ = 0.60; }
    return _compressAttempt(img, originalDataUri, nextEdge, nextQ, attemptIdx + 1, resolve);
  }

  resolve(output);
}

// Build a new guns[] array with compressed photos. Original is not mutated.
// onProgress(processed, total) is called after each photo.
// Returns Promise<{ guns, stats }>.
function _buildCompressedExportGuns(gs, onProgress){
  var total = _countPhotos(gs);
  var processed = 0;
  var stats = {
    photos_processed: 0,
    photos_compressed: 0,
    photos_passed_through: 0,
    photos_failed_decode: 0
  };

  function compressOne(uri){
    if(!uri || typeof uri !== 'string'){ return Promise.resolve(uri || ''); }
    var originalLen = uri.length;
    return _compressPhotoForExport(uri).then(function(result){
      stats.photos_processed++;
      if(!result || result === uri || result.length >= originalLen) stats.photos_passed_through++;
      else stats.photos_compressed++;
      processed++;
      if(onProgress){ try{ onProgress(processed, total); }catch(e){} }
      return result;
    }).catch(function(){
      stats.photos_processed++;
      stats.photos_failed_decode++;
      processed++;
      if(onProgress){ try{ onProgress(processed, total); }catch(e){} }
      return uri;
    });
  }

  // Serial processing helper (preserves order, bounded memory).
  function serial(items, fn){
    var out = [];
    var p = Promise.resolve();
    items.forEach(function(item){
      p = p.then(function(){ return fn(item).then(function(r){ out.push(r); }); });
    });
    return p.then(function(){ return out; });
  }

  var newGuns = [];
  var p = Promise.resolve();
  gs.forEach(function(g){
    p = p.then(function(){
      var newGun = Object.assign({}, g);
      var photosList = (g.photos && g.photos.length) ? g.photos : [];
      return serial(photosList, compressOne).then(function(np){
        if(photosList.length) newGun.photos = np;
        if(g.photo){
          return compressOne(g.photo).then(function(r){
            newGun.photo = r;
            newGuns.push(newGun);
          });
        } else {
          newGuns.push(newGun);
        }
      });
    });
  });

  return p.then(function(){ return { guns: newGuns, stats: stats }; });
}

// Strip photos (non-mutating). Used when Include Photos is unchecked.
function _stripPhotosFromGuns(gs){
  return gs.map(function(g){
    var ng = Object.assign({}, g);
    ng.photos = [];
    ng.photo = '';
    return ng;
  });
}

// Format byte count for display.
function _fmtBytes(n){
  if(!isFinite(n) || n < 0) return '0 B';
  if(n < 1024) return Math.round(n) + ' B';
  if(n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/(1024*1024)).toFixed(1) + ' MB';
}

// Build the export_meta block attached to exported JSON.
function _buildExportMeta(stats, includePhotos){
  return {
    schema_v: 1,
    compression: {
      applied: !!includePhotos,
      max_edge_px: _T8_BASELINE_EDGE,
      quality_baseline: _T8_BASELINE_QUALITY,
      per_photo_cap_kb: _T8_PER_PHOTO_CAP_KB,
      photos_processed: stats ? stats.photos_processed : 0,
      photos_compressed: stats ? stats.photos_compressed : 0,
      photos_passed_through: stats ? stats.photos_passed_through : 0,
      photos_failed_decode: stats ? stats.photos_failed_decode : 0
    }
  };
}

// ── BEGIN T9 EXPORT FILTER HELPERS ───────────────────────────────────
// T9: Selective Export by Filter.
// Lets users export a meaningful subset of their collection by filtering
// on Type, Caliber, Make, Condition (≥ threshold), Working (tri-state),
// and Starred. Filtered subset flows through the T8 compression pipeline
// unchanged — T9 only adds a filter step before it runs.
// ─────────────────────────────────────────────────────────────────────

// Ordered condition scale (best → worst). Used for threshold filtering.
var _T9_CONDITION_ORDER = ['Excellent','Good','Fair','Poor','Needs Repair'];

// Returns sorted, deduplicated, non-empty string values for a given field.
// Used to populate filter dropdowns from actual inventory (not canonical lists).
function _T9_distinctValues(gs, field){
  var seen = {};
  var out = [];
  for(var i=0; i<gs.length; i++){
    var v = gs[i] ? gs[i][field] : null;
    if(v === null || v === undefined) continue;
    v = String(v).trim();
    if(!v) continue;
    if(!seen[v]){ seen[v] = true; out.push(v); }
  }
  out.sort(function(a,b){ return a.localeCompare(b); });
  return out;
}

// Apply a filter state to a guns[] array. Returns a filtered subset.
// state shape: { type, caliber, make, condition, working, starred }
//   - type/caliber/make: empty string = no filter, else exact match
//   - condition: empty = no filter, else threshold ("X or better")
//   - working: '' = no filter, 'yes' = only working, 'no' = only non-working
//   - starred: false = no filter, true = only starred
// Non-mutating; returns a new array.
function _T9_filterGuns(gs, state){
  if(!Array.isArray(gs)) return [];
  state = state || {};
  var condIdx = state.condition ? _T9_CONDITION_ORDER.indexOf(state.condition) : -1;
  var out = [];
  for(var i=0; i<gs.length; i++){
    var g = gs[i];
    if(!g) continue;
    if(state.type && String(g.type||'').trim() !== state.type) continue;
    if(state.caliber && String(g.caliber||'').trim() !== state.caliber) continue;
    if(state.make && String(g.make||'').trim() !== state.make) continue;
    if(condIdx >= 0){
      var gIdx = _T9_CONDITION_ORDER.indexOf(String(g.condition||'').trim());
      // CONDITION_ORDER is best-to-worst, so gIdx <= condIdx means
      // "at least as good as the threshold". Unknown conditions excluded.
      if(gIdx < 0 || gIdx > condIdx) continue;
    }
    if(state.working === 'yes' && !g.working) continue;
    if(state.working === 'no' && g.working) continue;
    if(state.starred && !g.starred) continue;
    out.push(g);
  }
  return out;
}

// Determine which filter controls to surface based on inventory diversity.
// A dropdown with only 0 or 1 real value is dead UI — we hide it.
function _T9_getFilterOptions(gs){
  gs = Array.isArray(gs) ? gs : [];
  var conditionsPresent = _T9_distinctValues(gs, 'condition').filter(function(c){
    return _T9_CONDITION_ORDER.indexOf(c) >= 0;
  });
  var hasWorking = false, hasNonWorking = false, hasStarred = false;
  for(var i=0; i<gs.length; i++){
    if(gs[i] && gs[i].working) hasWorking = true;
    else if(gs[i]) hasNonWorking = true;
    if(gs[i] && gs[i].starred) hasStarred = true;
  }
  return {
    types: _T9_distinctValues(gs, 'type'),
    calibers: _T9_distinctValues(gs, 'caliber'),
    makes: _T9_distinctValues(gs, 'make'),
    conditionsPresent: conditionsPresent,
    hasWorking: hasWorking,
    hasNonWorking: hasNonWorking,
    hasStarred: hasStarred
  };
}

// Render the filter block HTML. Returns empty string if nothing worth filtering.
// DOM ids use the t9_ prefix. Event listeners wired in _T9_wireFilterListeners.
function _T9_renderFilterBlock(opts){
  var showType = opts.types.length >= 2;
  var showCaliber = opts.calibers.length >= 2;
  var showMake = opts.makes.length >= 2;
  var showCondition = opts.conditionsPresent.length >= 2;
  var showWorking = opts.hasWorking && opts.hasNonWorking;
  var showStarred = opts.hasStarred;

  if(!showType && !showCaliber && !showMake && !showCondition && !showWorking && !showStarred){
    return '';
  }

  var selectStyle = 'width:100%;background:#0f1218;border:1px solid #2e3545;color:#f0f2f5;padding:8px 10px;border-radius:6px;font-size:13px;font-family:inherit;margin-bottom:8px;appearance:none;-webkit-appearance:none;cursor:pointer';
  function renderSelect(id, label, items, allLabel){
    var h = '<label style="font-size:11px;color:#8a95a8;display:block;margin-bottom:3px">'+label+'</label>';
    h += '<select id="'+id+'" data-t9-filter="1" style="'+selectStyle+'">';
    h += '<option value="">'+allLabel+'</option>';
    for(var i=0; i<items.length; i++){
      h += '<option value="'+eh(items[i])+'">'+eh(items[i])+'</option>';
    }
    h += '</select>';
    return h;

// Read current filter state from DOM controls. Returns a state object.
function _T9_readFilterState(){
  function val(id){ var el = document.getElementById(id); return el ? el.value : ''; }
  function chk(id){ var el = document.getElementById(id); return el ? !!el.checked : false; }
  var working = '';
  var wYes = document.getElementById('t9_f_w_yes');
  var wNo = document.getElementById('t9_f_w_no');
  if(wYes && wYes.getAttribute('data-t9-active') === '1') working = 'yes';
  else if(wNo && wNo.getAttribute('data-t9-active') === '1') working = 'no';
  return {
    type: val('t9_f_type'),
    caliber: val('t9_f_caliber'),
    make: val('t9_f_make'),
    condition: val('t9_f_condition'),
    working: working,
    starred: chk('t9_f_starred')
  };
}

// Wire change listeners on all filter controls. onChange() fires on any change.
function _T9_wireFilterListeners(onChange){
  var controls = document.querySelectorAll('[data-t9-filter]');
  for(var i=0; i<controls.length; i++){
    controls[i].addEventListener('change', onChange);
  }
  var wAll = document.getElementById('t9_f_w_all');
  var wYes = document.getElementById('t9_f_w_yes');
  var wNo = document.getElementById('t9_f_w_no');
  if(wAll && wYes && wNo){
    var pillBase = 'flex:1;padding:8px 6px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:600';
    var pillIdle = pillBase+';background:#0f1218;border:1px solid #2e3545;color:#8a95a8';
    var pillOn = pillBase+';background:#e8c46a;border:1px solid #e8c46a;color:#1a1d24;font-weight:700';
    function setActive(active){
      [wAll, wYes, wNo].forEach(function(b){
        var isOn = b === active;
        b.setAttribute('data-t9-active', isOn ? '1' : '0');
        b.setAttribute('style', isOn ? pillOn : pillIdle);
      });
    }
    wAll.addEventListener('click', function(){ setActive(wAll); onChange(); });
    wYes.addEventListener('click', function(){ setActive(wYes); onChange(); });
    wNo.addEventListener('click', function(){ setActive(wNo); onChange(); });
  }
}

// T10: Saved Filter Presets.
// Store/recall filter combinations. Builds on top of T9 filter state.
// Storage: localStorage key below. Global across collections (workflow,
// not data). Tier-gating: none — soft cap at 25 to protect mobile UX.
// ─────────────────────────────────────────────────────────────────────

var _T10_STORAGE_KEY = 'arsenal_export_presets';
var _T10_PRESET_CAP = 25;

// Read presets from localStorage. Safe against corrupt data; returns [].
function _T10_loadPresets(){
  try {
    var raw = (typeof localStorage !== 'undefined') ? localStorage.getItem(_T10_STORAGE_KEY) : null;
    if(!raw) return [];
    var arr = JSON.parse(raw);
    if(!Array.isArray(arr)) return [];
    return arr.filter(function(p){
      return p && typeof p.id === 'string' && typeof p.name === 'string' && p.filters && typeof p.filters === 'object';
    });
  } catch(e) { return []; }
}

// Persist presets. Returns true on success, false on quota/serialize error.
function _T10_savePresetsToStorage(presets){
  try {
    if(typeof localStorage === 'undefined') return false;
    localStorage.setItem(_T10_STORAGE_KEY, JSON.stringify(presets));
    return true;
  } catch(e) { return false; }
}

function _T10_generatePresetId(){
  return 'p_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
}

// Returns true if at least one filter is actively applied in the state.
// Used to gate the Save button — empty presets are not savable.
function _T10_hasActiveFilters(state){
  if(!state) return false;
  return !!(state.type || state.caliber || state.make || state.condition
    || (state.working === 'yes' || state.working === 'no')
    || state.starred);
}

// Build a human-readable auto-suggested name from a filter state.
// Order: Caliber, Type, Make (most distinctive first), then modifiers.
// Capped at 30 chars. Returns 'Preset' for empty state.
function _T10_suggestPresetName(state){
  if(!state) return 'Preset';
  var parts = [];
  if(state.caliber) parts.push(state.caliber);
  if(state.type) parts.push(state.type);
  if(state.make) parts.push(state.make);
  var base = parts.join(' ');
  var mods = [];
  if(state.condition) mods.push(state.condition + '+');
  if(state.working === 'yes') mods.push('Working');
  if(state.working === 'no') mods.push('Non-working');
  if(state.starred) mods.push('Starred');
  var name = base;
  if(mods.length){
    name = name ? (name + ', ' + mods.join(', ')) : mods.join(', ');
  }
  if(!name) name = 'Preset';
  if(name.length > 30) name = name.substring(0, 27).replace(/\s+$/, '') + '...';
  return name;
}

// Inject filter state from a preset into the live DOM controls.
// Caller triggers refresh() afterward to update counts.
function _T10_applyPresetToControls(preset){
  if(!preset || !preset.filters) return;
  var f = preset.filters;
  function setVal(id, v){
    var el = document.getElementById(id);
    if(el) el.value = v || '';
  }
  function setChk(id, v){
    var el = document.getElementById(id);
    if(el) el.checked = !!v;
  }
  setVal('t9_f_type', f.type);
  setVal('t9_f_caliber', f.caliber);
  setVal('t9_f_make', f.make);
  setVal('t9_f_condition', f.condition);
  setChk('t9_f_starred', f.starred);

  // Working pills — simulate click to get styling + data attribute in sync
  var targetId = 't9_f_w_all';
  if(f.working === 'yes') targetId = 't9_f_w_yes';
  else if(f.working === 'no') targetId = 't9_f_w_no';
  var target = document.getElementById(targetId);
  if(target) target.click();
}

// Small tap-or-long-press helper. Works for touch and mouse.
// onShort/onLong are called with no args. Threshold: 600ms, 10px move.
function _T10_attachPressHandlers(el, onShort, onLong){
  var LONG_MS = 600;
  var MOVE_PX = 10;
  var timer = null;
  var longFired = false;
  var sx = 0, sy = 0;

  function start(x, y){
    longFired = false;
    sx = x; sy = y;
    if(timer) clearTimeout(timer);
    timer = setTimeout(function(){
      longFired = true;
      if(onLong) onLong();
    }, LONG_MS);
  }
  function move(x, y){
    if(Math.abs(x - sx) > MOVE_PX || Math.abs(y - sy) > MOVE_PX){
      if(timer){ clearTimeout(timer); timer = null; }
    }
  }
  function cancel(){
    if(timer){ clearTimeout(timer); timer = null; }
  }

  el.addEventListener('touchstart', function(e){
    if(e.touches && e.touches[0]) start(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});
  el.addEventListener('touchmove', function(e){
    if(e.touches && e.touches[0]) move(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});
  el.addEventListener('touchend', function(){ cancel(); });
  el.addEventListener('touchcancel', cancel);
  el.addEventListener('mousedown', function(e){ start(e.clientX, e.clientY); });
  el.addEventListener('mousemove', function(e){ move(e.clientX, e.clientY); });
  el.addEventListener('mouseup', function(){ cancel(); });
  el.addEventListener('mouseleave', cancel);

  el.addEventListener('click', function(e){
    if(longFired){
      e.preventDefault();
      e.stopPropagation();
      longFired = false;
      return;
    }
    if(onShort) onShort();
  });
}

    if(!filterBlock) return; // no filter block (single-gun inventory) → no presets UI

    // Remove any stale row
    var old = document.getElementById('t10_preset_row');
    if(old && old.parentNode) old.parentNode.removeChild(old);

    // Build and inject at top of filter block
    var saveEnabled = _T10_hasActiveFilters(_T9_readFilterState());
    var wrap = document.createElement('div');
    wrap.innerHTML = _T10_renderPresetRow(t10Presets, saveEnabled);
    var row = wrap.firstChild;
    filterBlock.insertBefore(row, filterBlock.firstChild);

    // Wire chip press handlers: short-press = apply, long-press = delete
    var chips = row.querySelectorAll('[data-t10-preset-id]');
    for(var i=0; i<chips.length; i++){
      (function(chip){
        var id = chip.getAttribute('data-t10-preset-id');
        _T10_attachPressHandlers(chip,
          function(){ // short press → apply
            var preset = null;
            for(var k=0; k<t10Presets.length; k++){
              if(t10Presets[k].id === id){ preset = t10Presets[k]; break; }
            }
            if(preset){
              _T10_applyPresetToControls(preset);
              refresh();
            }
          },
          function(){ // long press → delete
            var preset = null;
            for(var k=0; k<t10Presets.length; k++){
              if(t10Presets[k].id === id){ preset = t10Presets[k]; break; }
            }
            if(!preset) return;
            _T10_confirmDeletePreset(preset, function(){
              t10Presets = t10Presets.filter(function(p){ return p.id !== id; });
              _T10_savePresetsToStorage(t10Presets);
              mountPresetRow();
              try{ haptic('tap'); }catch(e){}
              toast('Preset deleted');
            });
          }
        );
      })(chips[i]);
    }

    // Wire save button
    var saveBtn = document.getElementById('t10_preset_save');
    if(saveBtn){
      saveBtn.onclick = function(){
        if(saveBtn.disabled) return;
        if(t10Presets.length >= _T10_PRESET_CAP){
          toast(_T10_PRESET_CAP + '-preset limit reached. Delete one to save a new one.','err');
          return;
        }
        var state = _T9_readFilterState();
        if(!_T10_hasActiveFilters(state)) return;
        var suggested = _T10_suggestPresetName(state);
        _T10_promptSavePreset({
          suggestedName: suggested,
          onSave: function(name){
            var newPreset = {
              id: _T10_generatePresetId(),
              name: name,
              filters: state,
              created: new Date().toISOString()
            };
            t10Presets.push(newPreset);
            var ok = _T10_savePresetsToStorage(t10Presets);
            if(!ok){
              toast('Could not save preset','err');
              t10Presets.pop();
              return;
            }
            mountPresetRow();
            try{ haptic('ok'); }catch(e){}
            toast('Preset saved');
          }
        });
      };
    }
  }
  // ── END T10 preset row wiring ─────────────────────────────────────

  // Wire filter listeners (no-op if filter block is empty)
  _T9_wireFilterListeners(refresh);
  mountPresetRow();
  refresh();

  document.getElementById('t8_export_go').onclick = function(){
    var goBtn = document.getElementById('t8_export_go');
    if(goBtn && goBtn.disabled) return;
    var state = _T9_readFilterState();
    var filtered = _T9_filterGuns(allGuns, state);
    var chk = document.getElementById('t8_incl_photos');
    var incl = chk ? !!chk.checked : false;
    modal.remove();
    if(opts.onConfirm) opts.onConfirm(filtered, incl);
  };
  document.getElementById('t8_export_cancel').onclick = function(){
    modal.remove();
    if(opts.onCancel) opts.onCancel();
  };
}

function _runBackupWithCompression(collName, exportGunsIn, includePhotos){
  function finalizeBackup(exportGuns, stats, originalSize){
    var data = {
      guns: exportGuns,
      customPrices: customPrices,
      version: SK,
      exported: new Date().toISOString(),
      collectionName: collName,
      export_meta: _buildExportMeta(stats, includePhotos)
    };
    var json = JSON.stringify(data, null, 2);
    var blob = new Blob([json], {type:'application/json'});
    _showExportSizeModal({
      finalSize: blob.size,
      originalSize: originalSize,
      stats: stats,
      confirmLabel: 'Save Backup',
      onConfirm: function(){
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'arsenal_vault_'+collName.replace(/[^a-z0-9]/gi,'_')+'_'+new Date().toISOString().split('T')[0]+'.json';
        a.click();
        URL.revokeObjectURL(url);
        toast('Backup saved to Downloads');
      },
      onCancel: function(){ /* user bailed, discard */ }
    });
  }

  if(!includePhotos){
    var stripped = _stripPhotosFromGuns(exportGunsIn);
    var emptyStats = { photos_processed:0, photos_compressed:0, photos_passed_through:0, photos_failed_decode:0 };
    finalizeBackup(stripped, emptyStats, null);
    return;
  }

  // Cheap "before" estimate so the preview can show a reduction %.
  var origEstimate = _photoBytesRoughEstimate(exportGunsIn) * 1.33 + exportGunsIn.length * 2000;

  _showExportProgressModal('Compressing photos for backup');
  _buildCompressedExportGuns(exportGunsIn, _updateExportProgress).then(function(result){
    _hideExportProgressModal();
    finalizeBackup(result.guns, result.stats, origEstimate);
  }).catch(function(){
    _hideExportProgressModal();
    toast('Could not prepare backup','err');
  });
}

// ── T2.1: COLLECTION SHARE (full-fidelity HTML-wrapped packet) ───────
// Shares the complete collection (including photos and all data) through
// the native share sheet. JSON payload is gzip-compressed and base64-encoded
// inside an HTML wrapper, so Android's share sheet works reliably and
// recipient browsers can view a readable summary without ArsenalDB.
//
// Packet structure (kind='collection'):
//   {
//     format:'arsenaldb_packet_v1', kind:'collection', schema_v:1,
//     generated_at:ISO, generated_by_device:'K7F3',
//     collection: { name, guns:[...full records including photos], customPrices, version }
//   }

// Base64 helpers (Uint8Array <-> base64 string, chunked for memory safety on large data)
function _u8ToB64(u8){
  var CHUNK = 0x8000;
  var parts = [];
  for(var i=0; i<u8.length; i+=CHUNK){
    parts.push(String.fromCharCode.apply(null, u8.subarray(i, i+CHUNK)));
  }
  return btoa(parts.join(''));
}
function _b64ToU8(b64){
  var bin = atob(b64);
  var len = bin.length;
  var u8 = new Uint8Array(len);
  for(var i=0;i<len;i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

// Gzip-compress a string, return base64. Returns null if unsupported.
function _gzipBase64(str){
  return new Promise(function(resolve){
    if(typeof CompressionStream === 'undefined'){ resolve(null); return; }
    try{
      var encoded = new TextEncoder().encode(str);
      var stream = new Response(
        new Blob([encoded]).stream().pipeThrough(new CompressionStream('gzip'))
      );
      stream.arrayBuffer().then(function(buf){
        resolve(_u8ToB64(new Uint8Array(buf)));
      }).catch(function(){ resolve(null); });
    }catch(e){ resolve(null); }
  });
}

// Decompress base64-encoded gzip back to a string. Throws if unsupported/invalid.
function _gunzipBase64(b64){
  return new Promise(function(resolve, reject){
    if(typeof DecompressionStream === 'undefined'){
      reject(new Error('DecompressionStream not supported'));
      return;
    }
    try{
      var u8 = _b64ToU8(b64);
      var stream = new Response(
        new Blob([u8]).stream().pipeThrough(new DecompressionStream('gzip'))
      );
      stream.arrayBuffer().then(function(buf){
        resolve(new TextDecoder().decode(new Uint8Array(buf)));
      }).catch(reject);
    }catch(e){ reject(e); }
  });
}

// Build the HTML wrapper for a collection packet.
// `payloadB64` is the compressed base64 payload (from _gzipBase64).
// `uncompressedJson` is the fallback — used if payloadB64 is null.
function _buildCollectionPacketHtml(collName, gunsArr, payloadB64, uncompressedJson){
  var esc = eh;
  var totalValue = 0, totalCost = 0;
  gunsArr.forEach(function(g){
    totalValue += parseFloat(g.currentValue)||0;
    totalCost  += parseFloat(g.purchasePrice)||0;
  });
  var fmUsd = function(v){ return '$' + (v||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); };

  // Compact firearm list (no photos in visible rendering — readability)
  var rows = gunsArr.map(function(g){
    var line1 = [g.make, g.model].filter(function(s){return s;}).join(' ') || '(unnamed)';
    var bits = [];
    if(g.serialNumber) bits.push('SN: '+g.serialNumber);
    if(g.caliber)      bits.push(g.caliber);
    if(g.condition)    bits.push(g.condition);
    var line2 = bits.join(' · ');
    var val = g.currentValue ? fmUsd(parseFloat(g.currentValue)) : '';
    return '<tr>'
      +'<td><div class="nm">'+esc(line1)+'</div>'+(line2?'<div class="sb">'+esc(line2)+'</div>':'')+'</td>'
      +'<td class="v">'+esc(val)+'</td>'
    +'</tr>';
  }).join('');

  // Choose payload marker — compressed vs uncompressed
  var payloadTag;
  if(payloadB64){
    payloadTag = '<script type="application/json+gzip" id="arsenaldb_packet">'+payloadB64+'<\/script>';
  } else {
    // Escape < and > for JSON-in-script safety
    var safeJson = uncompressedJson
      .replace(/</g,'\\u003c').replace(/>/g,'\\u003e')
      .replace(/\u2028/g,'\\u2028').replace(/\u2029/g,'\\u2029');
    payloadTag = '<script type="application/json" id="arsenaldb_packet">'+safeJson+'<\/script>';
  }

  return '<!DOCTYPE html>'
    +'<html lang="en"><head><meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    +'<title>ArsenalDB Collection · '+esc(collName)+'</title>'
    +'<style>'
      +'*{box-sizing:border-box}'
      +'body{margin:0;padding:28px 20px;background:#f6f5f2;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;line-height:1.5;-webkit-print-color-adjust:exact}'
      +'.wrap{max-width:820px;margin:0 auto;background:#fff;padding:32px;border:1px solid #d8d4ca;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.04)}'
      +'.brand{font-size:11px;letter-spacing:.2em;color:#8a7440;text-transform:uppercase;font-weight:700;margin-bottom:2px}'
      +'.brand-sub{font-size:12px;color:#888;margin-bottom:20px}'
      +'.coll-banner{background:#1a1d24;color:#e8c46a;padding:18px 22px;border-radius:8px;margin-bottom:20px}'
      +'.coll-name{font-size:20px;font-weight:800;letter-spacing:.04em;margin-bottom:4px}'
      +'.coll-count{font-size:13px;color:#c0c8d8}'
      +'.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}'
      +'.stat{background:#f6f5f2;border-left:3px solid #8a7440;padding:10px 14px}'
      +'.stat .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:4px}'
      +'.stat .val{font-size:18px;font-weight:700;color:#1a1a1a}'
      +'h2{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#8a7440;font-weight:800;margin:0 0 8px;border-bottom:1px solid #e0ddd4;padding-bottom:4px}'
      +'table{width:100%;border-collapse:collapse;font-size:14px}'
      +'td{padding:10px 8px;border-bottom:1px solid #f0ede6;vertical-align:top}'
      +'td.v{text-align:right;color:#8a7440;font-weight:700;white-space:nowrap}'
      +'.nm{font-weight:600;color:#1a1a1a}'
      +'.sb{font-size:12px;color:#666;margin-top:2px}'
      +'.import-note{background:#f0f6fa;border:1px solid #a8c8e0;border-radius:6px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#2a4a68}'
      +'.footer{margin-top:28px;padding-top:12px;border-top:1px solid #e0ddd4;font-size:11px;color:#8a7440;text-align:center;letter-spacing:.04em}'
      +'@media print{body{background:#fff;padding:0} .wrap{border:none;box-shadow:none;padding:0}}'
    +'</style>'
    +'</head><body><div class="wrap">'
      +'<div class="brand">ArsenalDB</div>'
      +'<div class="brand-sub">Private Armory Management</div>'
      +'<div class="coll-banner">'
        +'<div class="coll-name">'+esc(collName)+'</div>'
        +'<div class="coll-count">'+gunsArr.length+' firearm'+(gunsArr.length!==1?'s':'')+'</div>'
      +'</div>'
      +'<div class="import-note"><strong>ArsenalDB users:</strong> this file contains the complete collection including photos and history. Open ArsenalDB and use Import Collection to merge into your own collection.</div>'
      +'<div class="stats">'
        +'<div class="stat"><div class="lbl">Firearms</div><div class="val">'+gunsArr.length+'</div></div>'
        +'<div class="stat"><div class="lbl">Total Value</div><div class="val">'+fmUsd(totalValue)+'</div></div>'
        +'<div class="stat"><div class="lbl">Cost Basis</div><div class="val">'+fmUsd(totalCost)+'</div></div>'
      +'</div>'
      +'<h2>Firearms in this Collection</h2>'
      +'<table><tbody>'+rows+'</tbody></table>'
      +'<div class="footer">Generated by ArsenalDB · '+esc((appSettings&&appSettings.devicePrefix)||'')+' · '+esc(new Date().toLocaleDateString())+'</div>'
    +'</div>'
    +payloadTag
  +'</body></html>';
}

function _runShareWithCompression(collName, exportGunsIn, includePhotos){
  function buildPacket(exportGuns, stats){
    var data = {
      format: 'arsenaldb_packet_v1',
      kind: 'collection',
      schema_v: 1,
      generated_at: new Date().toISOString(),
      generated_by_device: (appSettings && appSettings.devicePrefix) || '',
      export_meta: _buildExportMeta(stats, includePhotos),
      collection: {
        name: collName,
        guns: exportGuns,
        customPrices: customPrices,
        version: SK
      }
    };
    var jsonStr;
    try{ jsonStr = JSON.stringify(data); }
    catch(e){ toast('Could not serialize collection','err'); return; }

    _gzipBase64(jsonStr).then(function(b64){
      var html = _buildCollectionPacketHtml(collName, exportGuns, b64, b64 ? null : jsonStr);
      var safeName = collName.replace(/[^a-z0-9]/gi,'_');
      var filename = 'ArsenalDB_Collection_' + safeName + '_' + new Date().toISOString().split('T')[0] + '.html';
      var blob = new Blob([html], {type:'text/html'});

      _showExportSizeModal({
        finalSize: blob.size,
        originalSize: null, // gzip'd packet — "before" number not meaningful
        stats: stats,
        confirmLabel: 'Share',
        onConfirm: function(){
          var file;
          try{ file = new File([blob], filename, {type:'text/html'}); }catch(e){ file = null; }
          if(file && navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
            navigator.share({
              files:[file],
              title:'ArsenalDB Collection',
              text:'My ArsenalDB collection — import via ArsenalDB'
            }).catch(function(err){
              if(err && err.name === 'AbortError'){ toast('Share canceled'); }
              else { _shareDownloadFallback(blob, filename); }
            });
          } else {
            _shareDownloadFallback(blob, filename);
          }
        },
        onCancel: function(){ /* discard */ }
      });
    }).catch(function(){
      toast('Could not prepare packet — try again','err');
    });
  }

  if(!includePhotos){
    var stripped = _stripPhotosFromGuns(exportGunsIn);
    var emptyStats = { photos_processed:0, photos_compressed:0, photos_passed_through:0, photos_failed_decode:0 };
    buildPacket(stripped, emptyStats);
    return;
  }

  _showExportProgressModal('Compressing photos for sharing');
  _buildCompressedExportGuns(exportGunsIn, _updateExportProgress).then(function(result){
    _hideExportProgressModal();
    buildPacket(result.guns, result.stats);
  }).catch(function(){
    _hideExportProgressModal();
    toast('Could not prepare collection','err');
  });
}

    +'</div>'

// T2.1: extract ArsenalDB packet JSON from an HTML file's embedded script block.
// Handles both gzip-compressed (application/json+gzip) and uncompressed (application/json)
// payload variants. Returns a Promise resolving to the parsed packet object.
function _extractPacketFromHtml(htmlText){
  return new Promise(function(resolve, reject){
    // Look for compressed payload first
    var gzipMatch = htmlText.match(/<script\s+type="application\/json\+gzip"\s+id="arsenaldb_packet">([^<]+)<\/script>/);
    if(gzipMatch){
      _gunzipBase64(gzipMatch[1]).then(function(jsonStr){
        try{ resolve(JSON.parse(jsonStr)); }
        catch(e){ reject(new Error('Could not parse decompressed packet')); }
      }).catch(function(){
        reject(new Error('Could not decompress packet — your browser may be too old'));
      });
      return;
    }
    // Fall back to uncompressed payload
    var jsonMatch = htmlText.match(/<script\s+type="application\/json"\s+id="arsenaldb_packet">([\s\S]+?)<\/script>/);
    if(jsonMatch){
      try{
        // Undo the <,>,2028,2029 unicode escapes we applied on write
        var raw = jsonMatch[1]
          .replace(/\\u003c/g,'<').replace(/\\u003e/g,'>')
          .replace(/\\u2028/g,'\u2028').replace(/\\u2029/g,'\u2029');
        resolve(JSON.parse(raw));
      }catch(e){
        reject(new Error('Could not parse packet'));
      }
      return;
    }
    reject(new Error('No ArsenalDB packet found in this HTML file'));
  });
}

function restoreData(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var text = ev.target.result;
    var trimmed = (text || '').replace(/^\uFEFF/,'').trimStart();

    // T2.1: HTML packet path — detect by prefix
    if(trimmed.indexOf('<!DOCTYPE') === 0 || trimmed.indexOf('<html') === 0){
      _extractPacketFromHtml(text).then(function(packet){
        if(packet && packet.format === 'arsenaldb_packet_v1'){
          if(packet.kind === 'collection' && packet.collection){
            var coll = packet.collection;
            _continueImportWithData({
              guns:           coll.guns || [],
              customPrices:   coll.customPrices || {},
              collectionName: coll.name || 'Imported Collection',
              version:        coll.version,
              exported:       packet.generated_at
            });
            return;
          }
          if(packet.kind === 'work_order_single'){
            toast('This is a single Work Order packet, not a collection.','err');
            return;
          }
        }
        toast('Unrecognized packet format','err');
      }).catch(function(err){
        toast((err && err.message) || 'Could not read file','err');
      });
      return;
    }

    // JSON path (today's behavior — backward compat for existing .json backups)
    try{
      var data = JSON.parse(text);
      _continueImportWithData(data);
    }catch(ex){
      toast('Could not read backup file','err');
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

// T1.10: card-based import mode selector. Replaces the previous radio-button UI.
// Visual state lives on border colors; logical state on modal.dataset.importMode.
function _selectImportMode(mode){
  var modal = document.getElementById('import_modal');
  if(!modal) return;
  // Pre-flight Pro+ gate on merge (UX sugar — doImport also gates)
  if(mode === 'merge' && _tierLevel(appSettings.tier) < _tierLevel('proplus')){
    requireProPlus('Merge Collections');
    return; // don't select the card
  }
  // Reset all cards to idle state
  var cards = [
    {id:'import_card_new',     color:'#e8c46a'},
    {id:'import_card_replace', color:'#ff7070'},
    {id:'import_card_merge',   color:'#e8c46a'}
  ];
  cards.forEach(function(c){
    var el = document.getElementById(c.id);
    if(el){
      el.style.border = '1px solid #2e3545';
      el.style.background = '#1a1d24';
    }
  });
  // Highlight selected card
  var targetId = 'import_card_' + mode;
  var target = document.getElementById(targetId);
  if(target){
    var selectedColor = mode === 'replace' ? '#ff7070' : '#e8c46a';
    target.style.border = '2px solid ' + selectedColor;
    target.style.background = '#1a1d24';
  }
  // Store logical state
  modal.dataset.importMode = mode;
  // Enable Import button
  var btn = document.getElementById('import_do_btn');
  if(btn){
    btn.disabled = false;
    btn.style.background = '#e8c46a';
    btn.style.color = '#1a1d24';
    btn.style.cursor = 'pointer';
  }
}

function doImport(data){
  // Support legacy calls that pass data directly; otherwise read from staging
  if(!data) data=_pendingImportData;
  if(!data||!data.guns){ toast('Import data missing','err'); return; }
  var nameEl=document.getElementById('import_name');
  var modalEl=document.getElementById('import_modal');
  var name=nameEl?nameEl.value.trim():'Imported Collection';
  // T1.10: mode now stored on modal dataset (set by _selectImportMode), not radio buttons
  var mode = (modalEl && modalEl.dataset.importMode) || 'new';

  if(!name) name='Imported Collection';

  var m=document.getElementById('import_modal');
  if(m) m.remove();

  if(mode==='new'){
    // Create new collection
    // T7: silently disambiguate if this name collides with existing collection
    var _resolved=_resolveCollectionName(name);
    name=_resolved.name;
    var id='coll_'+Date.now().toString(36);
    collections[id]={name:name,created:new Date().toISOString()};
    saveCollections();

    // Save current collection first
    saveGunsToCollection(activeCollection);

    // Switch to new collection with imported guns
    activeCollection=id;
    try{localStorage.setItem('av_active_coll',id);}catch(e){}
    guns=data.guns;
    if(data.customPrices) customPrices=data.customPrices;
    sv();
    milestones={};totalCleanings=0;transferredGuns=[];
    loadMilestones();loadTransferred();
    haptic('save');
    toast('Imported '+guns.length+' firearms into "'+name+'"'+(_resolved.suffixed?' (renamed to avoid collision)':''));
    VIEW='dashboard';
    rnd();
  } else if(mode==='merge'){
    // Pro+ gate
    if(!requireProPlus('Merge Collections')) return;
    _startMerge(data);
  } else {
    // Replace current collection
    if(!confirm('Replace all firearms in "'+collections[activeCollection].name+'" with '+data.guns.length+' firearms from backup? This cannot be undone.')) return;
    guns=data.guns;
    if(data.customPrices) customPrices=data.customPrices;
    sv();
    haptic('save');
    toast('Restored '+guns.length+' firearms');
    VIEW='dashboard';
    rnd();
  }
}

// ── MERGE IMPORT ─────────────────────────────────────────────────────
function _normSerial(s){ return (s||'').toString().trim().toLowerCase(); }

function _startMerge(data){
  var incoming=(data.guns||[]).slice();
  // Build map of existing serials → gun index
  var existingBySerial={};
  for(var i=0;i<guns.length;i++){
    var s=_normSerial(guns[i].serialNumber);
    if(s) existingBySerial[s]=i;
  }
  // Classify incoming
  var newOnes=[];
  var dupes=[]; // [{incoming, mineIdx}]
  for(var j=0;j<incoming.length;j++){
    var sn=_normSerial(incoming[j].serialNumber);
    if(sn && existingBySerial.hasOwnProperty(sn)){
      dupes.push({ incoming: incoming[j], mineIdx: existingBySerial[sn] });
    } else {
      newOnes.push(incoming[j]);
    }
  }
  _showMergePreview(newOnes, dupes, data);
}

function _showMergePreview(newOnes, dupes, data){
  var total=newOnes.length+dupes.length;
  var modal=document.createElement('div');
  modal.id='merge_preview_modal';
  modal.style.cssText='position:fixed;inset:0;background:#000000dd;z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';
  var dupeBtnHTML = dupes.length>0
    ? '<button id="merge_review_btn" style="background:#e8c46a;color:#1a1d24;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Review Duplicates &#8250;</button>'
    : '<button id="merge_review_btn" style="background:#e8c46a;color:#1a1d24;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Add '+newOnes.length+' Firearm'+(newOnes.length!==1?'s':'')+'</button>';
  modal.innerHTML='<div style="background:#222835;border:2px solid #e8c46a60;border-radius:12px;padding:24px;max-width:340px;width:100%">'
    +'<div style="font-size:16px;font-weight:700;color:#e8c46a;margin-bottom:6px">&#128257; Merge Preview</div>'
    +'<div style="font-size:13px;color:#8a95a8;margin-bottom:18px">Reviewing '+total+' incoming firearm'+(total!==1?'s':'')+' against "'+eh(collections[activeCollection].name)+'".</div>'
    +'<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:13px;font-weight:600;color:#f0f2f5">New Firearms</div><div style="font-size:11px;color:#4a5568">Will be added</div></div>'
      +'<div style="font-size:22px;font-weight:800;color:#7eb87e">'+newOnes.length+'</div>'
    +'</div>'
    +'<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:14px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:13px;font-weight:600;color:#f0f2f5">Duplicate Serials</div><div style="font-size:11px;color:#4a5568">'+(dupes.length>0?'Needs your review':'None found')+'</div></div>'
      +'<div style="font-size:22px;font-weight:800;color:'+(dupes.length>0?'#e8c46a':'#4a5568')+'">'+dupes.length+'</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
      +dupeBtnHTML
      +'<button onclick="document.getElementById(\'merge_preview_modal\').remove()" style="background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>'
    +'</div>'
  +'</div>';
  document.body.appendChild(modal);
  // Wire the primary button
  document.getElementById('merge_review_btn').onclick=function(){
    modal.remove();
    if(dupes.length===0){
      _applyMergeResolutions(newOnes, [], data);
    } else {
      _showMergeConflicts(newOnes, dupes, data);
    }
  };
}

function _showMergeConflicts(newOnes, dupes, data){
  var rows='';
  for(var i=0;i<dupes.length;i++){
    var d=dupes[i];
    var mine=guns[d.mineIdx];
    var inc=d.incoming;
    rows+='<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:12px;margin-bottom:10px">'
      +'<div style="font-size:12px;font-weight:700;color:#e8c46a;margin-bottom:8px">Serial: '+eh(inc.serialNumber||'(none)')+'</div>'
      +'<div style="font-size:11px;color:#8a95a8;margin-bottom:10px">'
        +'<div><span style="color:#7eb87e;font-weight:700">Mine:</span> '+eh((mine.make||'')+' '+(mine.model||'')).trim()+' ('+eh(mine.condition||'')+')</div>'
        +'<div style="margin-top:3px"><span style="color:#a0c0ff;font-weight:700">Incoming:</span> '+eh((inc.make||'')+' '+(inc.model||'')).trim()+' ('+eh(inc.condition||'')+')</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px">'
        +'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#f0f2f5"><input type="radio" name="dup_'+i+'" value="keep" checked style="accent-color:#7eb87e"/>Keep Mine</label>'
        +'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#f0f2f5"><input type="radio" name="dup_'+i+'" value="replace" style="accent-color:#a0c0ff"/>Use Incoming</label>'
        +'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#f0f2f5"><input type="radio" name="dup_'+i+'" value="skip" style="accent-color:#8a95a8"/>Skip</label>'
      +'</div>'
    +'</div>';
  }
  var modal=document.createElement('div');
  modal.id='merge_conflicts_modal';
  modal.style.cssText='position:fixed;inset:0;background:#000000dd;z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML='<div style="background:#222835;border:2px solid #e8c46a60;border-radius:12px;padding:20px;max-width:360px;width:100%;max-height:90vh;display:flex;flex-direction:column">'
    +'<div style="font-size:16px;font-weight:700;color:#e8c46a;margin-bottom:4px">Resolve '+dupes.length+' Duplicate'+(dupes.length!==1?'s':'')+'</div>'
    +'<div style="font-size:12px;color:#8a95a8;margin-bottom:14px">For each duplicate serial, choose what to do.</div>'
    +'<div style="overflow-y:auto;flex:1;margin-bottom:12px">'+rows+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
      +'<button id="merge_apply_btn" style="background:#e8c46a;color:#1a1d24;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Apply Merge</button>'
      +'<button onclick="document.getElementById(\'merge_conflicts_modal\').remove()" style="background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>'
    +'</div>'
  +'</div>';
  document.body.appendChild(modal);
  document.getElementById('merge_apply_btn').onclick=function(){
    var resolutions=[];
    for(var i=0;i<dupes.length;i++){
      var el=document.querySelector('input[name="dup_'+i+'"]:checked');
      resolutions.push(el?el.value:'keep');
    }
    modal.remove();
    _applyMergeResolutions(newOnes, dupes.map(function(d,i){return {dupe:d, choice:resolutions[i]};}), data);
  };
}

function _applyMergeResolutions(newOnes, resolved, data){
  var added=0, replaced=0, kept=0, skipped=0;
  // Add all non-duplicates with fresh ids to avoid collision with existing guns
  for(var i=0;i<newOnes.length;i++){
    var g=Object.assign({}, newOnes[i], { id: gid() });
    guns.push(g);
    added++;
  }
  // Apply duplicate resolutions
  for(var j=0;j<resolved.length;j++){
    var r=resolved[j];
    if(r.choice==='keep'){ kept++; }
    else if(r.choice==='replace'){
      // Preserve the existing id so references don't break
      var existingId=guns[r.dupe.mineIdx].id;
      guns[r.dupe.mineIdx]=Object.assign({}, r.dupe.incoming, { id: existingId });
      replaced++;
    }
    else if(r.choice==='skip'){ skipped++; }
  }
  // Merge customPrices (incoming wins only where mine has no entry)
  if(data.customPrices){
    if(!customPrices) customPrices={};
    for(var k in data.customPrices){
      if(data.customPrices.hasOwnProperty(k) && !customPrices.hasOwnProperty(k)){
        customPrices[k]=data.customPrices[k];
      }
    }
  }
  sv();
  haptic('save');
  var parts=[];
  if(added) parts.push(added+' added');
  if(replaced) parts.push(replaced+' replaced');
  if(kept) parts.push(kept+' kept');
  if(skipped) parts.push(skipped+' skipped');
  toast('Merged: '+(parts.length?parts.join(', '):'no changes'));
  VIEW='dashboard';
  rnd();
}

  _initBackGuard();
  window.addEventListener('popstate', function(e){
    if(_arsenalExitInProgress) return;
    // Key the decision off e.state (delivered with the event), not
    // history.state which can be stale during the transition. If we
    // popped to our root entry or another sentinel, stay in the app.
    if(e.state && (e.state.arsenalRoot || e.state.arsenalSentinel)){
      try{ if(typeof handleBack==='function') handleBack(); }catch(err){ console.warn('back handler error', err); }
      _armBackSentinel();

    // Otherwise (null state or unknown) — let the navigation happen.
  });
  // 2026-04-25-B: when the app comes back to focus, reset any stuck exit
  // flag from a prior _doExit attempt. Don't push a new sentinel here —
  // existing browser history is preserved on resume in standalone PWA
  // mode, so a sentinel from before backgrounding is still in place.
  document.addEventListener('visibilitychange', function(){
    if(!document.hidden){
      _arsenalExitInProgress=false;
    }
  });
  ld(); // rnd() called inside ld() after async DB load
})();
