function saveWorkOrder(){
  var type = document.getElementById('wo_type').value;
  if(!type){ toast('Please select a work type','err'); return; }
  // T11: parts_freeform input removed. Value preserved from existingRecord
  // in the record-build step below to stay migration-safe.
  var safetyConcernEl = document.getElementById('wo_safety_concern');
  var safetyConcern = !!(safetyConcernEl && safetyConcernEl.checked);
  // T2: gather checklist state (only if visible — status=Completed AND major type)
  var modal = document.getElementById('wo_modal');
  var rawStatus = document.getElementById('wo_status').value;
  var isMajor = WO_MAJOR_WORK_TYPES.indexOf(type) >= 0;
  var isCompleted = rawStatus === 'Completed';
  var checklistForRecord = null;
  if(isMajor && isCompleted){
    // Build checklist from current DOM state; default unchecked
    checklistForRecord = _woChecklistItems.map(function(label){
      return {label: label, checked: false};
    });
    var boxes = modal ? modal.querySelectorAll('input[data-cl-idx]') : [];
    for(var i=0; i<boxes.length; i++){
      var idx = parseInt(boxes[i].getAttribute('data-cl-idx'), 10);
      if(idx >= 0 && idx < _woChecklistItems.length){
        checklistForRecord[idx].checked = boxes[i].checked;
      }
    }
  }
  // T3: gather structured Pro fields — only populated if user is Pro or above.
  // DOM elements exist only for Pro users (Free sees a teaser card, no inputs).
  var isPro = _tierLevel(appSettings.tier) >= _tierLevel('pro');
  var partsStructured = [];
  var torqueNotes     = '';
  var threadlocker    = '';
  var lubricants      = '';
  var roundCount      = null;
  var testFire        = null;
  if(isPro){
    // Sync DOM state into dataset first, then read.
    _syncPartsFromDOM();
    try{ partsStructured = modal && modal.dataset.partsStructured ? JSON.parse(modal.dataset.partsStructured) : []; }catch(e){ partsStructured = []; }
    // Filter out completely-empty rows (user added a row then left it blank)
    partsStructured = partsStructured.filter(function(p){ return (p && (p.name || p.qty || p.cost)); });
    torqueNotes   = (document.getElementById('wo_torque_notes')||{}).value || '';
    threadlocker  = (document.getElementById('wo_threadlocker')||{}).value || '';
    lubricants    = (document.getElementById('wo_lubricants')||{}).value || '';
    var rcEl = document.getElementById('wo_round_count');
    if(rcEl && rcEl.value !== '') roundCount = parseInt(rcEl.value, 10);
    // T5: collect test-fire blob (normalized or null)
    testFire = _collectWOTestFireFromDOM();
    // T5: honor "Add to round count" — add test-fire rounds to this WO's
    // round_count on save. Requires rounds_fired > 0 and checkbox checked.
    var addBoxEl = document.getElementById('wo_tf_add_to_round_count');
    if(addBoxEl && addBoxEl.checked && testFire && testFire.rounds_fired > 0){
      var existingRC = (roundCount == null || isNaN(roundCount)) ? 0 : roundCount;
      roundCount = existingRC + testFire.rounds_fired;
    }
  }
  // T1: build full v1 record with snapshot, permanent wo_number, and status guard.
  // T3.5: in edit mode, preserve identity fields from the existing record.
  var editIdxStr = modal ? modal.dataset.editIdx : null;
  var isEdit = (editIdxStr !== null && editIdxStr !== undefined && editIdxStr !== '');
  var editIdx = isEdit ? parseInt(editIdxStr, 10) : -1;
  var priorOrders = [];
  try{ priorOrders = FORM.maintenanceLog ? JSON.parse(FORM.maintenanceLog) : []; }catch(e){ priorOrders = []; }
  var existingRecord = (isEdit && priorOrders[editIdx]) ? _woUpgradeRecord(priorOrders[editIdx]) : null;

  var order = _woUpgradeRecord({
    type:       type,
    date:       document.getElementById('wo_date').value,
    tech:       document.getElementById('wo_tech').value,
    status:     rawStatus,
    notes:      document.getElementById('wo_notes').value,
    // T3.5: preserve identity fields on edit, generate new on create
    id:         existingRecord ? existingRecord.id : (Date.now().toString(36)+Math.random().toString(36).substr(2)),
    created_at: existingRecord ? existingRecord.created_at : new Date().toISOString(),
    snapshot: existingRecord && existingRecord.snapshot ? existingRecord.snapshot : {
      make:         FORM.make         || '',
      model:        FORM.model        || '',
      serialNumber: FORM.serialNumber || '',
      type:         FORM.type         || '',
      caliber:      FORM.caliber      || ''
    },
    // T2: new fields
    // T11: parts_freeform preserved from existing record on edit (input removed in T11).
    parts_freeform:   existingRecord ? (existingRecord.parts_freeform || '') : '',
    safety_concern:   safetyConcern,
    checklist:        checklistForRecord,
    // T3: Pro structured fields (empty for Free users — defaults handled in _woUpgradeRecord)
    parts_structured: partsStructured,
    torque_notes:     torqueNotes,
    threadlocker:     threadlocker,
    lubricants:       lubricants,
    round_count:      roundCount,
    // T5: test-fire blob (null if nothing entered, normalized if present)
    test_fire:        testFire
  });
  // T3.5: preserve wo_number on edit. Silently repair legacy records with no wo_number.
  if(existingRecord && existingRecord.wo_number){
    order.wo_number = existingRecord.wo_number;
  } else {
    order.wo_number = _woGenerateNumber(FORM);
  }
  // Status engine guard: reject invalid transitions (e.g. Completed w/o notes, or safety concern unresolved).
  var guard = _woStatusEngine.canTransition(null, order.status, order);
  if(!guard.ok){ toast(guard.error, 'err'); return; }
  // T3.5: edit mode replaces at index; new mode unshifts to front
  if(isEdit && editIdx >= 0 && editIdx < priorOrders.length){
    priorOrders[editIdx] = order;
  } else {
    priorOrders.unshift(order);
  }
  var updatedLog = JSON.stringify(priorOrders);
  // T6: standalone branch — opened from detail view via newWorkOrderForGun.
  // Write back to the real guns array, persist, clear flag, re-render in place.
  // FORM was hydrated as a shallow copy and should NOT be treated as source of truth.
  if(window._woStandaloneGunId){
    var g = guns.find(function(x){return x.id === window._woStandaloneGunId;});
    if(g){
      g.maintenanceLog = updatedLog;
      sv();
    }
    window._woStandaloneGunId = null;
  } else {
    // Normal edit-page flow — mutate FORM, let the surrounding edit flow persist on Save.
    FORM.maintenanceLog = updatedLog;
  }
  document.getElementById('wo_modal').remove();
  haptic('save');
  toast(isEdit ? 'Work order updated' : 'Work order saved');
  rnd();
}

function removeWorkOrder(idx){
  if(!confirm('Remove this work order?')) return;
  // HOTFIX (post-T11): in detail view, write back to gun directly and persist.
  // In edit view, mutate FORM and let firearm-save flow persist.
  var targetGun = null;
  if(VIEW === 'detail' && selId){
    targetGun = guns.find(function(x){return x.id === selId;});
  }
  var logSource = targetGun ? (targetGun.maintenanceLog || '[]') : (FORM.maintenanceLog || '[]');
  var orders = [];
  try{ orders = JSON.parse(logSource); }catch(e){ return; }
  if(!Array.isArray(orders) || idx < 0 || idx >= orders.length) return;
  orders.splice(idx, 1);
  var updated = JSON.stringify(orders);
  if(targetGun){
    targetGun.maintenanceLog = updated;
    sv();
  } else {
    FORM.maintenanceLog = updated;
  }
  haptic('light');
  rnd();
}

// ── T2: WORK ORDER SHARE (single WO packet export) ───────────────────
// Entry point from the ↗ button on each WO card. Reads the WO by index
// from the active firearm, builds a self-contained .html packet, and
// invokes the native share sheet. Falls back to download if unsupported.
function shareWO(idx){
  // Resolve which firearm this WO belongs to.
  // VIEW==='add' means we're editing a firearm (FORM is the live buffer).
  // Otherwise we're viewing a firearm in detail (selId tells us which gun).
  var gun;
  if(VIEW === 'add' && FORM){
    gun = FORM;
  } else if(selId){
    gun = guns.find(function(x){return x.id===selId;});
  }
  if(!gun){ toast('Cannot identify firearm','err'); return; }
  var orders = [];
  try{ orders = JSON.parse(gun.maintenanceLog || '[]'); }catch(e){ orders = []; }
  if(!orders[idx]){ toast('Work order not found','err'); return; }
  var wo = _woUpgradeRecord(orders[idx]);
  var html = _buildWOPacketHtml(wo, gun);
  var dateStr = (wo.created_at || new Date().toISOString()).split('T')[0];
  var numPart = wo.wo_number ? wo.wo_number.replace(/^WO-/,'') : (dateStr+'_'+idx);
  var filename = 'ArsenalDB_WO_' + numPart + '_' + dateStr + '.html';
  var blob = new Blob([html], {type: 'text/html'});
  var file;
  try{ file = new File([blob], filename, {type: 'text/html'}); }catch(e){ file = null; }
  // Native share path (mobile primary); fallback to download
  if(file && navigator.canShare && navigator.canShare({files:[file]}) && navigator.share){
    toast('Sharing...');
    navigator.share({
      files: [file],
      title: 'Work Order ' + (wo.wo_number || ''),
      text:  'Work order packet from ArsenalDB'
    }).then(function(){
      toast('Shared');
    }).catch(function(err){
      // User-cancel is expected; other errors get a toast
      if(err && err.name === 'AbortError'){ toast('Share canceled'); }
      else { toast('Share failed — downloading instead','err'); _downloadPacket(blob, filename); }
    });
  } else {
    _downloadPacket(blob, filename);
    toast('Download started');
  }
}

function _downloadPacket(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

// T4: print a single work order as a professionally-styled document.
// Opens a new window, writes the same document as Share but with the
// machine-readable JSON payload omitted, then triggers the native print dialog.
function printWO(idx){
  var gun;
  if(VIEW === 'add' && FORM){
    gun = FORM;
  } else if(selId){
    gun = guns.find(function(x){return x.id===selId;});
  }
  if(!gun){ toast('Cannot identify firearm','err'); return; }
  var orders = [];
  try{ orders = JSON.parse(gun.maintenanceLog || '[]'); }catch(e){ orders = []; }
  if(!orders[idx]){ toast('Work order not found','err'); return; }
  var wo = _woUpgradeRecord(orders[idx]);
  var snap = wo.snapshot || {};
  var titleSuffix = [snap.make, snap.model].filter(function(s){return s;}).join(' ');
  var html = _buildWOPacketHtml(wo, gun, {
    omitPayload: true,
    titleSuffix:  titleSuffix
  });
  var W;
  try{ W = window.open('', '_blank'); }catch(e){ W = null; }
  if(!W){ toast('Pop-ups blocked — enable them to print','err'); return; }
  W.document.open();
  W.document.write(html);
  W.document.close();
  // Wait for window to finish loading (especially photos) before printing
  if(W.document.readyState === 'complete'){
    setTimeout(function(){ try{ W.print(); }catch(e){} }, 200);
  } else {
    W.onload = function(){ setTimeout(function(){ try{ W.print(); }catch(e){} }, 200); };
  }
}

// T2: escape JSON for safe embedding inside a <script> tag.
// Default JSON.stringify does not escape < or >, so user-controlled text
// containing a closing script tag could break out. Escape both as unicode.
function _jsonForScriptTag(obj){
  return JSON.stringify(obj)
    .replace(/</g, '\\u003c')
    .replace(/>/g, '\\u003e')
    .replace(/\u2028/g, '\\u2028')
    .replace(/\u2029/g, '\\u2029');
}

// T2: build a self-contained HTML packet for one work order.
// Renders a human-readable document and embeds a machine-readable JSON
// block for ArsenalDB users who receive the file to import.
function _buildWOVisualSection(wo, gun, opts){
  opts = opts || {};
  var esc = eh;
  var includePhoto = opts.includePhoto !== false;
  var includeOwner = opts.includeOwner === true;
  var ownerProfile = opts.ownerProfile || {};
  var firstPhoto = null;
  if(includePhoto && gun){
    if(gun.photos && gun.photos.length) firstPhoto = gun.photos[0];
    else if(gun.photo) firstPhoto = gun.photo;
  }
  var snap = wo.snapshot || {};
  var fmLine = [snap.make, snap.model].filter(function(s){return s;}).join(' ');
  var snDetails = [snap.serialNumber ? 'Serial: '+snap.serialNumber : '', snap.caliber ? 'Caliber: '+snap.caliber : '', snap.type ? 'Type: '+snap.type : '']
    .filter(function(s){return s;}).join(' · ');
  var statusColor = wo.status === 'Completed' ? '#2d7a3e'
                  : wo.status === 'In Progress' ? '#8a6e1c'
                  : wo.status === 'Canceled' ? '#8a4a4a'
                  : '#4a5568';
  var checklistHtml = '';
  if(wo.checklist && wo.checklist.length){
    checklistHtml = '<div class="section"><h2>Function Check</h2><ul class="checklist">';
    wo.checklist.forEach(function(item){
      var mark = item.checked ? '✓' : '☐';
      var cls = item.checked ? 'chk' : 'unchk';
      checklistHtml += '<li class="'+cls+'"><span class="mark">'+mark+'</span>'+esc(item.label)+'</li>';
    });
    checklistHtml += '</ul></div>';
  }
  var safetyHtml = '';
  if(wo.safety_concern === true){
    safetyHtml = '<div class="safety"><strong>⚠ Safety Concern</strong><br/>This work order is flagged as having a safety concern needing attention.</div>';
  }
  var photoHtml = '';
  if(firstPhoto){
    photoHtml = '<div class="section"><h2>Firearm Photo</h2>'
      +'<img src="'+firstPhoto+'" style="max-width:400px;width:100%;height:auto;border:1px solid #ccc;border-radius:6px"/>'
      +'</div>';
  }
  var partsHtml = '';
  if(wo.parts_freeform){
    partsHtml = '<div class="section"><h2>Parts Used</h2><p>'+esc(wo.parts_freeform)+'</p></div>';
  }
  var partsStructHtml = '';
  if(wo.parts_structured && wo.parts_structured.length){
    var fmCurrency = function(v){
      if(!v || isNaN(parseFloat(v))) return '';
      return '$' + parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
    };
    var rowsHtml = '';
    var grandTotal = 0;
    wo.parts_structured.forEach(function(p){
      var qty  = parseFloat(p.qty)  || 0;
      var cost = parseFloat(p.cost) || 0;
      var line = qty * cost;
      if(line) grandTotal += line;
      rowsHtml += '<tr>'
        +'<td>'+esc(p.name||'')+'</td>'
        +'<td style="text-align:center">'+(qty||'')+'</td>'
        +'<td style="text-align:right">'+(cost?fmCurrency(cost):'')+'</td>'
        +'<td style="text-align:right">'+(line?fmCurrency(line):'')+'</td>'
      +'</tr>';
    });
    var totalRow = grandTotal ? '<tr style="border-top:2px solid #d8d4ca;font-weight:700"><td colspan="3" style="text-align:right;padding-top:8px">Total</td><td style="text-align:right;padding-top:8px">'+fmCurrency(grandTotal)+'</td></tr>' : '';
    partsStructHtml = '<div class="section"><h2>Parts Used (itemized)</h2>'
      +'<table style="width:100%;border-collapse:collapse;font-size:13px">'
        +'<thead><tr style="text-align:left;border-bottom:1px solid #d8d4ca;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:.08em">'
          +'<th style="padding:6px 4px">Part</th>'
          +'<th style="padding:6px 4px;text-align:center">Qty</th>'
          +'<th style="padding:6px 4px;text-align:right">Unit</th>'
          +'<th style="padding:6px 4px;text-align:right">Line</th>'
        +'</tr></thead>'
        +'<tbody>'+rowsHtml+totalRow+'</tbody>'
      +'</table>'
    +'</div>';
  }
  var techHtml = '';
  var techBits = [];
  if(wo.torque_notes)  techBits.push({label:'Torque', value:wo.torque_notes});
  if(wo.threadlocker)  techBits.push({label:'Threadlocker', value:wo.threadlocker});
  if(wo.lubricants)    techBits.push({label:'Lubricants', value:wo.lubricants});
  if(wo.round_count != null && wo.round_count !== '')  techBits.push({label:'Round Count', value:String(wo.round_count)});
  if(techBits.length){
    var dlRows = techBits.map(function(b){
      return '<dt>'+esc(b.label)+'</dt><dd>'+esc(b.value)+'</dd>';
    }).join('');
    techHtml = '<div class="section"><h2>Technical Details</h2><dl class="kv">'+dlRows+'</dl></div>';
  }
  // T5: Test-Fire validation block. Rendered only when test_fire has real data.
  var testFireHtml = '';
  if(wo.test_fire){
    var tf = wo.test_fire;
    var hasTF = tf.date || tf.ammo || (tf.rounds_fired != null)
             || (tf.groups && tf.groups.length) || tf.failures || tf.outcome;
    if(hasTF){
      var tfBits = [];
      if(tf.date)                  tfBits.push({label:'Date', value:tf.date});
      if(tf.ammo)                  tfBits.push({label:'Ammo', value:tf.ammo});
      if(tf.rounds_fired != null)  tfBits.push({label:'Rounds Fired', value:String(tf.rounds_fired)});
      var tfDlHtml = '';
      if(tfBits.length){
        tfDlHtml = '<dl class="kv">' + tfBits.map(function(b){
          return '<dt>'+esc(b.label)+'</dt><dd>'+esc(b.value)+'</dd>';
        }).join('') + '</dl>';
      }
      // Groups table with MOA column
      var groupsTableHtml = '';
      if(tf.groups && tf.groups.length){
        var gRows = '';
        var moas = [];
        tf.groups.forEach(function(g){
          var moa = _computeMOA(g.distance_yd, g.size_in);
          if(moa !== null) moas.push(moa);
          gRows += '<tr>'
            +'<td style="text-align:right">'+(g.distance_yd!=null?esc(String(g.distance_yd)):'')+'</td>'
            +'<td style="text-align:right">'+(g.size_in!=null?esc(String(g.size_in)):'')+'</td>'
            +'<td style="text-align:right">'+(moa===null?'—':moa.toFixed(2))+'</td>'
          +'</tr>';
        });
        var aggRowHtml = '';
        if(moas.length >= 2){
          var best = moas[0], sum = 0;
          for(var m=0; m<moas.length; m++){ if(moas[m] < best) best = moas[m]; sum += moas[m]; }
          aggRowHtml = '<tr style="border-top:2px solid #d8d4ca;font-weight:700">'
            +'<td colspan="2" style="text-align:right;padding-top:8px">Best / Avg</td>'
            +'<td style="text-align:right;padding-top:8px">'+best.toFixed(2)+' / '+(sum/moas.length).toFixed(2)+'</td>'
          +'</tr>';
        }
        groupsTableHtml = '<div style="margin-top:10px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:4px">Groups</div>'
          +'<table style="width:100%;border-collapse:collapse;font-size:13px">'
            +'<thead><tr style="text-align:right;border-bottom:1px solid #d8d4ca;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:.08em">'
              +'<th style="padding:6px 4px">Distance (yd)</th>'
              +'<th style="padding:6px 4px">Size (in)</th>'
              +'<th style="padding:6px 4px">MOA</th>'
            +'</tr></thead>'
            +'<tbody>'+gRows+aggRowHtml+'</tbody>'
          +'</table>'
        +'</div>';
      }
      var failuresHtml = tf.failures ? '<div style="margin-top:10px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:4px">Failures / Malfunctions</div><p style="margin:0">'+esc(tf.failures)+'</p></div>' : '';
      var outcomeHtml = '';
      if(tf.outcome){
        var outcomeColorMap = {Accept:'#2d7a3e', Retest:'#c49a3e', Reject:'#a84343'};
        var oc = outcomeColorMap[tf.outcome] || '#4a5568';
        outcomeHtml = '<div style="margin-top:10px"><span style="display:inline-block;background:'+oc+';color:#fff;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase">'+esc(tf.outcome)+'</span></div>';
      }
      testFireHtml = '<div class="section"><h2>Test-Fire Validation</h2>'
        +tfDlHtml
        +groupsTableHtml
        +failuresHtml
        +outcomeHtml
      +'</div>';
    }
  }
  var ownerHtml = '';
  if(includeOwner){
    var hasOwner = (ownerProfile.name || ownerProfile.phone || ownerProfile.email);
    if(hasOwner){
      ownerHtml = '<div class="section"><h2>Owner Contact</h2>';
      if(ownerProfile.name)  ownerHtml += '<div>'+esc(ownerProfile.name)+'</div>';
      if(ownerProfile.phone) ownerHtml += '<div>'+esc(ownerProfile.phone)+'</div>';
      if(ownerProfile.email) ownerHtml += '<div>'+esc(ownerProfile.email)+'</div>';
      ownerHtml += '</div>';
    }
  }
  return '<div class="wo-card" style="page-break-inside:avoid;break-inside:avoid">'
    +'<div class="wo-banner">'
      +'<div class="wo-num">Work Order · '+esc(wo.wo_number||'')+'</div>'
      +'<div class="wo-status" style="background:'+statusColor+'">'+esc(wo.status||'')+'</div>'
    +'</div>'
    +'<div class="firearm">'
      +'<div class="name">'+esc(fmLine||'(unnamed firearm)')+'</div>'
      +(snDetails ? '<div class="details">'+esc(snDetails)+'</div>' : '')
    +'</div>'
    +safetyHtml
    +'<div class="section"><h2>Work Details</h2><dl class="kv">'
      +'<dt>Type</dt><dd>'+esc(wo.type||'')+'</dd>'
      +(wo.date ? '<dt>Date</dt><dd>'+esc(wo.date)+'</dd>' : '')
      +(wo.tech ? '<dt>Performed By</dt><dd>'+esc(wo.tech)+'</dd>' : '')
    +'</dl></div>'
    +(wo.notes ? '<div class="section"><h2>Notes</h2><p>'+esc(wo.notes)+'</p></div>' : '')
    +partsHtml
    +partsStructHtml
    +techHtml
    +testFireHtml
    +checklistHtml
    +photoHtml
    +ownerHtml
  +'</div>';
}

    includeOwner: !opts.omitPayload,
    ownerProfile: ownerProfile

      +'<div class="brand-sub">Private Armory Management</div>'
      +visible

function getStorageSuggestions(){
  var seen={};
  return guns.reduce(function(a,g){
    if(g.storageLocation&&!seen[g.storageLocation]){
      seen[g.storageLocation]=1;
      a.push(g.storageLocation);
    }
    return a;
  },[]).map(function(s){
    return '<option value="'+eh(s)+'"/>';
  }).join('');
}
function rnd(){
  if(QR_SCAN_MODE) return;
  var fab=document.getElementById('fab_add');
  if(fab) fab.style.display=(VIEW==='add')?'none':'flex';
  var backFab=document.getElementById('fab_back');
  if(backFab) backFab.style.display=(VIEW==='dashboard')?'none':'flex';
  var nav=document.getElementById('nav');
  nav.innerHTML='<div class="av-coll-row">'+rCollDropdown()+'</div>'+'<div class="av-tabs">'+'<button class="av-tab'+(VIEW==="dashboard"?' av-tab-active':'')+'" onclick="go(\'dashboard\')">&#9632; Dashboard</button>'+'<button class="av-tab'+(VIEW==="reports"?' av-tab-active':'')+'" onclick="go(\'reports\')">&#9778; Reports</button>'+'<button class="av-tab'+(VIEW==="list"?' av-tab-active':'')+'" onclick="go(\'list\')">&#9783; Inventory</button>'+'</div>';
  // Tear down modular detail view when navigating away
  if(VIEW!=='detail'&&window._arsenal){window._arsenal.destroyDetail();}
  if(VIEW==='dashboard')app.innerHTML=rDash();
  else if(VIEW==='list')app.innerHTML=rList();
  else if(VIEW==='add')app.innerHTML=rAdd();
  else if(VIEW==='detail'){
    // Use modular detail view if module system is loaded
    if(window._arsenal&&window._arsenal.ready){window._arsenal.openDetail(selId);}
    else{app.innerHTML=rDet();}
  }
  else if(VIEW==='reports')app.innerHTML=rReports();
  else if(VIEW==='pic')app.innerHTML=rPicturePage();
  else if(VIEW==='range')app.innerHTML=rRange();
  buildHamMenu();
  document.getElementById('photoIn').onchange=onPhoto;
  document.getElementById('photoInCam').onchange=onPhoto;
  document.getElementById('schIn').onchange=onSch;
  var imp=document.getElementById('importIn');if(imp)imp.onchange=restoreData;
}

function mCard(sys, lbl, val, valColor, foot, action){
  var vStr=String(val);
  var valCls='metric-value'+(vStr.length>6?' val-sm':vStr.length>4?' val-md':'');
  var cls='metric-card'+(action?' clickable':'');
  var click=action?' onclick="'+action+'"':'';
  return '<div class="'+cls+'"'+click+'>'
    +'<div class="metric-card-head">'
      +'<div class="metric-sys"><span class="metric-sys-dot"></span>'+sys+'</div>'
      +'<div class="metric-card-dots"><span class="metric-card-dot"></span><span class="metric-card-dot"></span><span class="metric-card-dot"></span></div>'
    +'</div>'
    +'<div class="metric-card-body">'
      +'<div class="metric-label">'+lbl+'</div>'
      +'<div class="'+valCls+'" style="color:'+valColor+'">'+val+'</div>'
    +'</div>'
    +'<div class="metric-card-foot">'
      +'<span class="metric-foot-lbl">'+foot+'</span>'
      +(action?'<span class="metric-foot-hint">&#9655;</span>':'')

function rDash(){
  var s=stats();
  var gain=s.totalValue-s.totalCost;
  var gainStr=(s.totalValue&&s.totalCost)?((gain>=0?'+':'')+fm(gain)):'\u2014';
  var collName=collections[activeCollection]?collections[activeCollection].name.toUpperCase():'MY COLLECTION';

  // ── Command Strip ──────────────────────────────────────────────────
  var cmdStrip='<div class="cmd-strip">'
    +'<div>'
      +'<span class="cmd-strip-label">Active Vault</span>'
      +'<span class="cmd-strip-name">'+eh(collName)+'</span>'
    +'</div>'
    +'<div class="cmd-strip-stats">'
      +'<span class="cmd-stat-num">'+s.total+'</span>'
      +'<span class="cmd-stat-lbl">Total</span>'
      +'<span class="cmd-sep">&middot;</span>'
      +'<span class="cmd-stat-num" style="color:var(--success)">'+s.working+'</span>'
      +'<span class="cmd-stat-lbl">Operational</span>'
      +(s.needsRepair?'<span class="cmd-sep">&middot;</span>'
        +'<span class="cmd-stat-num" style="color:var(--danger)">'+s.needsRepair+'</span>'
        +'<span class="cmd-stat-lbl">Service</span>':'')
      +(s.totalValue?'<span class="cmd-sep">&middot;</span>'
        +'<span class="cmd-stat-num">'+fm(s.totalValue)+'</span>'
        +'<span class="cmd-stat-lbl">Value</span>':'')
    +'</div>'
    +'</div>';

  // ── Metric Cards ───────────────────────────────────────────────────
  var cards=
    mCard('Asset Count','Total Firearms',s.total,'var(--gold)','Inventory Total',"goFilter('All','All')")
    +mCard('Readiness','Operational',s.working,'var(--success)','Active Status',"goFilter('Working','All')")
    +mCard('Service','Service Required',s.needsRepair,'var(--danger)','Attention Needed',"goFilter('Not Working','All')")
    +mCard('Market Value','Estimated Value',fm(s.totalValue),'var(--gold)','Current Market',null)
    +mCard('Cost Basis','Purchase Record',fm(s.totalCost)||'\u2014','var(--text-primary)','Acquisition Cost',null)
    +mCard('Gain / Loss','Value Change',gainStr,(gain>=0?'var(--success)':'var(--danger)'),'Appreciation',null)
    +mCard('Ammo Stock','Rounds on Hand',s.totalAmmo>0?s.totalAmmo.toLocaleString():'\u2014','#8EB4D8','Total Stock',null);

  // ── Breakdown Tabs ─────────────────────────────────────────────────
  var typeCounts={};
  TYPES.forEach(function(t){typeCounts[t]=0;});
  guns.forEach(function(g){
    if(g.type&&typeCounts[g.type]!==undefined)typeCounts[g.type]++;
    else if(g.type)typeCounts['Other']=(typeCounts['Other']||0)+1;
  });
  var typeCards=TYPES.filter(function(t){return typeCounts[t]>0;}).map(function(t){
    return '<div class="type-card" onclick="goFilter(\'All\',\'All\',\'\',\''+t+'\')"><div class="type-card-num">'+typeCounts[t]+'</div><div class="type-card-lbl">'+t+'</div></div>';
  }).join('');

  var condDist={};
  CONDITIONS.forEach(function(c){condDist[c]=0;});
  guns.forEach(function(g){if(condDist[g.condition]!==undefined)condDist[g.condition]++;});
  var condBar=CONDITIONS.filter(function(c){return condDist[c]>0;}).map(function(c){
    var pct=guns.length>0?Math.round((condDist[c]/guns.length)*100):0;
    var col=CC[c]||'#8a95a8';
    return '<div class="dash-cond-row">'
      +'<div class="dash-cond-lbl">'+c+'</div>'
      +'<div class="dash-cond-track">'
        +'<div class="dash-cond-fill" style="background:'+col+';width:'+pct+'%;min-width:'+(condDist[c]>0?'18px':'0')+'">'
          +'<span class="dash-cond-count">'+condDist[c]+'</span>'
        +'</div>'
      +'</div>'
      +'<div class="dash-cond-pct">'+pct+'%</div>'
    +'</div>';
  }).join('');

  var tabSection='<div class="av-dash-section"><div class="dash-panel">'
    +'<div class="dash-panel-head"><div class="dash-tabs">'
      +'<button class="dash-tab'+(dashTab==='types'?' active':'')+'\" onclick=\"dashTab=\'types\';rnd()\">By Type</button>'
      +'<button class="dash-tab'+(dashTab==='condition'?' active':'')+'\" onclick=\"dashTab=\'condition\';rnd()\">By Condition</button>'
    +'</div></div>'
    +'<div class="dash-panel-body">'
      +(dashTab==='types'
        ?(typeCards?'<div class="type-grid">'+typeCards+'</div>'
          :'<div class="dash-nodata">No Data</div>')
        :(condBar||'<div class="dash-nodata">No Data</div>'))
    +'</div>'
    +'</div></div>';

  // ── Starred ────────────────────────────────────────────────────────
  var starred=guns.filter(function(g){return g.starred;});
  var starredPanel=starred.length
    ?'<div class="av-dash-section"><div class="av-starred-panel">'
      +'<div class="av-starred-head"><span class="av-starred-title">&#9733; Starred</span>'
      +'<span class="dash-panel-count">'+starred.length+'</span></div>'
      +starred.map(function(g){
        return '<div class="av-starred-row" onclick="editGun(\''+g.id+'\')">'
          +'<div><div class="av-alert-gun">'+eh(g.make)+' '+eh(g.model)+'</div>'
          +'<div class="av-alert-cal">'+eh(g.caliber)+'</div></div>'
          +'<span class="av-starred-val">'+fm(g.currentValue)+'</span>'
          +'</div>';
      }).join('')
      +'</div></div>'
    :'';

  // ── Service Required ───────────────────────────────────────────────
  var broken=guns.filter(function(g){return !g.working;});
  var svcPanel=broken.length
    ?'<div class="av-dash-section"><div class="av-alert-panel">'
      +'<div class="av-alert-head"><span class="av-alert-title">&#9651; Service Required</span>'
      +'<span class="av-alert-count">'+broken.length+'</span></div>'
      +broken.map(function(g){
        return '<div class="av-alert-row" onclick="editGun(\''+g.id+'\')">'
          +'<div><div class="av-alert-gun">'+eh(g.make)+' '+eh(g.model)+'</div>'
          +'<div class="av-alert-cal">'+eh(g.caliber)+'</div></div>'
          +'<button class="btn-g btn-review" onclick="event.stopPropagation();editGun(\''+g.id+'\')">REVIEW</button>'
          +'</div>';
      }).join('')
      +'</div></div>'
    :'';

  // ── Overdue Cleaning ───────────────────────────────────────────────
  var today=new Date();
  var overdue=guns.filter(function(g){
    if(!g.lastCleaned)return false;
    return(today-new Date(g.lastCleaned))/(1000*60*60*24)>90;
  });
  var overduePanel=overdue.length
    ?'<div class="av-dash-section"><div class="av-alert-panel">'
      +'<div class="av-alert-head"><span class="av-alert-title">&#9661; Overdue Maintenance</span>'
      +'<span class="av-alert-count">'+overdue.length+'</span></div>'
      +overdue.map(function(g){
        var days=Math.floor((today-new Date(g.lastCleaned))/(1000*60*60*24));
        return '<div class="av-alert-row" onclick="editGun(\''+g.id+'\')">'
          +'<div><div class="av-alert-gun">'+eh(g.make)+' '+eh(g.model)+'</div>'
          +'<div class="av-alert-cal">'+eh(g.caliber)+'</div></div>'
          +'<span class="av-overdue-days">'+days+' days</span>'
          +'</div>';
      }).join('')
      +'</div></div>'
    :'';

  // ── Empty State ────────────────────────────────────────────────────
  var empty=guns.length?''
    :'<div class="av-empty">'
    +'<div class="av-empty-icon">&#11043;</div>'
    +'<div class="av-empty-title">Vault Empty</div>'
    +'<div class="av-empty-sub">No firearms logged.<br/>Tap Log Firearm to begin.</div>'
    +'</div>';

  return '<div class="av-dashboard">'
    +cmdStrip
    +'<div class="stat-grid">'+cards+'</div>'
    +tabSection
    +starredPanel
    +overduePanel
    +svcPanel
    +empty
    +'<div style="height:80px"></div>'
    +'</div>';
}

function collect(){
  var m={f_make:'make',f_model:'model',f_sn:'serialNumber',f_yr:'year',f_pp:'purchasePrice',f_cv:'currentValue',f_ins:'insuranceValue',f_rep:'repairNotes',f_mnt:'maintenanceLog',f_storage:'storageLocation',f_ammotype:'ammoType',f_ammocount:'ammoCount',f_ammoloc:'ammoLocation',f_cleaned:'lastCleaned',f_interval:'serviceInterval'};
  for(var k in m){var el=document.getElementById(k);if(el)FORM[m[k]]=el.value;}
  if(!FORM.photos)FORM.photos=FORM.photo?[FORM.photo]:[];
}

function doSave(){
  collect();
  if(!FORM.photos||!FORM.photos.length)FORM.photos=FORM.photo?[FORM.photo]:[];
  if(!FORM.make||!FORM.model){toast('Make and Model are required','err');return;}
  if(editId){
    var updated=Object.assign({},FORM,{id:editId});
    guns=guns.map(function(g){return g.id===editId?updated:g;});
    if(window._arsenal&&window._arsenal.updateFirearm){window._arsenal.updateFirearm(editId,updated);}
    toast('Firearm updated');haptic('save');
  }
  else{
    var newId=gid();
    var initCoc=[{
      id:'coc_'+Date.now(),
      type:'Created in Inventory',
      date:new Date().toISOString().split('T')[0],
      notes:'Firearm added to ArsenalDB',
      autoLogged:true
    }];
    var newGun=Object.assign({},FORM,{id:newId,custody:initCoc});
    guns.push(newGun);
    if(window._arsenal&&window._arsenal.createFirearm){window._arsenal.createFirearm(newGun);}
    toast('Added to inventory');haptic('save');

  sv();checkMilestones('save');FORM=ef();editId=null;aiVal=null;aiDiag=null;VIEW='list';rnd();
}

function deleteGun(id){
  if(!confirm('Delete this firearm from inventory?'))return;
  guns=guns.filter(function(g){return g.id!==id;});
  if(window._arsenal&&window._arsenal.deleteFirearm){window._arsenal.deleteFirearm(id);}

  sv();haptic('delete');toast('Firearm deleted');VIEW='list';rnd();

// REPORT-T12 helpers (inline-checkbox model — picker modal removed v2).
// Pool = the set of firearms relevant to the current report tab.
// Custody tab: only guns that actually have custody records or are transferred (picking a
// gun with no records would be meaningless — it has nothing to report on).
// Ins/Theft: all active guns.
function _reportPool(){
  if(reportTab==='custody'){
    var withRecords=guns.filter(function(g){return g.custody&&g.custody.length>0;});
    return withRecords.concat(transferredGuns||[]);
  }
  return guns.slice();
}
// Is a given gun currently selected? null === all selected (default).
function _isSelected(gunId){
  return reportSelection===null || reportSelection.has(gunId);
}
// Toggle one gun's inclusion. Collapses to null when result equals full pool.
function _toggleReportSelection(gunId){
  var pool=_reportPool();
  if(reportSelection===null){
    // All currently selected -> deselect this one
    reportSelection=new Set();
    for(var i=0;i<pool.length;i++){
      if(pool[i].id!==gunId) reportSelection.add(pool[i].id);
    }
  } else if(reportSelection.has(gunId)){
    reportSelection.delete(gunId);
  } else {
    reportSelection.add(gunId);
    // If we now have everything, collapse back to null (clean default state)
    if(reportSelection.size===pool.length){
      var all=true;
      for(var j=0;j<pool.length;j++){
        if(!reportSelection.has(pool[j].id)){ all=false; break; }
      }
      if(all) reportSelection=null;
    }
  }
  haptic('light');
  rnd();
}
// Bulk: Select All -> null (default); Deselect All -> empty Set
function _setAllReportSelection(check){
  reportSelection = check ? null : new Set();
  haptic('light');
  rnd();
}

// ── WHAT'S MY COLLECTION WORTH ────────────────────────────────────────
function rWorth(){
  var s=stats();
  var gain=s.totalValue-s.totalCost;
  var gainPct=s.totalCost>0?((gain/s.totalCost)*100).toFixed(1):0;
  var topGun=guns.reduce(function(best,g){
    var v=parseFloat(g.currentValue)||0;
    return v>(parseFloat(best.currentValue)||0)?g:best;
  },{currentValue:0});
  var mostGain=guns.reduce(function(best,g){
    var v=(parseFloat(g.currentValue)||0)-(parseFloat(g.purchasePrice)||0);
    var b=(parseFloat(best.currentValue)||0)-(parseFloat(best.purchasePrice)||0);
    return v>b?g:best;
  },{currentValue:0,purchasePrice:0});

  // Type breakdown values
  var typeVals={};
  TYPES.forEach(function(t){typeVals[t]=0;});
  guns.forEach(function(g){
    if(g.type&&typeVals[g.type]!==undefined) typeVals[g.type]+=(parseFloat(g.currentValue)||0);
  });

  var typeRows=TYPES.filter(function(t){return typeVals[t]>0;}).sort(function(a,b){return typeVals[b]-typeVals[a];}).map(function(t){
    return '<div class="maint-row"><span style="color:#c0c8d8;font-weight:600">'+t+'s</span><span style="color:#e8c46a;font-weight:700">'+fm(typeVals[t])+'</span></div>';
  }).join('');

  return '<div class="worth-card">'
    +'<div style="font-size:13px;color:#8a95a8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Total Collection Value</div>'
    +'<div class="worth-total">'+fm(s.totalValue)+'</div>'
    +'<div style="display:flex;justify-content:center;gap:30px;margin-top:14px">'
      +'<div style="text-align:center"><div style="font-size:12px;color:#8a95a8">Cost Basis</div><div style="font-size:18px;font-weight:700;color:#f0f2f5">'+fm(s.totalCost)+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:12px;color:#8a95a8">Gain / Loss</div><div style="font-size:18px;font-weight:700;color:'+(gain>=0?'#60e880':'#ff7070')+'">'+(gain>=0?'+':'')+fm(gain)+'</div></div>'
      +'<div style="text-align:center"><div style="font-size:12px;color:#8a95a8">Return</div><div style="font-size:18px;font-weight:700;color:'+(gain>=0?'#60e880':'#ff7070')+'">'+(gain>=0?'+':'')+gainPct+'%</div></div>'
    +'</div>'
    +'</div>'
    +'<div class="panel">'
      +'<div class="sec-title">&#128081; Collection Stats</div>'
      +'<div class="maint-row"><span style="color:#c0c8d8;font-weight:600">Total Firearms</span><span style="color:#e8c46a;font-weight:700">'+s.total+'</span></div>'

// ── MAINTENANCE / CLEANING SCHEDULE ──────────────────────────────────
function rMaint(){
  var today=new Date();
  var withDates=[];var noDates=[];
  guns.forEach(function(g){
    if(g.lastCleaned){
      var days=Math.floor((today-new Date(g.lastCleaned))/(1000*60*60*24));
      withDates.push({g:g,days:days});
    } else {
      noDates.push(g);
    }
  });
  withDates.sort(function(a,b){return b.days-a.days;}); // Most overdue first

  var rows=withDates.map(function(item){
    var g=item.g; var days=item.days;
    var cls=days>90?'maint-days-over':days>30?'maint-days-warn':'maint-days-ok';
    var icon=days>90?'&#128308;':days>30?'&#128993;':'&#128994;';
    var txt=days===0?'Today':days===1?'Yesterday':days+' days ago';
    return '<div class="maint-row" onclick="editGun(\''+g.id+'\')" style="cursor:pointer">'
      +'<div>'
        +'<div style="font-weight:700;color:#f0f2f5;font-size:14px">'+icon+' '+eh(g.make)+' '+eh(g.model)+'</div>'
        +'<div style="font-size:12px;color:#8a95a8;margin-top:2px">'+eh(g.caliber)+(g.storageLocation?' &middot; '+eh(g.storageLocation):'')+'</div>'
      +'</div>'
      +'<div style="text-align:right">'
        +'<div class="'+cls+'">'+txt+'</div>'
        +(days>90?'<div style="font-size:11px;color:#ff7070">Needs cleaning!</div>':days>30?'<div style="font-size:11px;color:#ffd060">Due soon</div>':'<div style="font-size:11px;color:#60e880">Good</div>')+'<button onclick="logCleaning(\''+g.id+'\')" style="margin-top:6px;background:#1a2e1a;border:1px solid #60e88060;color:#60e880;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">&#10003; Log Cleaning</button>'
      +'</div>'
    +'</div>';
  }).join('');

  var noDateRows=noDates.map(function(g){
    return '<div class="maint-row" onclick="editGun(\''+g.id+'\')" style="cursor:pointer">'
      +'<div><div style="font-weight:700;color:#f0f2f5;font-size:14px">&#9898; '+eh(g.make)+' '+eh(g.model)+'</div>'
      +'<div style="font-size:12px;color:#8a95a8;margin-top:2px">'+eh(g.caliber)+'</div></div>'
      +'<div style="text-align:right"><div style="color:#8a95a8;font-size:13px">Never recorded</div><button onclick="logCleaning(\''+g.id+'\')" style="margin-top:6px;background:#1a2e1a;border:1px solid #60e88060;color:#60e880;padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">&#10003; Log Cleaning</button></div>'
    +'</div>';
  }).join('');

  var overdue=withDates.filter(function(x){return x.days>90;}).length;
  var due=withDates.filter(function(x){return x.days>30&&x.days<=90;}).length;
  var ok=withDates.filter(function(x){return x.days<=30;}).length;

  return '<div class="panel" style="border-color:#e8c46a40">'
    +'<div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">'
      +'<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:#ff7070">'+overdue+'</div><div style="font-size:11px;color:#8a95a8;text-transform:uppercase">Overdue</div></div>'
      +'<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:#ffd060">'+due+'</div><div style="font-size:11px;color:#8a95a8;text-transform:uppercase">Due Soon</div></div>'
      +'<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:#60e880">'+ok+'</div><div style="font-size:11px;color:#8a95a8;text-transform:uppercase">Good</div></div>'
      +'<div style="text-align:center"><div style="font-size:24px;font-weight:800;color:#8a95a8">'+noDates.length+'</div><div style="font-size:11px;color:#8a95a8;text-transform:uppercase">Not Logged</div></div>'
    +'</div>'
    +'<div style="font-size:11px;color:#4a5568">Tap any firearm to log a cleaning date</div>'
    +'</div>'
    +(rows?'<div class="panel"><div class="sec-title">&#128197; Cleaning Log</div>'+rows+'</div>':'')
    +(noDateRows?'<div class="panel"><div class="sec-title" style="color:#8a95a8">No Date Recorded</div>'+noDateRows+'</div>':'');
}

// ── LICENSE (LemonSqueezy) ────────────────────────────────────────────
// Client-side license validation. No backend — periodic revalidation is
// the security model. Fill in the IDs below after LS activates your store
// and you create the Pro / Pro+ products in the dashboard.
var LS_API_BASE           = 'https://api.lemonsqueezy.com';
var LS_API_PROXY          = 'https://api-cors-anywhere.lemonsqueezy.com';
var LS_STORE_ID           = null;   // e.g. 123456 — fill in after LS activation
var LS_PRO_PRODUCT_ID     = null;   // e.g. 789012 — fill in after Pro product created
var LS_PROPLUS_PRODUCT_ID = null;   // e.g. 789013 — fill in after Pro+ product created
var LS_REVALIDATE_HOURS   = 24;     // re-check cached license every N hours

// Map LS product_id → tier. Returns null if product doesn't match ours.
// With all IDs null (pre-launch), this always returns null, which means
// activation always fails safely until the constants are filled in.
function _lsProductTier(productId){
  if(LS_PRO_PRODUCT_ID     && productId===LS_PRO_PRODUCT_ID)     return 'pro';
  if(LS_PROPLUS_PRODUCT_ID && productId===LS_PROPLUS_PRODUCT_ID) return 'proplus';
  return null;
}

// Low-level fetch: try direct URL, fall back to LS's own CORS proxy on
// network error. Returns parsed JSON or throws.
function _lsFetch(path, body){
  var opts = {
    method:  'POST',
    headers: {
      'Accept':       'application/json',
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body: body
  };
  return fetch(LS_API_BASE + path, opts)
    .then(function(r){ return r.json(); })
    .catch(function(){
      return fetch(LS_API_PROXY + path, opts).then(function(r){ return r.json(); });
    });
}

// Activate a license key. Called by Settings UI when user pastes a key.
// Returns Promise<{ok, tier, error}>.
function _lsActivate(licenseKey){
  if(!licenseKey || typeof licenseKey !== 'string'){
    return Promise.resolve({ok:false, tier:null, error:'No license key provided'});
  }
  licenseKey = licenseKey.trim();
  var instanceName = 'ArsenalDB-' + licenseKey.slice(0,8);
  var body = 'license_key=' + encodeURIComponent(licenseKey)
           + '&instance_name=' + encodeURIComponent(instanceName);

  return _lsFetch('/v1/licenses/activate', body).then(function(data){
    if(!data || data.activated !== true){
      return {ok:false, tier:null, error: (data && data.error) || 'Activation failed'};
    }
    // B1: verify store_id matches ours (prevents keys from other LS sellers)
    if(LS_STORE_ID && data.meta && data.meta.store_id !== LS_STORE_ID){
      return {ok:false, tier:null, error:'License key is not for ArsenalDB'};
    }
    // B1/B2: verify product_id maps to one of our tiers
    var tier = _lsProductTier(data.meta && data.meta.product_id);
    if(!tier){
      return {ok:false, tier:null, error:'License key is not for ArsenalDB'};
    }
    // All checks passed — persist license state
    appSettings.licenseKey        = licenseKey;
    appSettings.licenseInstanceId = (data.instance && data.instance.id) || null;
    appSettings.licenseStatus     = (data.license_key && data.license_key.status) || 'active';
    appSettings.licenseEmail      = (data.meta && data.meta.customer_email) || null;
    appSettings.licenseLastCheck  = new Date().toISOString();
    appSettings.tier              = tier;
    saveSettings();
    return {ok:true, tier:tier, error:null};
  }).catch(function(){
    return {ok:false, tier:null, error:'Network error — check your connection'};
  });
}

// Validate the currently-saved license. Updates tier based on server response.
// Returns Promise<{ok, status, error, offline}>.
function _lsValidate(){
  var key = appSettings.licenseKey;
  var instanceId = appSettings.licenseInstanceId;
  if(!key || !instanceId){
    return Promise.resolve({ok:false, status:null, error:'No license to validate', offline:false});
  }
  var body = 'license_key=' + encodeURIComponent(key)
           + '&instance_id=' + encodeURIComponent(instanceId);

  return _lsFetch('/v1/licenses/validate', body).then(function(data){
    if(!data){
      return {ok:false, status:null, error:'Empty response', offline:false};
    }
    // B1: verify store/product still match (defense against dashboard changes)
    if(LS_STORE_ID && data.meta && data.meta.store_id !== LS_STORE_ID){
      appSettings.tier = 'free';
      appSettings.licenseLastCheck = new Date().toISOString();
      saveSettings();
      return {ok:false, status:'invalid', error:'License no longer valid', offline:false};
    }
    var serverStatus = (data.license_key && data.license_key.status) || null;
    var tier = _lsProductTier(data.meta && data.meta.product_id);

    // Active + matches our product → confirm tier, cache check time
    if(data.valid === true && serverStatus === 'active' && tier){
      appSettings.licenseStatus    = 'active';
      appSettings.tier             = tier;
      appSettings.licenseLastCheck = new Date().toISOString();
      saveSettings();
      return {ok:true, status:'active', error:null, offline:false};
    }
    // B7: silent downgrade — server says disabled/expired/invalid
    appSettings.licenseStatus    = serverStatus || 'inactive';
    appSettings.tier             = 'free';
    appSettings.licenseLastCheck = new Date().toISOString();
    saveSettings();
    return {ok:false, status:serverStatus, error: data.error || 'License not active', offline:false};
  }).catch(function(){
    // B5: network error — keep cached state, don't downgrade
    return {ok:false, status:null, error:'Offline', offline:true};
  });
}

// Called on app boot (wired in Tranche E). Silently revalidates if we have
// a key and last check was >LS_REVALIDATE_HOURS ago. Non-blocking.
function _revalidateLicense(){
  if(!appSettings.licenseKey || !appSettings.licenseInstanceId){
    return Promise.resolve({ok:false, skipped:true, reason:'no-license'});
  }
  // B6: skip only if last check was recent AND status was active.
  // Non-active statuses re-check every boot so recovery is fast.
  if(appSettings.licenseLastCheck && appSettings.licenseStatus === 'active'){
    var last  = new Date(appSettings.licenseLastCheck).getTime();
    var ageMs = Date.now() - last;
    var maxMs = LS_REVALIDATE_HOURS * 3600 * 1000;
    if(!isNaN(last) && ageMs < maxMs){
      return Promise.resolve({ok:true, skipped:true, reason:'cached'});
    }
  }
  return _lsValidate();
}

var _magStream=null;
var _magTrack=null;
var _magFrozen=false;
var _magTorchOn=false;
var _magGridOn=false;
var _magZoom=2;

function magStart(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}}).then(function(stream){
    _magStream=stream;
    _magTrack=stream.getVideoTracks()[0];
    var video=document.getElementById('mag_video');
    if(!video){stream.getTracks().forEach(function(t){t.stop();});return;}
    video.srcObject=stream;
    video.play();
    magSetZoom(_magZoom);
    magDrawGrid();
  }).catch(function(){
    toast('Camera access denied or unavailable','err');
    closeMagnifier();
  });
}

function magSetZoom(val){
  _magZoom=parseFloat(val);
  var label=document.getElementById('mag_zoom_label');
  if(label) label.textContent=_magZoom+'x';
  var video=document.getElementById('mag_video');
  if(!video) return;
  video.style.transform='scale('+_magZoom+')';
  video.style.transformOrigin='center center';
  if(_magTrack){
    try{
      var caps=_magTrack.getCapabilities?_magTrack.getCapabilities():{};
      if(caps.zoom){
        var hw=Math.min(caps.zoom.max,Math.max(caps.zoom.min,_magZoom));
        _magTrack.applyConstraints({advanced:[{zoom:hw}]});
      }
    }catch(e){}
  }
}

function magDrawGrid(){
  var canvas=document.getElementById('mag_grid');
  if(!canvas) return;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(96,232,192,0.35)';
  ctx.lineWidth=0.5;
  var sx=Math.round(canvas.width/12);
  for(var x=0;x<canvas.width;x+=sx){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
  var sy=Math.round(canvas.height/18);
  for(var y=0;y<canvas.height;y+=sy){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
  ctx.strokeStyle='rgba(96,232,192,0.7)';
  ctx.lineWidth=1;
  var cx=canvas.width/2,cy=canvas.height/2;
  ctx.beginPath();ctx.moveTo(cx-20,cy);ctx.lineTo(cx+20,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-20);ctx.lineTo(cx,cy+20);ctx.stroke();
}

function magToggleGrid(){
  _magGridOn=!_magGridOn;
  var canvas=document.getElementById('mag_grid');
  if(canvas) canvas.style.opacity=_magGridOn?'1':'0';
  var btn=document.getElementById('mag_grid_btn');
  if(btn){btn.style.color=_magGridOn?'#60e8c0':'#d0d8e8';btn.style.borderColor=_magGridOn?'rgba(96,232,192,0.5)':'rgba(255,255,255,0.15)';}
}

function magToggleTorch(){
  if(!_magTrack){toast('Camera not ready','err');return;}
  var caps=_magTrack.getCapabilities?_magTrack.getCapabilities():{};
  if(!caps.torch){toast('Flashlight not supported on this device');return;}
  _magTorchOn=!_magTorchOn;
  _magTrack.applyConstraints({advanced:[{torch:_magTorchOn}]}).catch(function(){
    toast('Could not toggle flashlight','err');_magTorchOn=false;
  });
  var btn=document.getElementById('mag_torch_btn');
  if(btn){btn.style.color=_magTorchOn?'#ffd060':'#d0d8e8';btn.style.borderColor=_magTorchOn?'rgba(255,208,96,0.5)':'rgba(255,255,255,0.15)';}
}

function magFreeze(){
  var video=document.getElementById('mag_video');
  var fc=document.getElementById('mag_freeze');
  var fb=document.getElementById('mag_frozen_bar');
  if(!video||!fc) return;
  if(_magFrozen){magResume();return;}
  _magFrozen=true;
  fc.width=video.videoWidth||window.innerWidth;
  fc.height=video.videoHeight||window.innerHeight;
  var ctx=fc.getContext('2d');
  var sw=video.videoWidth,sh=video.videoHeight;
  var cw=sw/_magZoom,ch=sh/_magZoom;
  ctx.drawImage(video,(sw-cw)/2,(sh-ch)/2,cw,ch,0,0,fc.width,fc.height);
  fc.style.display='block';
  video.style.display='none';
  if(fb) fb.style.display='block';
  var btn=document.getElementById('mag_freeze_btn');
  if(btn) btn.style.borderColor='#e8c46a';
}

function magResume(){
  _magFrozen=false;
  var video=document.getElementById('mag_video');
  var fc=document.getElementById('mag_freeze');
  var fb=document.getElementById('mag_frozen_bar');
  if(video) video.style.display='block';
  if(fc) fc.style.display='none';
  if(fb) fb.style.display='none';
  var btn=document.getElementById('mag_freeze_btn');
  if(btn) btn.style.borderColor='#60e8c0';
}

function magSaveToGun(){
  var fc=document.getElementById('mag_freeze');
  if(!fc||!selId) return;
  var g=guns.find(function(x){return x.id===selId;});
  if(!g){toast('No active gun record','err');return;}
  var dataUrl=fc.toDataURL('image/jpeg',0.85);
  if(!g.photos) g.photos=[];
  if(g.photo&&!g.photos.length) g.photos=[g.photo];
  g.photos.push(dataUrl);
  g.photo=g.photos[0];
  guns=guns.map(function(x){return x.id===selId?g:x;});
  sv();
  toast('Photo saved to '+g.make+' '+g.model);
  closeMagnifier();
}

function closeMagnifier(){
  if(_magTorchOn&&_magTrack){
    try{_magTrack.applyConstraints({advanced:[{torch:false}]});}catch(e){}
    _magTorchOn=false;
  }
  if(_magStream){_magStream.getTracks().forEach(function(t){t.stop();});_magStream=null;_magTrack=null;}
  _magFrozen=false;_magGridOn=false;_magZoom=2;
  var m=document.getElementById('magnifier_modal');
  if(m) m.remove();
}

function haptic(type){
  if(!appSettings.haptic) return;
  if(!navigator.vibrate) return;
  if(type==='save') navigator.vibrate(40);
  else if(type==='delete') navigator.vibrate([30,20,30]);
  else if(type==='error') navigator.vibrate([50,30,50]);
  else if(type==='star') navigator.vibrate(25);
  else if(type==='light') navigator.vibrate(20);
  else navigator.vibrate(30);
}

  if(fmodel && fmodel.value !== g.model) return true;

}

function toggleBulkSelect(id){
  var idx=bulkSelected.indexOf(id);
  if(idx>=0) bulkSelected.splice(idx,1);
  else bulkSelected.push(id);
  // Update checkbox visual without full re-render
  var cb=document.getElementById('bulk_'+id);
  if(cb) cb.checked=bulkSelected.indexOf(id)>=0;
  var countEl=document.getElementById('bulk_count');
  if(countEl) countEl.textContent=bulkSelected.length+' selected';
}

function applyBulkEdit(){
  var storage=document.getElementById('bulk_storage').value.trim();
  var cond=document.getElementById('bulk_cond').value;
  var working=document.getElementById('bulk_working').value;
  var cleaned=document.getElementById('bulk_cleaned').value;

  if(!storage&&!cond&&!working&&!cleaned){
    toast('Fill in at least one field to update','err');
    return;
  }

  var count=0;
  guns=guns.map(function(g){
    if(bulkSelected.indexOf(g.id)<0) return g;
    var updated=Object.assign({},g);
    if(storage) updated.storageLocation=storage;
    if(cond) updated.condition=cond;
    if(working==='true') updated.working=true;
    else if(working==='false') updated.working=false;
    if(cleaned) updated.lastCleaned=cleaned;
    count++;
    return updated;
  });

  sv();
  haptic('save');
  var m=document.getElementById('bulk_modal');
  if(m) m.remove();
  bulkMode=false;
  bulkSelected=[];
  toast('Updated '+count+' firearm'+(count!==1?'s':''));
  rnd();
}


// ── MILESTONES ────────────────────────────────────────────────────────
var milestones = {};
var totalCleanings = 0;

function loadMilestones(){
  try{
    var m=localStorage.getItem('av_milestones');
    if(m) milestones=JSON.parse(m);
    var c=localStorage.getItem('av_cleanings');
    if(c) totalCleanings=parseInt(c)||0;
  }catch(e){}
}

function saveMilestones(){
  try{
    localStorage.setItem('av_milestones',JSON.stringify(milestones));
    localStorage.setItem('av_cleanings',String(totalCleanings));
  }catch(e){}
}

function checkMilestones(trigger){
  var s=stats();
  var checks=[];

  // Collection size milestones
  var sizeMilestones=[1,10,25,50,100,150,200,250,300];
  sizeMilestones.forEach(function(n){
    var key='size_'+n;
    if(s.total>=n&&!milestones[key]){
      milestones[key]=new Date().toISOString();
      if(n===1) checks.push({icon:'🎯',title:'First Firearm',text:'Welcome to ArsenalDB!',sub:'Your collection journey begins'});
      else if(n===300) checks.push({icon:'🏆',title:'The Arsenal',text:'300 Firearms!',sub:'An extraordinary collection'});
      else checks.push({icon:'🔫',title:'Collection Milestone',text:n+' Firearms!',sub:'Your arsenal grows stronger'});
    }
  });

  // Value milestones
  var valueMilestones=[10000,25000,50000,100000,250000,500000];
  valueMilestones.forEach(function(v){
    var key='value_'+v;
    if(s.totalValue>=v&&!milestones[key]){
      milestones[key]=new Date().toISOString();
      checks.push({icon:'💰',title:'Value Milestone',text:'$'+v.toLocaleString()+' Collection',sub:'Your collection is worth a fortune'});
    }
  });

  // Cleaning milestones
  var cleanMilestones=[1,10,25,50,100,250,500];
  cleanMilestones.forEach(function(n){
    var key='clean_'+n;
    if(totalCleanings>=n&&!milestones[key]){
      milestones[key]=new Date().toISOString();
      if(n===1) checks.push({icon:'✨',title:'First Cleaning Logged',text:'Maintenance Begins',sub:'A well-maintained collection lasts generations'});
      else checks.push({icon:'🧹',title:'Maintenance Master',text:n+' Cleanings Logged!',sub:'Keeping your arsenal in top condition'});
    }
  });

  // Documentation milestones
  if(trigger==='save'){
    var allSerial=guns.length>0&&guns.every(function(g){return g.serialNumber;});
    if(allSerial&&!milestones['all_serial']&&guns.length>=5){
      milestones['all_serial']=new Date().toISOString();
      checks.push({icon:'📋',title:'Fully Documented',text:'All Serials Recorded',sub:'Complete documentation for every firearm'});
    }
    var allStorage=guns.length>0&&guns.every(function(g){return g.storageLocation;});
    if(allStorage&&!milestones['all_storage']&&guns.length>=5){
      milestones['all_storage']=new Date().toISOString();
      checks.push({icon:'🗄️',title:'Fully Organized',text:'All Storage Locations Set',sub:'You know exactly where everything is'});
    }
    var allInsured=guns.length>0&&guns.every(function(g){return g.insuranceValue||g.currentValue;});
    if(allInsured&&!milestones['all_insured']&&guns.length>=5){
      milestones['all_insured']=new Date().toISOString();
      checks.push({icon:'🛡️',title:'Fully Covered',text:'All Firearms Valued',sub:'Your collection is ready for insurance'});
    }
  }

  saveMilestones();

  // Show milestones one at a time with delay
  if(checks.length>0){
    haptic('save');
    showMilestoneQueue(checks, 0);
  }
}

function showMilestoneQueue(queue, idx){
  if(idx>=queue.length) return;
  showMilestoneToast(queue[idx], function(){
    setTimeout(function(){ showMilestoneQueue(queue, idx+1); }, 400);
  });
}

function showMilestoneToast(m, cb){
  // Remove any existing
  var old=document.getElementById('milestone_toast');
  if(old) old.remove();

  var toast=document.createElement('div');
  toast.id='milestone_toast';
  toast.className='milestone-toast';
  toast.innerHTML=
    '<span class="milestone-icon">'+m.icon+'</span>'
    +'<div class="milestone-title">'+m.title+'</div>'
    +'<div class="milestone-text">'+m.text+'</div>'
    +'<div class="milestone-sub">'+m.sub+'</div>'
    +'<button onclick="this.parentNode.remove()" style="margin-top:16px;background:#e8c46a20;border:1px solid #e8c46a60;color:#e8c46a;padding:8px 20px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.06em">NICE ✓</button>';

  // Add confetti pieces
  var colors=['#e8c46a','#60e880','#a0c0ff','#ffd060','#ff9040'];
  for(var i=0;i<8;i++){
    var c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText='background:'+colors[i%colors.length]+';left:'+(10+i*10)+'%;top:10%;animation-delay:'+(i*0.1)+'s;animation-duration:'+(0.6+Math.random()*0.4)+'s';
    toast.appendChild(c);
  }

  document.body.appendChild(toast);
  haptic('save');

  // Animate in
  setTimeout(function(){toast.classList.add('show');},50);

  // Auto dismiss after 4 seconds
  var timer=setTimeout(function(){
    toast.classList.remove('show');
    toast.classList.add('hide');
    setTimeout(function(){if(toast.parentNode)toast.remove();if(cb)cb();},350);
  },4000);

  // Manual dismiss clears timer
  toast.querySelector('button').onclick=function(){
    clearTimeout(timer);
    toast.classList.remove('show');
    toast.classList.add('hide');
    setTimeout(function(){if(toast.parentNode)toast.remove();if(cb)cb();},350);
  };
}

// ── CLEANING ANIMATION ────────────────────────────────────────────────
function logCleaning(id){
  var today=new Date().toISOString().split('T')[0];
  guns=guns.map(function(g){
    return g.id===id?Object.assign({},g,{lastCleaned:today}):g;
  });
  totalCleanings++;
  sv();
  saveMilestones();
  haptic('save');
  showCleanAnimation();
  checkMilestones('clean');
  rnd();
}

function showCleanAnimation(){
  var old=document.getElementById('clean_anim');
  if(old) old.remove();

  var anim=document.createElement('div');
  anim.id='clean_anim';
  anim.className='clean-anim';
  anim.innerHTML=
    '<div style="background:linear-gradient(135deg,#1a2e1a,#1a1d24);border:3px solid #60e880;border-radius:50%;width:100px;height:100px;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 0 30px #60e88060" class="pulse">'

    +'</div>';

  setTimeout(function(){anim.classList.add('show');},50);
  setTimeout(function(){
    anim.classList.remove('show');
    anim.classList.add('hide');
    setTimeout(function(){if(anim.parentNode)anim.remove();},300);
  },1500);
}

// ── AUDIO UNLOCK ─────────────────────────────────────────────────────
// Mobile browsers block audio until first user gesture
function unlockAudio(){
  if(_rackAudio) return;
  initRackSound();
  // Play silent buffer to unlock
  if(_rackAudio){
    _rackAudio.volume=0;
    _rackAudio.play().then(function(){
      _rackAudio.pause();
      _rackAudio.currentTime=0;
      _rackAudio.volume=0.8;
    }).catch(function(){});
  }
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}

function playRack(){
  if(!appSettings.sounds) return;
  try{
    if(!_rackAudio) initRackSound();
    if(_rackAudio){
      _rackAudio.currentTime=0;
      _rackAudio.play().catch(function(){
        _rackAudio=null;
        initRackSound();
        if(_rackAudio) setTimeout(function(){_rackAudio.play().catch(function(){});},50);
      });
    }
  }catch(e){}
}


function rebuildQR(){

  if(m) m.remove();

}


// ── NFC TAG SUPPORT ───────────────────────────────────────────────────
function checkNFCSupport(){
  return 'NDEFReader' in window;
}

async function writeNFCTag(id){
  var g=guns.find(function(x){return x.id===id;});if(!g)return;

  if(!checkNFCSupport()){
    toast('NFC not supported on this device','err');
    return;
  }

  // Build the same URL we use for QR codes
  var shareData={
    make:g.make,model:g.model,type:g.type,caliber:g.caliber,
    serialNumber:g.serialNumber,year:g.year,condition:g.condition,
    working:g.working,storageLocation:g.storageLocation,
    currentValue:g.currentValue,insuranceValue:g.insuranceValue,
    lastCleaned:g.lastCleaned,ammoType:g.ammoType,ammoCount:g.ammoCount,
    maintenanceLog:g.maintenanceLog,repairNotes:g.repairNotes
  };
  var encoded='';
  try{encoded=btoa(unescape(encodeURIComponent(JSON.stringify(shareData))));}catch(e){}
  var nfcUrl='https://arsenaldb.com/app.html'+(encoded?'?view='+encoded:'');

  // Show NFC write modal
  var modal=document.createElement('div');
  modal.id='nfc_modal';
  modal.style.cssText='position:fixed;inset:0;background:#000000cc;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML='<div style="background:#222835;border:2px solid #a0c0ff40;border-radius:12px;padding:28px;max-width:300px;width:100%;text-align:center">'
    +'<div style="font-size:40px;margin-bottom:12px" id="nfc_icon">📡</div>'
    +'<div style="font-size:16px;font-weight:700;color:#a0c0ff;margin-bottom:8px">Write NFC Tag</div>'
    +'<div style="font-size:13px;color:#8a95a8;margin-bottom:20px;line-height:1.6" id="nfc_status">Hold your phone to an NFC tag to write it.<br><br><span style="color:#e8c46a">'+eh(g.make)+' '+eh(g.model)+'</span></div>'
    +'<div style="font-size:11px;color:#3a4455;margin-bottom:16px">Anyone who taps an NFC-enabled phone to this tag will see all firearm details</div>'
    +'<button onclick="cancelNFC()" style="width:100%;background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:11px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>'
    +'</div>';
  modal.onclick=function(e){if(e.target===modal){cancelNFC();}};
  document.body.appendChild(modal);

  // Start NFC write
  try{
    window._nfcController=new AbortController();
    var ndef=new NDEFReader();
    await ndef.write(
      {records:[{recordType:'url',data:nfcUrl}]},
      {signal:window._nfcController.signal}
    );
    // Success
    document.getElementById('nfc_icon').textContent='✅';
    document.getElementById('nfc_status').innerHTML='<span style="color:#60e880;font-weight:700">NFC Tag Written!</span><br><br>Tap any NFC-enabled phone to this tag to view all firearm details.';
    haptic('save');
    toast('NFC tag written successfully!');
    setTimeout(function(){
      var m=document.getElementById('nfc_modal');
      if(m)m.remove();
    },2500);
  }catch(err){
    if(err.name==='AbortError') return;
    document.getElementById('nfc_icon').textContent='❌';
    document.getElementById('nfc_status').innerHTML='<span style="color:#ff7070">Write failed</span><br><br>'+err.message;
    haptic('error');
  }
}

function cancelNFC(){
  if(window._nfcController) window._nfcController.abort();
  var m=document.getElementById('nfc_modal');
  if(m)m.remove();
}

// Check for NFC scan on app launch (tap-to-open)
function checkNFCScan(){
  if(!checkNFCSupport()) return;
  try{
    var ndef=new NDEFReader();
    ndef.scan().then(function(){
      ndef.addEventListener('reading',function(event){
        var rec=event.message.records[0];
        if(rec&&rec.recordType==='url'){
          var url=new TextDecoder().decode(rec.data);
          if(url.indexOf('arsenaldb.com')>=0){
            var params=new URLSearchParams(url.split('?')[1]||'');
            var viewData=params.get('view');
            if(viewData){
              try{
                var g=JSON.parse(decodeURIComponent(atob(viewData)));
                showQRView(g);
              }catch(e){}
            }
          }
        }
      });
    }).catch(function(){});
  }catch(e){}
}

var CUSTODY_TYPES=['Sale','Gift','Loan','Consignment','Repair','Return','Inheritance','Storage Change','Location Change','Other'];

function loadTransferred(){
  try{
    var s=localStorage.getItem('av_transferred');
    if(s) transferredGuns=JSON.parse(s);
  }catch(e){}
}

function saveTransferred(){
  try{localStorage.setItem('av_transferred',JSON.stringify(transferredGuns));}catch(e){}
  openDB(function(db){
    if(!db)return;
    try{
      var tx=db.transaction(['meta'],'readwrite');
      tx.objectStore('meta').put(transferredGuns,'transferredGuns');
    }catch(e){}
  });
}

function saveCustodyEvent(gunId){
  var type=document.getElementById('coc_type').value;
  var date=document.getElementById('coc_date').value;
  var name=document.getElementById('coc_name').value.trim();
  var state=document.getElementById('coc_state').value.trim();
  var price=document.getElementById('coc_price').value;
  var ffl=document.getElementById('coc_ffl').value.trim();
  var ffln=document.getElementById('coc_ffln').value.trim();
  var notes=document.getElementById('coc_notes').value.trim();
  var ack=document.getElementById('coc_ack').checked;

  if(!type){toast('Select a transfer type','err');return;}
  if(!date){toast('Enter a date','err');return;}

  var now=new Date().toISOString();

  guns=guns.map(function(g){
    if(g.id!==gunId) return g;
    var custody=g.custody?g.custody.slice():[];
    if(editingCustodyId){
      // Edit existing
      custody=custody.map(function(e){
        if(e.id!==editingCustodyId) return e;
        return Object.assign({},e,{
          type:type,date:date,recipientName:name,recipientState:state,
          price:price,fflDealer:ffl,fflLicense:ffln,notes:notes,
          acknowledged:ack,editedAt:now
        });
      });
    } else {
      // New event
      custody.push({
        id:gidCustody(),type:type,date:date,recipientName:name,
        recipientState:state,price:price,fflDealer:ffl,fflLicense:ffln,
        notes:notes,acknowledged:ack,createdAt:now,editedAt:null
      });
    }
    return Object.assign({},g,{custody:custody});
  });

  sv();
  haptic('save');
  showCustodyForm=false;
  editingCustodyId=null;
  toast(editingCustodyId?'Event updated':'Custody event added');
  rnd();
}

function editCustodyEvent(gunId, evtId){
  editingCustodyId=evtId;
  showCustodyForm=true;
  rnd();
}

function deleteCustodyEvent(gunId, evtId){
  if(!confirm('Delete this custody event? This cannot be undone.')) return;
  guns=guns.map(function(g){
    if(g.id!==gunId) return g;
    return Object.assign({},g,{custody:(g.custody||[]).filter(function(e){return e.id!==evtId;})});
  });
  sv();
  haptic('delete');
  toast('Event deleted');
  rnd();
}

function markTransferredOut(gunId){
  var g=guns.find(function(x){return x.id===gunId;});if(!g)return;
  if(!confirm('Mark '+g.make+' '+g.model+' as TRANSFERRED OUT?\n\nThis will remove it from your active inventory. The custody record will be preserved. This cannot be undone.')) return;

  var transferred=Object.assign({},g,{
    transferred:true,
    transferredAt:new Date().toISOString()
  });
  transferredGuns.push(transferred);
  guns=guns.filter(function(x){return x.id!==gunId;});
  sv();
  saveTransferred();
  haptic('delete');
  toast(g.make+' '+g.model+' moved to Transferred archive');
  VIEW='list';
  showCustodyForm=false;
  editingCustodyId=null;
  rnd();
}

function printCustodyRecord(gunId){
  // Find in active or transferred
  var g=guns.find(function(x){return x.id===gunId;})||transferredGuns.find(function(x){return x.id===gunId;});
  if(!g)return;

  var custody=g.custody||[];
  var rows=custody.map(function(e,i){
    return '<div style="border:1px solid #ddd;border-radius:6px;padding:14px;margin-bottom:10px;page-break-inside:avoid">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
        +'<span style="background:#1a1d24;color:#e8c46a;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase">'+e.type+'</span>'
        +'<span style="font-size:12px;color:#666">'+new Date(e.date).toLocaleDateString()+'</span>'
      +'</div>'

      +(e.recipientState?'<div style="font-size:12px;color:#444">State: '+e.recipientState+'</div>':'')
      +(e.price?'<div style="font-size:12px;color:#444">Value: $'+e.price+'</div>':'')
      +(e.fflDealer?'<div style="font-size:12px;color:#444">FFL: '+e.fflDealer+(e.fflLicense?' #'+e.fflLicense:'')+'</div>':'')
      +(e.notes?'<div style="font-size:12px;color:#555;margin-top:6px;font-style:italic">'+e.notes+'</div>':'')
      +(e.acknowledged?'<div style="font-size:11px;color:#2a7a2a;margin-top:6px">&#10003; Legal eligibility acknowledged</div>':'')
      +(e.editedAt?'<div style="font-size:10px;color:#999;margin-top:4px">Edited: '+new Date(e.editedAt).toLocaleDateString()+'</div>':'')
      +'<div style="font-size:10px;color:#bbb;margin-top:4px">Created: '+new Date(e.createdAt).toLocaleDateString()+'</div>'
      +'</div>';
  }).join('');

  var W=window.open('','_blank');
  W.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Chain of Custody — '+g.make+' '+g.model+'</title>'
    +'<style>body{font-family:Georgia,serif;padding:40px;max-width:700px;margin:0 auto;color:#000}'
    +'h1{margin:0;font-size:22px}h2{font-size:14px;color:#444;margin:4px 0 4px;font-weight:400}'
    +'.header{border-bottom:3px solid #000;padding-bottom:14px;margin-bottom:20px}'
    +'.gun-info{background:#f5f5f5;border-radius:6px;padding:12px;margin-bottom:20px;font-size:13px}'
    +'footer{margin-top:30px;font-size:11px;color:#999;border-top:1px solid #ccc;padding-top:10px;text-align:center}'
    +'@media print{body{padding:20px}}</style></head><body>');
  W.document.write('<div class="header"><h1>Chain of Custody Record</h1><h2>ArsenalDB &mdash; '+new Date().toLocaleDateString()+'</h2></div>');
  W.document.write('<div class="gun-info">'
    +'<strong style="font-size:16px">'+g.make+' '+g.model+'</strong><br>'
    +(g.type||'')+(g.caliber?' &middot; '+g.caliber:'')+' '+(g.year?'&middot; '+g.year:'')+'<br>'
    +'SN: <strong>'+(g.serialNumber||'N/A')+'</strong>'
    +(g.transferred?' &middot; <span style="color:#c00">TRANSFERRED OUT '+new Date(g.transferredAt).toLocaleDateString()+'</span>':'')
    +'</div>');
  W.document.write('<div style="font-size:13px;color:#666;margin-bottom:16px">'+custody.length+' custody event'+(custody.length!==1?'s':'')+' recorded</div>');
  if(rows) W.document.write(rows);
  else W.document.write('<div style="text-align:center;padding:30px;color:#999">No custody events recorded</div>');
  W.document.write('<footer>ArsenalDB Chain of Custody &middot; '+g.make+' '+g.model+' &middot; SN: '+(g.serialNumber||'N/A')+'</footer>');
  W.document.write('</body></html>');
  W.document.close();
  W.print();
}

function loadBOS(){
  try{var s=localStorage.getItem('av_bos');if(s)billsOfSale=JSON.parse(s);}catch(e){}
}

function saveBOS(){
  try{localStorage.setItem('av_bos',JSON.stringify(billsOfSale));}catch(e){}
  openDB(function(db){
    if(!db)return;
    try{var tx=db.transaction(['meta'],'readwrite');tx.objectStore('meta').put(billsOfSale,'billsOfSale');}catch(e){}
  });
}

function genBosNumber(){
  var yr=new Date().getFullYear();
  var n=billsOfSale.filter(function(b){return b.bosNumber&&b.bosNumber.indexOf('AV-'+yr)===0;}).length+1;
  return 'AV-'+yr+'-'+String(n).padStart(4,'0');
}

function bosCollect(){
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var ch=function(id){var el=document.getElementById(id);return el?el.checked:false;};
  if(bosStep===1){
    bosData.transferMethod=g('bos_method');
    var sm=document.getElementById('bos_same');bosData.sameState=sm?(sm.value==='yes'?true:sm.value==='no'?false:null):null;
    bosData.nfaItem=ch('bos_nfa');
  }else if(bosStep===2){
    bosData.seller={name:g('bs_name'),address:g('bs_address'),city:g('bs_city'),state:g('bs_state').toUpperCase(),zip:g('bs_zip'),phone:g('bs_phone'),email:g('bs_email'),dlState:g('bs_dlState').toUpperCase(),dlType:g('bs_dlType'),dlNumber:g('bs_dlNumber')};
    bosData.sellerAttestation=ch('bs_ack');
  }else if(bosStep===3){
    bosData.buyer={name:g('bb_name'),address:g('bb_address'),city:g('bb_city'),state:g('bb_state').toUpperCase(),zip:g('bb_zip'),phone:g('bb_phone'),email:g('bb_email'),dob:g('bb_dob'),dlState:g('bb_dlState').toUpperCase(),dlType:g('bb_dlType'),dlNumber:g('bb_dlNumber')};
    bosData.buyerAttestation=ch('bb_ack');
  }else if(bosStep===4){
    bosData.salePrice=g('bt_price');bosData.paymentMethod=g('bt_payment');bosData.accessoriesIncluded=g('bt_acc');
    bosData.conditionNotes=g('bt_cond');bosData.soldAsIs=ch('bt_asis');bosData.specialTerms=g('bt_terms');
    bosData.fflName=g('bt_fflName');bosData.fflCity=g('bt_fflCity');bosData.fflState=g('bt_fflState').toUpperCase();bosData.fflLicense=g('bt_fflLic');
  }else if(bosStep===5){
    bosData.sellerSig=g('sig_seller');bosData.sellerSigDate=g('sig_seller_date');
    bosData.buyerSig=g('sig_buyer');bosData.buyerSigDate=g('sig_buyer_date');bosData.witnessSig=g('sig_witness');
  }
}

function bosValidate(){
  if(bosStep===1){
    if(!bosData.transferMethod)return'Select a transfer method.';
    if(bosData.sameState===null||bosData.sameState===undefined)return'Confirm whether buyer is in your state.';
    if(bosData.nfaItem)return'NFA_BLOCK';
    if(!bosData.sameState&&bosData.transferMethod==='private')return'INTERSTATE_WARN';
  }
  if(bosStep===2){if(!bosData.seller.name)return'Seller name is required.';if(!bosData.seller.state)return'Seller state is required.';if(!bosData.sellerAttestation)return'Seller attestation required.';}
  if(bosStep===3){if(!bosData.buyer.name)return'Buyer name is required.';if(!bosData.buyer.state)return'Buyer state is required.';if(!bosData.buyerAttestation)return'Buyer eligibility attestation required.';}
  if(bosStep===4){if(!bosData.salePrice&&bosData.salePrice!=='0')return'Sale price is required (enter 0 for gift).';}
  if(bosStep===5){if(!bosData.sellerSig)return'Seller signature required.';if(!bosData.buyerSig)return'Buyer signature required.';}
  return null;
}

function bosNext(){
  bosCollect();
  var err=bosValidate();
  if(err==='NFA_BLOCK'){toast('NFA items require ATF Form 4 and ATF approval before transfer.','err');return;}
  if(err==='INTERSTATE_WARN'){
    var warn=document.getElementById('bos_interstate_warn');
    if(warn){warn.style.display='block';return;}
    return;
  }
  if(err){toast(err,'err');return;}
  if(bosStep<5){bosStep++;bosRender();}else{bosComplete();}
}

    return '<div style="display:flex;flex-direction:column;align-items:center;flex:1">'+dot+lbl+'</div>';
  });
  var bars=[];for(var i=0;i<4;i++)bars.push('<div style="flex:1;height:1px;background:'+(i+1<bosStep?'#e8c46a':'#2e3545')+';margin-top:13px;align-self:flex-start"></div>');

    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
      +'<div>'
        +'<div style="font-size:15px;font-weight:800;color:#e8c46a">&#9654; Transfer Wizard</div>'
        +'<div style="font-size:12px;color:#4a5568;margin-top:2px">'+eh(g.make||'')+' '+eh(g.model||'')+(g.serialNumber?' · SN: '+eh(g.serialNumber):'')+'</div>'
      +'</div>'
      +'<button onclick="document.getElementById(\'bos_modal\').remove();document.body.style.overflow=\'\';document.body.style.position=\'\';" style="background:transparent;border:none;color:#8a95a8;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1">&times;</button>'
    +'</div>'
    +'<div style="display:flex;align-items:center;margin-bottom:14px">'+prog+'</div>'
    +'<div style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8a95a8;padding-bottom:14px;border-bottom:1px solid #2e3545">'+stepTitles[bosStep-1]+'</div>'
    +'</div>'
    +'<div style="padding:18px;overflow-y:auto;flex:1">'+content+'</div>'
    +'<div style="padding:14px 18px;border-top:1px solid #2e3545;display:flex;gap:10px;background:#1a1d24;flex-shrink:0">'
      +(bosStep>1?'<button onclick="bosPrev()" style="background:transparent;border:2px solid #3a4455;color:#c0c8d8;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">&#8592;</button>':'')
      +(bosStep===5?'<button id="bos_preview_btn" style="background:transparent;border:2px solid #3a4455;color:#c0c8d8;padding:12px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">'+_iM('printer')+' Preview</button>':'')
