function saveCustodyEvent(gunId){
  var type=document.getElementById('coc_type').value;
  var date=document.getElementById('coc_date').value;
  var name=document.getElementById('coc_name').value.trim();
  var state=document.getElementById('coc_state').value.trim();
  var price=document.getElementById('coc_price').value;
  var ffl=document.getElementById('coc_ffl').value.trim();
  var ffln=document.getElementById('coc_ffln').value.trim();
  var notes=document.getElementById('coc_notes').value.trim();
  var ack=document.getElementById('coc_ack').checked;

  if(!type){toast('Select a transfer type','err');return;}
  if(!date){toast('Enter a date','err');return;}

  var now=new Date().toISOString();

  guns=guns.map(function(g){
    if(g.id!==gunId) return g;
    var custody=g.custody?g.custody.slice():[];
    if(editingCustodyId){
      // Edit existing
      custody=custody.map(function(e){
        if(e.id!==editingCustodyId) return e;
        return Object.assign({},e,{
          type:type,date:date,recipientName:name,recipientState:state,
          price:price,fflDealer:ffl,fflLicense:ffln,notes:notes,
          acknowledged:ack,editedAt:now
        });
      });
    } else {
      // New event
      custody.push({
        id:gidCustody(),type:type,date:date,recipientName:name,
        recipientState:state,price:price,fflDealer:ffl,fflLicense:ffln,
        notes:notes,acknowledged:ack,createdAt:now,editedAt:null
      });
    }
    return Object.assign({},g,{custody:custody});
  });

  sv();
  haptic('save');
  showCustodyForm=false;
  editingCustodyId=null;
  toast(editingCustodyId?'Event updated':'Custody event added');
  rnd();
}

function editCustodyEvent(gunId, evtId){
  editingCustodyId=evtId;
  showCustodyForm=true;
  rnd();
}

function deleteCustodyEvent(gunId, evtId){
  if(!confirm('Delete this custody event? This cannot be undone.')) return;
  guns=guns.map(function(g){
    if(g.id!==gunId) return g;
    return Object.assign({},g,{custody:(g.custody||[]).filter(function(e){return e.id!==evtId;})});
  });
  sv();
  haptic('delete');
  toast('Event deleted');
  rnd();
}

function markTransferredOut(gunId){
  var g=guns.find(function(x){return x.id===gunId;});if(!g)return;
  if(!confirm('Mark '+g.make+' '+g.model+' as TRANSFERRED OUT?\n\nThis will remove it from your active inventory. The custody record will be preserved. This cannot be undone.')) return;

  var transferred=Object.assign({},g,{
    transferred:true,
    transferredAt:new Date().toISOString()
  });
  transferredGuns.push(transferred);
  guns=guns.filter(function(x){return x.id!==gunId;});
  sv();
  saveTransferred();
  haptic('delete');
  toast(g.make+' '+g.model+' moved to Transferred archive');
  VIEW='list';
  showCustodyForm=false;
  editingCustodyId=null;
  rnd();
}

function printCustodyRecord(gunId){
  // Find in active or transferred
  var g=guns.find(function(x){return x.id===gunId;})||transferredGuns.find(function(x){return x.id===gunId;});
  if(!g)return;

  var custody=g.custody||[];
  var rows=custody.map(function(e,i){
    return '<div style="border:1px solid #ddd;border-radius:6px;padding:14px;margin-bottom:10px;page-break-inside:avoid">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
        +'<span style="background:#1a1d24;color:#e8c46a;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase">'+e.type+'</span>'
        +'<span style="font-size:12px;color:#666">'+new Date(e.date).toLocaleDateString()+'</span>'
      +'</div>'
      +(e.recipientName?'<div style="font-weight:700;font-size:14px;margin-bottom:4px">'+e.recipientName+'</div>':'')
      +(e.recipientState?'<div style="font-size:12px;color:#444">State: '+e.recipientState+'</div>':'')
      +(e.price?'<div style="font-size:12px;color:#444">Value: $'+e.price+'</div>':'')
      +(e.fflDealer?'<div style="font-size:12px;color:#444">FFL: '+e.fflDealer+(e.fflLicense?' #'+e.fflLicense:'')+'</div>':'')
      +(e.notes?'<div style="font-size:12px;color:#555;margin-top:6px;font-style:italic">'+e.notes+'</div>':'')
      +(e.acknowledged?'<div style="font-size:11px;color:#2a7a2a;margin-top:6px">&#10003; Legal eligibility acknowledged</div>':'')
      +(e.editedAt?'<div style="font-size:10px;color:#999;margin-top:4px">Edited: '+new Date(e.editedAt).toLocaleDateString()+'</div>':'')
      +'<div style="font-size:10px;color:#bbb;margin-top:4px">Created: '+new Date(e.createdAt).toLocaleDateString()+'</div>'
      +'</div>';
  }).join('');

  var W=window.open('','_blank');
  W.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Chain of Custody — '+g.make+' '+g.model+'</title>'
    +'<style>body{font-family:Georgia,serif;padding:40px;max-width:700px;margin:0 auto;color:#000}'
    +'h1{margin:0;font-size:22px}h2{font-size:14px;color:#444;margin:4px 0 4px;font-weight:400}'
    +'.header{border-bottom:3px solid #000;padding-bottom:14px;margin-bottom:20px}'
    +'.gun-info{background:#f5f5f5;border-radius:6px;padding:12px;margin-bottom:20px;font-size:13px}'
    +'footer{margin-top:30px;font-size:11px;color:#999;border-top:1px solid #ccc;padding-top:10px;text-align:center}'
    +'@media print{body{padding:20px}}</style></head><body>');
  W.document.write('<div class="header"><h1>Chain of Custody Record</h1><h2>ArsenalDB &mdash; '+new Date().toLocaleDateString()+'</h2></div>');
  W.document.write('<div class="gun-info">'
    +'<strong style="font-size:16px">'+g.make+' '+g.model+'</strong><br>'
    +(g.type||'')+(g.caliber?' &middot; '+g.caliber:'')+' '+(g.year?'&middot; '+g.year:'')+'<br>'
    +'SN: <strong>'+(g.serialNumber||'N/A')+'</strong>'
    +(g.transferred?' &middot; <span style="color:#c00">TRANSFERRED OUT '+new Date(g.transferredAt).toLocaleDateString()+'</span>':'')
    +'</div>');
  W.document.write('<div style="font-size:13px;color:#666;margin-bottom:16px">'+custody.length+' custody event'+(custody.length!==1?'s':'')+' recorded</div>');
  if(rows) W.document.write(rows);
  else W.document.write('<div style="text-align:center;padding:30px;color:#999">No custody events recorded</div>');
  W.document.write('<footer>ArsenalDB Chain of Custody &middot; '+g.make+' '+g.model+' &middot; SN: '+(g.serialNumber||'N/A')+'</footer>');
  W.document.write('</body></html>');
  W.document.close();
  W.print();
}

var QR_SCAN_MODE=false;

function loadBOS(){
  try{var s=localStorage.getItem('av_bos');if(s)billsOfSale=JSON.parse(s);}catch(e){}
}

function saveBOS(){
  try{localStorage.setItem('av_bos',JSON.stringify(billsOfSale));}catch(e){}
  openDB(function(db){
    if(!db)return;
    try{var tx=db.transaction(['meta'],'readwrite');tx.objectStore('meta').put(billsOfSale,'billsOfSale');}catch(e){}
  });
}

function genBosNumber(){
  var yr=new Date().getFullYear();
  var n=billsOfSale.filter(function(b){return b.bosNumber&&b.bosNumber.indexOf('AV-'+yr)===0;}).length+1;
  return 'AV-'+yr+'-'+String(n).padStart(4,'0');
}

function bosCollect(){
  var g=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var ch=function(id){var el=document.getElementById(id);return el?el.checked:false;};
  if(bosStep===1){
    bosData.transferMethod=g('bos_method');
    var sm=document.getElementById('bos_same');bosData.sameState=sm?(sm.value==='yes'?true:sm.value==='no'?false:null):null;
    bosData.nfaItem=ch('bos_nfa');
  }else if(bosStep===2){
    bosData.seller={name:g('bs_name'),address:g('bs_address'),city:g('bs_city'),state:g('bs_state').toUpperCase(),zip:g('bs_zip'),phone:g('bs_phone'),email:g('bs_email'),dlState:g('bs_dlState').toUpperCase(),dlType:g('bs_dlType'),dlNumber:g('bs_dlNumber')};
    bosData.sellerAttestation=ch('bs_ack');
  }else if(bosStep===3){
    bosData.buyer={name:g('bb_name'),address:g('bb_address'),city:g('bb_city'),state:g('bb_state').toUpperCase(),zip:g('bb_zip'),phone:g('bb_phone'),email:g('bb_email'),dob:g('bb_dob'),dlState:g('bb_dlState').toUpperCase(),dlType:g('bb_dlType'),dlNumber:g('bb_dlNumber')};
    bosData.buyerAttestation=ch('bb_ack');
  }else if(bosStep===4){
    bosData.salePrice=g('bt_price');bosData.paymentMethod=g('bt_payment');bosData.accessoriesIncluded=g('bt_acc');
    bosData.conditionNotes=g('bt_cond');bosData.soldAsIs=ch('bt_asis');bosData.specialTerms=g('bt_terms');
    bosData.fflName=g('bt_fflName');bosData.fflCity=g('bt_fflCity');bosData.fflState=g('bt_fflState').toUpperCase();bosData.fflLicense=g('bt_fflLic');
  }else if(bosStep===5){
    bosData.sellerSig=g('sig_seller');bosData.sellerSigDate=g('sig_seller_date');
    bosData.buyerSig=g('sig_buyer');bosData.buyerSigDate=g('sig_buyer_date');bosData.witnessSig=g('sig_witness');
  }
}

function bosValidate(){
  if(bosStep===1){
    if(!bosData.transferMethod)return'Select a transfer method.';
    if(bosData.sameState===null||bosData.sameState===undefined)return'Confirm whether buyer is in your state.';
    if(bosData.nfaItem)return'NFA_BLOCK';
    if(!bosData.sameState&&bosData.transferMethod==='private')return'INTERSTATE_WARN';
  }
  if(bosStep===2){if(!bosData.seller.name)return'Seller name is required.';if(!bosData.seller.state)return'Seller state is required.';if(!bosData.sellerAttestation)return'Seller attestation required.';}
  if(bosStep===3){if(!bosData.buyer.name)return'Buyer name is required.';if(!bosData.buyer.state)return'Buyer state is required.';if(!bosData.buyerAttestation)return'Buyer eligibility attestation required.';}
  if(bosStep===4){if(!bosData.salePrice&&bosData.salePrice!=='0')return'Sale price is required (enter 0 for gift).';}
  if(bosStep===5){if(!bosData.sellerSig)return'Seller signature required.';if(!bosData.buyerSig)return'Buyer signature required.';}
  return null;
}

function bosNext(){
  bosCollect();
  var err=bosValidate();
  if(err==='NFA_BLOCK'){toast('NFA items require ATF Form 4 and ATF approval before transfer.','err');return;}
  if(err==='INTERSTATE_WARN'){
    var warn=document.getElementById('bos_interstate_warn');
    if(warn){warn.style.display='block';return;}
    return;
  }
  if(err){toast(err,'err');return;}
  if(bosStep<5){bosStep++;bosRender();}else{bosComplete();}
}

function bosPrev(){bosCollect();if(bosStep>1){bosStep--;bosRender();}}

  var inner=document.getElementById('bos_inner');if(!inner)return;

  var progress=steps.map(function(s,i){
    var done=i+1<bosStep,active=i+1===bosStep;

    var lbl='<div style="font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:'+(active?'#e8c46a':'#3a4455');lbl+=';margin-top:4px">'+s+'</div>';
    return '<div style="display:flex;flex-direction:column;align-items:center;flex:1">'+dot+lbl+'</div>';
  });
  var bars=[];for(var i=0;i<4;i++)bars.push('<div style="flex:1;height:1px;background:'+(i+1<bosStep?'#e8c46a':'#2e3545')+';margin-top:13px;align-self:flex-start"></div>');
  var prog=progress[0];for(var j=0;j<4;j++){prog+=bars[j]+progress[j+1];}

  var content=bosStepContent();

  inner.innerHTML=
    '<div style="padding:18px 18px 0;flex-shrink:0">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
      +'<div>'
        +'<div style="font-size:15px;font-weight:800;color:#e8c46a">&#9654; Transfer Wizard</div>'
        +'<div style="font-size:12px;color:#4a5568;margin-top:2px">'+eh(g.make||'')+' '+eh(g.model||'')+(g.serialNumber?' · SN: '+eh(g.serialNumber):'')+'</div>'
      +'</div>'
      +'<button onclick="document.getElementById(\'bos_modal\').remove();document.body.style.overflow=\'\';document.body.style.position=\'\';" style="background:transparent;border:none;color:#8a95a8;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1">&times;</button>'
    +'</div>'
    +'<div style="display:flex;align-items:center;margin-bottom:14px">'+prog+'</div>'
    +'<div style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8a95a8;padding-bottom:14px;border-bottom:1px solid #2e3545">'+stepTitles[bosStep-1]+'</div>'
    +'</div>'
    +'<div style="padding:18px;overflow-y:auto;flex:1">'+content+'</div>'
    +'<div style="padding:14px 18px;border-top:1px solid #2e3545;display:flex;gap:10px;background:#1a1d24;flex-shrink:0">'
      +(bosStep>1?'<button onclick="bosPrev()" style="background:transparent;border:2px solid #3a4455;color:#c0c8d8;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">&#8592;</button>':'')
      +(bosStep===5?'<button id="bos_preview_btn" style="background:transparent;border:2px solid #3a4455;color:#c0c8d8;padding:12px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">&#9113; Preview</button>':'')
      +'<button onclick="bosNext()" style="flex:1;background:#e8c46a;color:#1a1d24;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit">'
        +(bosStep<5?'Continue &#8594;':'&#10003; Complete Transfer')

  // Wire preview button if on step 5
  if(bosStep===5){
    var prevBtn=document.getElementById('bos_preview_btn');
    if(prevBtn) prevBtn.onclick=bosPreviewPDF;
  }
}

function bosComplete(){
  bosData.status='completed';
  bosData.completedAt=new Date().toISOString();
  bosData.id=bosData.bosNumber;
  billsOfSale.push(bosData);
  saveBOS();
  var g=guns.find(function(x){return x.id===bosGunId;});
  if(g){
    // Auto-log chain of custody event
    var cocEvt={
      id:'coc_'+Date.now(),
      type:bosData.transferMethod==='ffl'?'Sale (FFL)':'Sale',
      date:new Date().toISOString().split('T')[0],
      recipientName:bosData.buyer.name||'',
      recipientState:bosData.buyer.state||'',
      price:bosData.salePrice||'',
      fflDealer:bosData.fflName||'',
      fflLicense:bosData.fflLicense||'',
      notes:'Bill of Sale: '+bosData.bosNumber+(bosData.buyer.name?' — Buyer: '+bosData.buyer.name:''),
      acknowledged:bosData.buyerAttestation||false,
      bosId:bosData.bosNumber,
      autoLogged:true
    };
    var updatedCustody=(g.custody||[]).concat([cocEvt]);
    var archived=Object.assign({},g,{
      transferred:true,
      transferredAt:bosData.completedAt,
      bosId:bosData.bosNumber,
      custody:updatedCustody
    });
    transferredGuns.push(archived);

  toast((g?g.make+' '+g.model:'Firearm')+' transferred & archived. BOS: '+completedBos.bosNumber);

// ── COLLECTIONS ───────────────────────────────────────────────────────
function loadCollections(){
  try{
    var s=localStorage.getItem('av_collections');
    if(s){
      collections=JSON.parse(s);
    }
  }catch(e){}

  // Ensure default collection exists
  if(!collections['default']){
    collections['default']={
      name:'My Collection',
      created:new Date().toISOString()
    };
    saveCollections();
  }

  // Migrate existing guns into default collection if not already done
  var migrated=localStorage.getItem('av_coll_migrated');
  if(!migrated){
    localStorage.setItem('av_coll_migrated','1');
    // guns array already loaded by ld() - they belong to default collection
  }

  // Load active collection preference
  try{
    var ac=localStorage.getItem('av_active_coll');
    if(ac&&collections[ac]) activeCollection=ac;
    else activeCollection='default';
  }catch(e){activeCollection='default';}
}

function saveCollections(){
  try{localStorage.setItem('av_collections',JSON.stringify(collections));}catch(e){}
}

function getCollKey(collId){
  return 'av_guns_'+(collId||activeCollection);
}

function switchCollection(collId){
  if(collId===activeCollection){collMenuOpen=false;rnd();return;}

  // Save current guns to current collection
  saveGunsToCollection(activeCollection);

  // Switch
  activeCollection=collId;
  try{localStorage.setItem('av_active_coll',collId);}catch(e){}

  // Load new collection's guns
  loadGunsFromCollection(collId);

  // Reset state
  collMenuOpen=false;
  bulkMode=false;
  bulkSelected=[];
  showCustodyForm=false;
  editingCustodyId=null;
  aiLoad=null;
  VIEW='dashboard';
  selId=null;editId=null;
  FORM=ef();srch='';
  fCond='All';fWork='All';fType='All';
  SCH=null;aiVal=null;aiDiag=null;
  milestones={};totalCleanings=0;transferredGuns=[];
  loadMilestones();
  loadTransferred();
  rnd();
  toast('Switched to '+collections[collId].name);
}

function saveGunsToCollection(collId){
  var data=JSON.stringify(guns);
  try{localStorage.setItem(getCollKey(collId),data);}catch(e){}
  try{sessionStorage.setItem(getCollKey(collId),data);}catch(e){}
  // Also save to IndexedDB with collection prefix
  openDB(function(db){
    if(!db)return;
    try{
      var tx=db.transaction(['meta'],'readwrite');
      tx.objectStore('meta').put(guns,'guns_'+collId);
    }catch(e){}
  });
}

function loadGunsFromCollection(collId){
  // Try IndexedDB first
  openDB(function(db){
    if(db){
      try{
        var tx=db.transaction(['meta'],'readonly');
        var req=tx.objectStore('meta').get('guns_'+collId);
        req.onsuccess=function(e){
          if(e.target.result&&e.target.result.length>0){
            guns=e.target.result;
          } else {
            // Try localStorage
            var s=localStorage.getItem(getCollKey(collId));
            if(s){try{guns=JSON.parse(s);}catch(ex){guns=[];}}
            else guns=[];
          }
          rnd();
        };
        req.onerror=function(){
          var s=localStorage.getItem(getCollKey(collId));
          if(s){try{guns=JSON.parse(s);}catch(ex){guns=[];}}
          else guns=[];
          rnd();
        };
      }catch(e){guns=[];rnd();}
    } else {
      var s=localStorage.getItem(getCollKey(collId));
      if(s){try{guns=JSON.parse(s);}catch(ex){guns=[];}}
      else guns=[];
      rnd();
    }
  });
}

function createCollection(){
  if(!requireProPlus('Multiple Collections')) return;
  var name=prompt('Collection name:');
  if(!name||!name.trim()) return;
  name=name.trim();
  var id='coll_'+Date.now().toString(36);
  collections[id]={name:name,created:new Date().toISOString()};
  saveCollections();
  collMenuOpen=false;
  // Save current and switch
  saveGunsToCollection(activeCollection);
  activeCollection=id;
  try{localStorage.setItem('av_active_coll',id);}catch(e){}
  guns=[];
  milestones={};totalCleanings=0;transferredGuns=[];
  VIEW='dashboard';
  FORM=ef();
  rnd();
  toast('Collection "'+name+'" created!');
}

function renameCollection(collId){
  var old=collections[collId]?collections[collId].name:'';
  var name=prompt('Rename collection:',old);
  if(!name||!name.trim()) return;
  collections[collId].name=name.trim();
  saveCollections();
  collMenuOpen=false;
  rnd();
  toast('Renamed to "'+name.trim()+'"');
}

function deleteCollection(collId){
  if(collId==='default'){toast('Cannot delete the default collection','err');return;}
  var name=collections[collId]?collections[collId].name:'this collection';
  var count=guns.length;
  if(!confirm('Delete "'+name+'"?\n\nThis will permanently delete all '+count+' firearms in this collection. This cannot be undone.')) return;

  // Remove from collections
  delete collections[collId];
  saveCollections();

  // Clear stored guns for this collection
  try{localStorage.removeItem(getCollKey(collId));}catch(e){}
  try{sessionStorage.removeItem(getCollKey(collId));}catch(e){}
  openDB(function(db){
    if(!db)return;
    try{
      var tx=db.transaction(['meta'],'readwrite');
      tx.objectStore('meta').delete('guns_'+collId);
    }catch(e){}
  });

  // Switch to default
  activeCollection='default';
  try{localStorage.setItem('av_active_coll','default');}catch(e){}
  loadGunsFromCollection('default');
  milestones={};totalCleanings=0;transferredGuns=[];
  loadMilestones();
  loadTransferred();
  collMenuOpen=false;
  VIEW='dashboard';
  haptic('delete');
  toast('Collection deleted — switched to default');
}

function toggleCollMenu(){
  collMenuOpen=!collMenuOpen;
  rnd();
  if(collMenuOpen){
    // Register one-time outside-click and Escape handlers
    // 300ms delay prevents the opening tap from immediately self-dismissing
    setTimeout(function(){
      function _collDismissClick(e){
        if(!e.target.closest('.coll-dropdown')){
          collMenuOpen=false;
          rnd();
          document.removeEventListener('click',_collDismissClick);
          document.removeEventListener('keydown',_collDismissKey);
        }
      }
      function _collDismissKey(e){
        if(e.key==='Escape'){
          collMenuOpen=false;
          rnd();
          document.removeEventListener('click',_collDismissClick);
          document.removeEventListener('keydown',_collDismissKey);
        }
      }
      document.addEventListener('click',_collDismissClick);
      document.addEventListener('keydown',_collDismissKey);
    },300);
  }
}

// ── PIN LOCK ──────────────────────────────────────────────────────────
var _pinEntry='';
var _pinAttempts=0;
var _pinLockUntil=0;
var _pinVerified=false;
var _appWasLocked=false;


function togglePINSetting(){
  if(appSettings.pinEnabled){
    // Disable PIN - ask for current PIN first
    if(!confirm('Disable PIN lock? Your collection will no longer be protected.')) return;
    localStorage.removeItem('av_pin');
    appSettings.pinEnabled=false;
    saveSettings();
    // Close and reopen settings to refresh
    var m=document.getElementById('settings_modal');
    if(m)m.remove();
    toast('PIN lock disabled');
    openSettings();
  } else {
    // Enable PIN - show set PIN screen
    var m=document.getElementById('settings_modal');
    if(m)m.remove();
    showPINScreen('set');
  }
}

function isPINEnabled(){
  return appSettings.pinEnabled && localStorage.getItem('av_pin');
}

function initPINLock(){
  // Detect when phone screen locks/unlocks using visibilitychange + Page Lifecycle API
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){
      // App going to background - record time
      try{sessionStorage.setItem('av_bg_time',Date.now().toString());}catch(e){}
      _appWasLocked=true;
    } else {
      // App coming back to foreground
      if(_appWasLocked && isPINEnabled() && !_pinVerified){
        // Check if phone was locked (we approximate by checking if page was hidden)
        showPINScreen('unlock');
      }
      _appWasLocked=false;
    }
  });

  // Show PIN on first load if enabled
  if(isPINEnabled()){
    _pinVerified=false;
    showPINScreen('unlock');
  } else {
    _pinVerified=true;
  }
}

function showPINScreen(mode){
  _pinEntry='';
  _pinAttempts=parseInt(localStorage.getItem('av_pin_attempts')||'0');
  _pinLockUntil=parseInt(localStorage.getItem('av_pin_lock_until')||'0');

  var existing=document.getElementById('pin_screen');
  if(existing) existing.remove();

  var screen=document.createElement('div');
  screen.id='pin_screen';
  screen.className='pin-screen';

  var title=mode==='set'?'Set PIN':mode==='change'?'Enter New PIN':'ArsenalDB';
  var sub=mode==='set'?'Choose a 6-digit PIN to secure your collection':
          mode==='change'?'Enter your new 6-digit PIN':
          'Enter your PIN to continue';

  screen.innerHTML=
    '<div class="pin-logo">ArsenalDB</div>'
    +'<div class="pin-title">'+title+'</div>'
    +'<div class="pin-sub">'+sub+'</div>'
    +'<div class="pin-dots" id="pin_dots">'
      +Array(6).fill('<div class="pin-dot"></div>').join('')
    +'</div>'
    +'<div class="pin-error" id="pin_error"></div>'
    +'<div class="pin-keypad">'
      +[1,2,3,4,5,6,7,8,9].map(function(n){
        return '<button class="pin-key" onclick="pinKey(\''+n+'\')">'+n+'</button>';
      }).join('')
      +'<button class="pin-key" onclick="pinForgot()" style="font-size:12px;color:#4a5568">Forgot</button>'
      +'<button class="pin-key" onclick="pinKey(\'0\')">0</button>'
      +'<button class="pin-key" onclick="pinBack()" style="font-size:18px">&#9003;</button>'
    +'</div>'
    +(mode==='unlock'?'<div class="pin-forgot" onclick="pinForgot()">Forgot PIN?</div>':'');

  screen.dataset.mode=mode;
  document.body.appendChild(screen);

  // Check lockout
  checkPINLockout();
}

function checkPINLockout(){
  var now=Date.now();
  var errEl=document.getElementById('pin_error');
  if(_pinLockUntil>now){
    var secs=Math.ceil((_pinLockUntil-now)/1000);
    if(errEl) errEl.textContent='Too many attempts. Try again in '+secs+'s';
    setTimeout(checkPINLockout,1000);
    return true;
  }
  return false;
}

function pinKey(digit){
  if(checkPINLockout()) return;
  if(_pinEntry.length>=6) return;
  _pinEntry+=digit;
  updatePINDots();
  if(_pinEntry.length===6){
    setTimeout(function(){validatePIN();},150);
  }
}

function pinBack(){
  if(_pinEntry.length>0){
    _pinEntry=_pinEntry.slice(0,-1);
    updatePINDots();
  }
}

function updatePINDots(){
  var dots=document.querySelectorAll('.pin-dot');
  dots.forEach(function(d,i){
    d.classList.toggle('filled',i<_pinEntry.length);
    d.classList.remove('error');
  });
  var errEl=document.getElementById('pin_error');
  if(errEl&&_pinEntry.length>0) errEl.textContent='';
}

function validatePIN(){
  var screen=document.getElementById('pin_screen');
  var mode=screen?screen.dataset.mode:'unlock';
  var stored=localStorage.getItem('av_pin');

  if(mode==='set'||mode==='change'){
    // Setting new PIN - store it
    localStorage.setItem('av_pin',btoa(_pinEntry));
    localStorage.removeItem('av_pin_attempts');
    localStorage.removeItem('av_pin_lock_until');
    appSettings.pinEnabled=true;
    saveSettings();
    _pinVerified=true;
    screen.remove();
    haptic('save');
    toast('PIN set successfully');
    rnd();
    return;
  }

  // Unlock mode - verify PIN
  if(btoa(_pinEntry)===stored){
    // Correct
    _pinAttempts=0;
    localStorage.removeItem('av_pin_attempts');
    localStorage.removeItem('av_pin_lock_until');
    _pinVerified=true;
    // Success animation
    var dots=document.querySelectorAll('.pin-dot');
    dots.forEach(function(d){d.style.background='#60e880';d.style.borderColor='#60e880';});
    haptic('save');
    setTimeout(function(){screen.remove();rnd();},300);
  } else {
    // Wrong PIN
    _pinAttempts++;
    localStorage.setItem('av_pin_attempts',_pinAttempts.toString());
    var dots=document.querySelectorAll('.pin-dot');
    dots.forEach(function(d){d.classList.add('error');});
    haptic('error');
    var errEl=document.getElementById('pin_error');

    if(_pinAttempts>=5){
      _pinLockUntil=Date.now()+30000;
      localStorage.setItem('av_pin_lock_until',_pinLockUntil.toString());
      _pinAttempts=0;
      localStorage.removeItem('av_pin_attempts');
      if(errEl) errEl.textContent='Too many attempts. Locked for 30 seconds.';
    } else {
      var remaining=5-_pinAttempts;
      if(errEl) errEl.textContent='Incorrect PIN. '+remaining+' attempt'+(remaining!==1?'s':'')+' remaining.';
    }

    setTimeout(function(){
      _pinEntry='';
      updatePINDots();
    },500);
  }
}

function pinForgot(){
  var modal=document.createElement('div');
  modal.id='pin_forgot_modal';
  modal.style.cssText='position:fixed;inset:0;background:#000000ee;z-index:100000;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML='<div style="background:#222835;border:2px solid #ff707050;border-radius:12px;padding:24px;max-width:340px;width:100%">'
    +'<div style="font-size:16px;font-weight:700;color:#ff7070;margin-bottom:8px">Reset PIN</div>'
    +'<div style="font-size:13px;color:#8a95a8;margin-bottom:16px;line-height:1.6">To reset your PIN, upload a valid ArsenalDB backup file (.json) from this collection. This verifies you are the owner.</div>'
    +'<input type="file" id="pin_reset_file" accept=".json" style="display:none" onchange="verifyPINReset(this)"/>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
      +'<button onclick="document.getElementById(\'pin_reset_file\').click()" style="background:#ff707020;border:2px solid #ff707060;color:#ff7070;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">&#128194; Upload Backup File</button>'
      +'<button onclick="this.closest(\'#pin_forgot_modal\')||document.getElementById(\'pin_forgot_modal\').remove()" style="background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>'
    +'</div>'
    +'</div>';
  document.body.appendChild(modal);
}

function verifyPINReset(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(data.guns&&Array.isArray(data.guns)&&data.guns.length>0){
        // Valid backup - allow PIN reset
        var m=document.getElementById('pin_forgot_modal');
        if(m)m.remove();
        localStorage.removeItem('av_pin');
        localStorage.removeItem('av_pin_attempts');
        localStorage.removeItem('av_pin_lock_until');
        appSettings.pinEnabled=false;
        saveSettings();
        _pinVerified=true;
        var ps=document.getElementById('pin_screen');
        if(ps)ps.remove();
        haptic('save');
        toast('PIN removed. Set a new one in Settings.');
        rnd();
      } else {
        toast('Invalid backup file','err');
      }
    }catch(ex){toast('Could not read file','err');}
  };
  reader.readAsText(file);
  input.value='';
}

  // Show loading state
  var modal=document.getElementById('identifier_modal');
  if(modal) modal.innerHTML='<div style="background:#222835;border:2px solid #a0c0ff40;border-radius:12px;padding:32px;max-width:340px;width:100%;text-align:center">'
    +'<div class="id-pulse" style="font-size:36px;margin-bottom:14px">&#129302;</div>'
    +'<div style="font-size:16px;font-weight:700;color:#a0c0ff;margin-bottom:8px">Analyzing...</div>'
    +'<div style="font-size:13px;color:#8a95a8">AI is identifying this firearm</div>'
    +'</div>';

  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    var mediaType=file.type||'image/jpeg';

    // Call Claude AI
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'Identify this firearm. Respond ONLY with a JSON object with these exact fields: {"make":"","model":"","type":"","caliber":"","year":"","confidence":"high/medium/low","notes":""}. Type must be one of: Pistol, Revolver, Rifle, Shotgun, AR-15/Semi-Auto Rifle, Bolt-Action Rifle, Lever-Action Rifle, Pump Shotgun, Semi-Auto Shotgun, Other. If you cannot identify it, use your best guess and set confidence to low. Return ONLY the JSON, no other text.'}
          ]
        }]
      })
    })
    .then(function(r){return r.json();})
    .then(function(data){
      var text='';
      if(data.content&&data.content[0]) text=data.content[0].text||'';
      // Parse JSON response
      try{
        var clean=text.replace(/```json|```/g,'').trim();
        var result=JSON.parse(clean);
        showIdentifierResult(result, base64, mediaType);
      }catch(ex){
        showIdentifierError('Could not parse AI response');
      }
    })
    .catch(function(err){
      showIdentifierError('AI request failed: '+err.message);
    });
  };
  reader.readAsDataURL(file);
}

function picSwipe(dir){
  var allGuns = filtered();
  if(!allGuns.length) return;
  var idx = allGuns.findIndex(function(x){return x.id===picGunId;});
  if(idx < 0) idx = 0;
  idx = (idx + dir + allGuns.length) % allGuns.length;
  picGunId = allGuns[idx].id;
  VIEW = 'pic';
  rnd();
}

// Swipe detection for picture page AND edit page
function initSwipeNav(){
  var startX=0,startY=0,startTime=0;
  document.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;startTime=Date.now();
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-startX;
    var dy=e.changedTouches[0].clientY-startY;
    var dt=Date.now()-startTime;
    if(dy>80&&Math.abs(dx)<40&&dt<600&&startY<120){rnd();toast('Refreshed');return;}
    if(Math.abs(dx)<40||Math.abs(dy)>80||dt>500) return;
    if(dx>60&&startX<30){handleBack();return;}
    if(Math.abs(dx)>80&&startX>40){
      if(VIEW==='pic'){picSwipe(dx<0?1:-1);}
      else if(VIEW==='add'&&editId){
        var all=filtered();
        var ix=all.findIndex(function(x){return x.id===editId;});
        if(ix>=0){var nxt=all[(ix+(dx<0?1:-1)+all.length)%all.length];if(nxt)editGun(nxt.id);}
      }
    }
  },{passive:true});
}

function generateQR(text){
  var container=document.getElementById('qr_canvas');

  container.innerHTML='';
  var canvas=document.createElement('canvas');
  container.appendChild(canvas);
  try{
    // Use module size 9 — larger = easier for phone cameras to scan
    var ok=QRGen.draw(canvas,text,10);
    if(!ok){
      container.innerHTML='<div style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;color:#ff7070;font-size:12px;padding:16px;text-align:center">Data too large for QR.<br>Try removing some fields.</div>';

function closeQRTransfer(){
  var m=document.getElementById('qrt_modal');
  if(m) m.remove();
}

function qrtDigit(idx,val){
  var clean=val.replace(/[^0-9]/g,'');
  var el=document.getElementById('qrt_d'+idx);
  if(el) el.value=clean?clean[0]:'';
  if(clean&&idx<5){
    var next=document.getElementById('qrt_d'+(idx+1));
    if(next) next.focus();
  }
}

function qrtKey(idx,e){
  if(e.key==='Backspace'){
    var el=document.getElementById('qrt_d'+idx);
    if(el&&!el.value&&idx>0){
      var prev=document.getElementById('qrt_d'+(idx-1));
      if(prev){prev.value='';prev.focus();}
    }
  }
}

function qrtGetCode(){
  var code='';
  for(var i=0;i<6;i++){
    var el=document.getElementById('qrt_d'+i);
    code+=el?el.value:'';
  }
  return code;
}

// Generate 6-digit code from transfer data (deterministic hash)
function qrtGenerateCode(transferData){
  var str=JSON.stringify({
    bosNumber:transferData.bosNumber,
    buyerName:(transferData.buyer&&transferData.buyer.name)||'',
    gunSerial:(transferData.gun&&transferData.gun.serialNumber)||''
  });
  var hash=0;
  for(var i=0;i<str.length;i++){
    hash=((hash<<5)-hash)+str.charCodeAt(i);
    hash=hash&hash;
  }
  var code=Math.abs(hash)%1000000;
  return String(code).padStart(6,'0');
}

function qrtVerifyCode(gunId,bosNum){
  var code=qrtGetCode();
  if(code.length<6){
    document.getElementById('qrt_code_err').textContent='Enter all 6 digits';
    return;
  }
  var modal=document.getElementById('qrt_modal');
  var payload=modal?JSON.parse(modal.dataset.payload||'{}'):{};

  // We need buyer name from completed transfer — look in localStorage
  var stored=null;
  try{
    var key='av_qrt_completed_'+bosNum;
    var raw=localStorage.getItem(key);
    if(raw) stored=JSON.parse(raw);
  }catch(e){}

  var expectedCode='';
  if(stored){
    expectedCode=qrtGenerateCode({bosNumber:bosNum,buyer:stored.buyer,gun:payload.gun});
  }

  // Also accept code computed without stored buyer (fallback)
  var fallbackCode=qrtGenerateCode({bosNumber:bosNum,buyer:{name:''},gun:payload.gun});

  if(code!==expectedCode&&code!==fallbackCode){
    document.getElementById('qrt_code_err').textContent='Code incorrect — check with buyer';
    return;
  }

  // Complete the transfer
  var g=guns.find(function(x){return x.id===gunId;});
  if(!g){toast('Firearm not found','err');return;}

  var completedBos=Object.assign({},payload,{
    buyer:stored?stored.buyer:{},
    buyerSig:stored?stored.buyerSig:'',
    sellerSig:stored?stored.sellerSig:'',
    status:'completed',
    completedAt:new Date().toISOString(),
    transferMethod:stored?stored.transferMethod:'qr',
    salePrice:stored?stored.salePrice:'',
    bosNumber:bosNum
  });

  // Archive gun
  var transferred=Object.assign({},g,{transferred:true,transferredAt:new Date().toISOString(),bosId:bosNum});
  transferredGuns.push(transferred);
  saveTransferred();
  guns=guns.filter(function(x){return x.id!==gunId;});
  sv();

  // Save BOS
  billsOfSale.push(completedBos);
  saveBOS();

  // Log custody
  addCustodyEvent(gunId,{
    type:'Sale',
    date:new Date().toISOString(),
    notes:'QR Transfer — BOS '+bosNum+(stored&&stored.buyer&&stored.buyer.name?' — Buyer: '+stored.buyer.name:''),
    bosId:bosNum
  });

  closeQRTransfer();
  toast((g.make+' '+g.model)+' transferred. BOS: '+bosNum);
  VIEW='list';rnd();

  // Offer print
  setTimeout(function(){
    var pm=document.createElement('div');
    pm.style.cssText='position:fixed;inset:0;background:#000000cc;z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:0';
    pm.innerHTML='<div style="background:#1a1d24;border:2px solid #e8c46a40;border-top:2px solid #e8c46a;border-radius:16px 16px 0 0;padding:24px 20px 36px;width:100%;max-width:480px">'
      +'<div style="font-size:16px;font-weight:800;color:#e8c46a;margin-bottom:6px">&#9654; '+bosNum+'</div>'
      +'<div style="font-size:13px;color:#c0c8d8;margin-bottom:20px">QR Transfer complete. Print your bill of sale?</div>'
      +'<button onclick="genBosPDF(\''+bosNum+'\');this.closest(\'div[style]\').remove()" style="width:100%;background:#e8c46a;color:#1a1d24;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px">&#9113; Print / Save BOS</button>'
      +'<button onclick="this.closest(\'div[style]\').remove()" style="width:100%;background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:12px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit">Skip</button>'
      +'</div>';
    document.body.appendChild(pm);
  },500);
}

// Signature canvas
var _btSigDrawing=false;
var _btSigHasData=false;

function btInitSig(){
  var canvas=document.getElementById('bt_sig_canvas');
  if(!canvas) return;
  canvas.width=canvas.offsetWidth;
  var ctx=canvas.getContext('2d');
  ctx.strokeStyle='#e8c46a';
  ctx.lineWidth=2.5;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  function getPos(e){
    var rect=canvas.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*(canvas.width/rect.width),y:(src.clientY-rect.top)*(canvas.height/rect.height)};
  }
  canvas.addEventListener('mousedown',function(e){_btSigDrawing=true;var p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();});
  canvas.addEventListener('mousemove',function(e){if(!_btSigDrawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();_btSigHasData=true;e.preventDefault();});
  canvas.addEventListener('mouseup',function(){_btSigDrawing=false;});
  canvas.addEventListener('touchstart',function(e){_btSigDrawing=true;var p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();},{passive:false});
  canvas.addEventListener('touchmove',function(e){if(!_btSigDrawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();_btSigHasData=true;e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',function(){_btSigDrawing=false;});
}

function btClearSig(){
  var canvas=document.getElementById('bt_sig_canvas');
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  _btSigHasData=false;
}

var rangeForm=null; // active new-session form data
var rangeViewId=null; // session being viewed

function rRange(){
  var html='<div style="margin-bottom:16px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div><div style="font-size:20px;font-weight:800;color:#f0f2f5">🎯 Range Sessions</div>'
    +'<div style="font-size:12px;color:#8a95a8;margin-top:2px">'+rangeSessions.length+' session'+(rangeSessions.length!==1?'s':'')+' logged</div></div>'
    +'<button onclick="openNewRangeForm()" style="background:linear-gradient(135deg,#e8c46a,#c8a050);color:#1a1d24;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit">+ LOG SESSION</button>'
    +'</div>';

  if(!rangeSessions.length){
    html+='<div style="text-align:center;padding:48px 20px">'
      +'<div style="font-size:48px;margin-bottom:14px">🎯</div>'
      +'<div style="font-size:16px;font-weight:700;color:#f0f2f5;margin-bottom:8px">No range sessions yet</div>'
      +'<div style="font-size:13px;color:#8a95a8;line-height:1.7">Log your first session to start tracking<br/>round counts, groups, and performance.</div>'
      +'</div>';
  } else {
    var sorted=rangeSessions.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    sorted.forEach(function(s){
      var totalRounds=s.guns?s.guns.reduce(function(t,g){return t+(parseInt(g.rounds)||0);},0):0;
      var gunNames=s.guns?s.guns.map(function(ge){
        var found=guns.find(function(g){return g.id===ge.gunId;});
        return found?(found.make+' '+found.model):'Unknown';
      }).filter(Boolean):[];
      var stars='';
      for(var i=1;i<=5;i++) stars+=i<=(s.rating||0)?'★':'☆';
      html+='<div class="range-card" onclick="openRangeSession(\''+s.id+'\')">'
        +'<div class="range-card-header">'
        +'<div><div class="range-card-title">'+(s.rangeName||'Unnamed Range')+'</div>'
        +(s.location?'<div style="font-size:12px;color:#8a95a8;margin-top:2px">📍 '+eh(s.location)+'</div>':'')
        +'</div>'
        +'<div style="text-align:right"><div class="range-card-date">'+eh(s.date)+'</div>'
        +(s.rating?'<div class="range-stars">'+stars+'</div>':'')
        +'</div></div>'
        +'<div class="range-card-meta">'
        +(totalRounds?'<span class="range-meta-pill">🔵 '+totalRounds+' rounds</span>':'')
        +(s.distance?'<span class="range-meta-pill">📏 '+eh(s.distance)+'</span>':'')
        +(s.weather&&s.weather.temp?'<span class="range-meta-pill">🌡 '+eh(s.weather.temp)+'°</span>':'')
        +'</div>'
        +(gunNames.length?'<div class="range-guns-row">'+gunNames.map(function(n){return'<span class="range-gun-tag">'+eh(n)+'</span>';}).join('')+'</div>':'')
        +'</div>';
    });
  }
  html+='</div>';
  return html;
}

    +'<div><div style="font-size:17px;font-weight:800;color:#f0f2f5">'+(s.rangeName||'Range Session')+'</div>'
    +(s.rating?'<div class="range-stars" style="font-size:15px">'+stars+'</div>':'')

    +'</div>'
    +'</div>';
  modal.onclick=function(e){if(e.target===modal)modal.remove();};
  document.body.appendChild(modal);
}

function deleteRangeSession(id){
  if(!confirm('Delete this range session?')) return;
  rangeSessions=rangeSessions.filter(function(s){return s.id!==id;});
  saveRangeSessions();
  var m=document.getElementById('range_detail_modal');
  if(m) m.remove();
  rnd();
}

function editRangeSession(id){
  var s=rangeSessions.find(function(x){return x.id===id;});
  if(!s) return;
  var m=document.getElementById('range_detail_modal');
  if(m) m.remove();
  // Load session into rangeForm preserving id for overwrite on save
  rangeForm=JSON.parse(JSON.stringify(s));
  rangeForm._editId=id; // flag so submitRangeSession overwrites instead of creating new
  renderRangeFormModal();
}

function submitRangeSession(){
  collectRangeFormData();
  if(!rangeForm.date){toast('Please enter a date','err');return;}

  var isEdit=!!rangeForm._editId;
  var session=Object.assign({},rangeForm,{id:isEdit?rangeForm._editId:'rs_'+Date.now()});
  delete session._editId;

  if(isEdit){
    var idx=rangeSessions.findIndex(function(s){return s.id===session.id;});
    if(idx>=0) rangeSessions[idx]=session;
    else rangeSessions.push(session);
  } else {
    rangeSessions.push(session);
  }
  saveRangeSessions();

  // Update totalRounds on each linked gun and check service intervals
  var alerts=[];
  session.guns.forEach(function(ge){
    var g=guns.find(function(x){return x.id===ge.gunId;});
    if(!g) return;
    var prev=parseInt(g.totalRounds)||0;
    var added=parseInt(ge.rounds)||0;
    var newTotal=prev+added;
    g.totalRounds=newTotal;
    // Check service interval
    var interval=parseInt(g.serviceInterval)||0;
    if(interval>0){
      var prevBucket=Math.floor(prev/interval);
      var newBucket=Math.floor(newTotal/interval);
      if(newBucket>prevBucket){
        alerts.push({gun:g,total:newTotal,interval:interval});
      }
    }
  });
  sv();

  var modal=document.getElementById('range_form_modal');
  if(modal) modal.remove();

  // Show maintenance alerts if triggered
  if(alerts.length){
    setTimeout(function(){
      showRangeMaintenanceAlerts(alerts);
    },400);
  } else {
    toast('Range session saved!');
    rnd();
  }
}

function rRangeTab(gunId){

  var sessions=rangeSessions.filter(function(s){
    return s.guns&&s.guns.some(function(ge){return ge.gunId===gunId;});
  }).sort(function(a,b){return new Date(b.date)-new Date(a.date);});

  var totalRounds=parseInt(g.totalRounds)||0;
  var interval=parseInt(g.serviceInterval)||0;
  var lastSession=sessions.length?sessions[0].date:'Never';
  var roundsToService=interval>0?(interval-(totalRounds%interval)):'—';

  var alertHtml='';
  if(interval>0&&totalRounds>0){
    var bucket=totalRounds%interval;
    if(bucket<50||bucket===0){
      alertHtml='<div class="maint-alert-banner" style="margin-bottom:12px">'
        +'<span style="font-size:20px">⚠️</span>'

    +'<div class="range-tab-stat"><div class="range-tab-stat-val">'+sessions.length+'</div><div class="range-tab-stat-lbl">Sessions</div></div>'
    +'<div class="range-tab-stat"><div class="range-tab-stat-val">'+(typeof roundsToService==='number'?roundsToService.toLocaleString():roundsToService)+'</div><div class="range-tab-stat-lbl">To Service</div></div>'

  var sessionsHtml='';

function claude(prompt,mt,cb){
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:mt||600,messages:[{role:'user',content:prompt}]})})
  .then(function(r){return r.json();})
  .then(function(d){
    try{
      if(d.error){cb(new Error(d.error.message||'API error'),null);return;}
      if(!d.content||!d.content.length){cb(new Error('Empty response from API'),null);return;}
      var txt=d.content.map(function(i){return i.text||'';}).join('').replace(/```json|```/g,'').trim();
      cb(null,txt);
    }catch(ex){cb(ex,null);}
  })
  .catch(function(e){cb(e,null);});
}

var acIdx=-1;

function acInput(val){
  var list=document.getElementById('ac_list');
  acIdx=-1;
  if(!val||val.length<1){if(list)list.innerHTML='';return;}
  var q=val.toLowerCase();
  var matches=MAKES.filter(function(m){return m.toLowerCase().indexOf(q)===0;}).slice(0,8);
  if(!matches.length){if(list)list.innerHTML='';return;}
  if(list){
    list.innerHTML=matches.map(function(m,i){
      var bold='<strong>'+m.substring(0,val.length)+'</strong>'+m.substring(val.length);
      return '<div class="ac-item" id="ac_'+i+'" onmousedown="acPick(\''+m.replace(/'/g,"\\'")+'\')" onmouseover="acHover('+i+')">'+bold+'</div>';
    }).join('');
  }
}

function acKey(e){
  var list=document.getElementById('ac_list');
  if(!list)return;
  var items=list.querySelectorAll('.ac-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);acHighlight(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);acHighlight(items);}
  else if(e.key==='Enter'||e.key==='Tab'){
    if(acIdx>=0&&items[acIdx]){e.preventDefault();acPick(items[acIdx].textContent);}
    else{list.innerHTML='';}
  }
  else if(e.key==='Escape'){list.innerHTML='';}
}

function acHighlight(items){
  for(var i=0;i<items.length;i++){items[i].className='ac-item'+(i===acIdx?' sel':'');}
}

function acHover(i){acIdx=i;}

function acPick(val){
  FORM.make=val;
  var inp=document.getElementById('f_make');
  if(inp)inp.value=val;
  var list=document.getElementById('ac_list');
  if(list)list.innerHTML='';
  // Focus model field next
  setTimeout(function(){var m=document.getElementById('f_model');if(m)m.focus();},50);
}

function acBlur(){
  // Small delay so mousedown on item fires first
  setTimeout(function(){var l=document.getElementById('ac_list');if(l)l.innerHTML='';},200);
}

function doSnLookup(){
  var snEl=document.getElementById('f_sn');
  var mkEl=document.getElementById('f_make');
  var mdEl=document.getElementById('f_model');
  var yrEl=document.getElementById('f_yr');
  var yrSt=document.getElementById('yr_st');
  var snBtn=document.getElementById('sn_btn');

  var sn=snEl?snEl.value.trim():'';
  var mk=mkEl?mkEl.value.trim():'';
  var md=mdEl?mdEl.value.trim():'';

  if(!sn||sn.length<2){toast('Enter a serial number first','err');return;}
  if(!mk){toast('Enter Make first','err');return;}

  FORM.serialNumber=sn;FORM.make=mk;FORM.model=md;

  if(snBtn){snBtn.disabled=true;snBtn.innerHTML='<span class="spinning">&#8635;</span> Searching...';}
  if(yrEl){yrEl.value='';yrEl.placeholder='Searching...';}
  if(yrSt){yrSt.style.display='block';yrSt.style.color='#a0b8ff';yrSt.textContent='Searching serial number database...';}

  var result = snYearLookup(mk, sn);

  setTimeout(function(){
    if(snBtn){snBtn.disabled=false;snBtn.innerHTML='&#128269; Look Up Year';}
    var fillMsg=[];
    if(result.year){
      FORM.year=result.year;
      if(yrEl){yrEl.value=result.year;yrEl.placeholder='e.g. 2018';}
      fillMsg.push('Year: '+result.year);
    } else {
      if(yrEl)yrEl.placeholder='Enter year manually';
    }
    // Auto-fill Type if found and not already set
    if(result.type){
      var typeEl=document.getElementById('f_type');
      if(typeEl&&!FORM.type){typeEl.value=result.type;FORM.type=result.type;fillMsg.push('Type: '+result.type);}
    }
    // Auto-fill Caliber if found and not already set
    if(result.caliber){
      var calEl=document.getElementById('f_cal');
      if(calEl&&!FORM.caliber){
        var opts=calEl.options;
        for(var oi=0;oi<opts.length;oi++){
          if(opts[oi].text.toLowerCase()===result.caliber.toLowerCase()||opts[oi].value.toLowerCase()===result.caliber.toLowerCase()){
            calEl.value=opts[oi].value;FORM.caliber=opts[oi].value;fillMsg.push('Caliber: '+opts[oi].value);break;
          }
        }
      }
    }
    if(fillMsg.length>0){
      if(yrSt){yrSt.style.color='#60e880';yrSt.textContent='✓ '+result.confidence+' — '+result.source;}
      toast('Found: '+fillMsg.join(' · '));
    } else {
      if(yrSt){yrSt.style.color='#ffd060';yrSt.textContent='⚠ '+result.source;}
      toast('Could not determine info — enter manually','err');
    }
  }, 600);
}

  if(m.indexOf('smith')>=0||m.indexOf('s&w')>=0||m.indexOf('s & w')>=0){
    // Post-1969 letter prefix codes
    var swPfx={
      'C':1972,'D':1975,'E':1977,'F':1979,'G':1980,'H':1981,'J':1982,'K':1983,
      'L':1984,'M':1985,'N':1986,'P':1987,'R':1988,'S':1989,'T':1990,'U':1991,

      'WAM':2017,'XAM':2018,'YAM':2019,'ZAM':2020

    var p3=sn.substring(0,3);

  // Savage Arms

function loadSch(id){
  var g=guns.find(function(x){return x.id===id;});if(!g)return;
  // Check built-in database first
  var db=schDB(g.make,g.model,g.caliber,g.type);
  if(db){
    if(!requirePro('Schematics & Parts')) return;
    SCH=db;scLoad=false;rnd();return;
  }
  // Not in database — AI lookup requires Pro+
  if(!requireProPlus('AI Schematics')) return;
  // Not in database — try AI if online
  if(!navigator.onLine){
    scLoad=false;
    SCH={_notFound:true,make:g.make,model:g.model};
    rnd();return;
  }
  scLoad=true;SCH=null;rnd();
  var done=false;
  var timer=setTimeout(function(){
    if(!done){
      done=true;
      scLoad=false; // always clear spinner
      if(VIEW==='detail'&&selId===id){
        SCH={_notFound:true,make:g.make,model:g.model};
        rnd();
        toast('Schematic lookup timed out','err');
      }
    }
  },20000);
  claude('Firearms technical expert. For the '+g.make+' '+g.model+' ('+g.caliber+' '+(g.type||'')+'), provide detailed field strip and assembly info. Respond ONLY with JSON no markdown: {"assemblySteps":[{"step":1,"title":"title","description":"detail","caution":null}],"disassemblySteps":[{"step":1,"title":"title","description":"detail","caution":null}],"partsList":[{"partNumber":"1","name":"name","description":"function","replaceable":true}],"safetyWarnings":["warning"],"toolsRequired":["tool"],"notes":"notes"} Include 7+ disassembly steps, 7+ assembly steps, 18+ parts.',2500,function(e,txt){
    clearTimeout(timer);if(done)return;done=true;
    scLoad=false; // always clear spinner
    if(VIEW!=='detail'||selId!==id)return; // skip state+render if user navigated away
    if(e){SCH={_notFound:true,make:g.make,model:g.model};rnd();toast('Could not load schematics','err');}
    else{try{SCH=JSON.parse(txt);}catch(ex){SCH={_notFound:true,make:g.make,model:g.model};}rnd();}
  });
}

function onPhoto(){
  var files=Array.from(this.files);if(!files.length)return;
  if(!FORM.photos)FORM.photos=FORM.photo?[FORM.photo]:[];
  var remaining=10-FORM.photos.length;
  if(remaining<=0){toast('Maximum 10 photos reached','err');this.value='';return;}
  files=files.slice(0,remaining);
  var loaded=0;
  files.forEach(function(file){
    var r=new FileReader();
    r.onload=function(e){
      FORM.photos.push(e.target.result);
      if(FORM.photos.length>0)FORM.photo=FORM.photos[0];
      loaded++;
      if(loaded===files.length)rnd();
    };
    r.readAsDataURL(file);
  });
  this.value='';
}

function removePhoto(idx){
  if(!FORM.photos)return;
  FORM.photos.splice(idx,1);
  FORM.photo=FORM.photos.length>0?FORM.photos[0]:'';
  rnd();
}

function onSch(){
  var file=this.files[0];if(!file)return;
  var nm=file.name;
  var r=new FileReader();
  r.onload=function(e){
    guns=guns.map(function(g){return g.id===selId?Object.assign({},g,{uploadedSchematic:e.target.result,uploadedSchematicName:nm}):g;});
    sv();rnd();toast('Schematic uploaded');
  };
  r.readAsDataURL(file);this.value='';
}

function remSch(id){
  guns=guns.map(function(g){return g.id===id?Object.assign({},g,{uploadedSchematic:null,uploadedSchematicName:null}):g;});
  sv();rnd();toast('Schematic removed');
}

function expCSV(){

function schDB(make,model,caliber,type){
  var m=(make||'').toLowerCase();
  var md=(model||'').toLowerCase();
  var sw=m.indexOf('smith')>=0||m.indexOf('s&w')>=0;
  var gl=m.indexOf('glock')>=0;

function schDiagram(sch){
  if(!sch||!sch.partsList) return '<div style="color:#8a95a8;padding:20px">No diagram available</div>';
  var notes = sch.notes||'';
  var isGlock = notes.indexOf('Safe Action')>=0||notes.indexOf('Glock')>=0;
  var isSW = notes.indexOf('J-Frame')>=0||notes.indexOf('J-frame')>=0||notes.indexOf('revolver')>=0;
  var is870 = notes.indexOf('870')>=0||notes.indexOf('best-selling shotgun')>=0;
  var isMoss = notes.indexOf('500/590')>=0||notes.indexOf('Mossberg')>=0;
  var is1911 = notes.indexOf('1911')>=0&&(notes.indexOf('pistol')>=0||notes.indexOf('Pistol')>=0);
  var is1022 = notes.indexOf('10/22')>=0||notes.indexOf('rotary magazine')>=0;

  if(isGlock) return svgGlock();
  if(isSW) return svgJFrame();
  if(is870) return svg870();
  if(isMoss) return svgMoss();
  if(is1911) return svg1911();
  if(is1022) return svg1022();
  return svgGeneric(sch);
}

function svgWrap(w,h,inner){
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;background:#13161d;border-radius:8px;padding:10px">'+
    '<style>.lbl{font:bold 11px monospace;fill:#f0f2f5}.sub{font:10px monospace;fill:#8a95a8}.gold{fill:#e8c46a}.line{stroke:#e8c46a;stroke-width:1;fill:none}.part{fill:#2a3a50;stroke:#3a5070;stroke-width:1.5}.hi{fill:#1e3050;stroke:#e8c46a;stroke-width:1.5}</style>'+
    inner+'</svg>';
}

function callout(x,y,lx,ly,num,label){
  var dx = lx>x?8:-8;
  return '<line x1="'+x+'" y1="'+y+'" x2="'+lx+'" y2="'+ly+'" class="line"/>'
    +'<circle cx="'+lx+'" cy="'+ly+'" r="10" fill="#e8c46a22" stroke="#e8c46a" stroke-width="1"/>'
    +'<text x="'+lx+'" y="'+(ly+4)+'" text-anchor="middle" class="lbl gold">'+num+'</text>'
    +'<text x="'+(lx+dx+( lx>x?2:-2))+'" y="'+(ly+4)+'" text-anchor="'+(lx>x?'start':'end')+'" class="lbl">'+label+'</text>';
}

// ── LIGHTBOX ─────────────────────────────────────────────────────────
function openLb(photos, idx){
  lbPhotos = photos;
  lbIdx = idx||0;
  showLb();
}

function showLb(){
  var existing = document.getElementById('lightbox');
  if(existing) existing.remove();
  if(!lbPhotos||!lbPhotos.length) return;
  var lb = document.createElement('div');
  lb.id = 'lightbox';
  lb.className = 'lightbox';
  lb.onclick = function(e){ if(e.target===lb) closeLb(); };
  lb.innerHTML =
    '<img src="'+lbPhotos[lbIdx]+'" alt="Photo '+(lbIdx+1)+'"/>'+
    '<div class="lightbox-nav">'+
    (lbPhotos.length>1?'<button class="lb-btn" onclick="lbPrev()">&#8592;</button>':'')+
    '<span class="lb-counter">'+(lbIdx+1)+' / '+lbPhotos.length+'</span>'+
    (lbPhotos.length>1?'<button class="lb-btn" onclick="lbNext()">&#8594;</button>':'')+
    '<button class="lb-btn" onclick="closeLb()" style="margin-left:10px;color:#ff7070">✕ Close</button>'+
    '</div>';
  document.body.appendChild(lb);
}

function lbNext(){
  lbIdx = (lbIdx+1) % lbPhotos.length;
  showLb();
}

function lbPrev(){
  lbIdx = (lbIdx-1+lbPhotos.length) % lbPhotos.length;
  showLb();
}

function closeLb(){
  var lb = document.getElementById('lightbox');
  if(lb) lb.remove();
}

// Keyboard nav for lightbox
document.addEventListener('keydown', function(e){
  if(!document.getElementById('lightbox')) return;
  if(e.key==='ArrowRight') lbNext();
  else if(e.key==='ArrowLeft') lbPrev();
  else if(e.key==='Escape') closeLb();
});

// ── BACKUP & RESTORE ─────────────────────────────────────────────────

function clearAllData(){
  if(!confirm('Delete ALL firearms from inventory? This cannot be undone.\n\nTip: tap Backup first to save your data.'))return;
  guns=[];
  // Clear IndexedDB
  openDB(function(db){
    if(db){
      try{
        var tx=db.transaction([STORE],'readwrite');
        tx.objectStore(STORE).clear();
      }catch(e){}
    }
  });
  // Clear localStorage too
  try{localStorage.removeItem(SK);}catch(e){}
  try{sessionStorage.removeItem(SK);}catch(e){}
  window._gunBackup=null;
  haptic('delete');toast('All data cleared');
  rnd();
}

function backupData(){
  var collName=collections[activeCollection]?collections[activeCollection].name:'My Collection';
  var data={guns:guns,customPrices:customPrices,version:SK,exported:new Date().toISOString(),collectionName:collName};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='arsenal_vault_'+collName.replace(/[^a-z0-9]/gi,'_')+'_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup saved to Downloads');
}

function doImport(data){
  // Support legacy calls that pass data directly; otherwise read from staging
  if(!data) data=_pendingImportData;
  if(!data||!data.guns){ toast('Import data missing','err'); return; }
  var nameEl=document.getElementById('import_name');
  var modeEl=document.querySelector('input[name="import_mode"]:checked');
  var name=nameEl?nameEl.value.trim():'Imported Collection';
  var mode=modeEl?modeEl.value:'new';

  if(!name) name='Imported Collection';

  var m=document.getElementById('import_modal');
  if(m) m.remove();

  if(mode==='new'){
    // Create new collection
    var id='coll_'+Date.now().toString(36);
    collections[id]={name:name,created:new Date().toISOString()};
    saveCollections();

    // Save current collection first
    saveGunsToCollection(activeCollection);

    // Switch to new collection with imported guns
    activeCollection=id;
    try{localStorage.setItem('av_active_coll',id);}catch(e){}
    guns=data.guns;
    if(data.customPrices) customPrices=data.customPrices;
    sv();
    milestones={};totalCleanings=0;transferredGuns=[];
    loadMilestones();loadTransferred();
    haptic('save');
    toast('Imported '+guns.length+' firearms into "'+name+'"');
    VIEW='dashboard';
    rnd();
  } else if(mode==='merge'){
    // Pro+ gate
    if(!requireProPlus('Merge Collections')) return;
    _startMerge(data);
  } else {
    // Replace current collection
    if(!confirm('Replace all firearms in "'+collections[activeCollection].name+'" with '+data.guns.length+' firearms from backup? This cannot be undone.')) return;
    guns=data.guns;
    if(data.customPrices) customPrices=data.customPrices;
    sv();
    haptic('save');
    toast('Restored '+guns.length+' firearms');
    VIEW='dashboard';
    rnd();
  }
}

// ── MERGE IMPORT ─────────────────────────────────────────────────────
function _normSerial(s){ return (s||'').toString().trim().toLowerCase(); }

function _handleMergeRadioTap(ev){
  // Pre-flight gate: if Free/Pro user taps the merge option, show upgrade immediately.
  // The actual merge path also gates in doImport(), so this is UX sugar not security.
  if(_tierLevel(appSettings.tier)<_tierLevel('proplus')){
    var radio=ev.currentTarget.querySelector('input[type="radio"]');
    if(radio){ radio.checked=false; }
    // Keep the "New Collection" radio selected as fallback
    var newRadio=document.querySelector('input[name="import_mode"][value="new"]');
    if(newRadio) newRadio.checked=true;
    requireProPlus('Merge Collections');
    ev.preventDefault();
    ev.stopPropagation();
  }
}

function _startMerge(data){
  var incoming=(data.guns||[]).slice();
  // Build map of existing serials → gun index
  var existingBySerial={};
  for(var i=0;i<guns.length;i++){
    var s=_normSerial(guns[i].serialNumber);
    if(s) existingBySerial[s]=i;
  }
  // Classify incoming
  var newOnes=[];
  var dupes=[]; // [{incoming, mineIdx}]
  for(var j=0;j<incoming.length;j++){
    var sn=_normSerial(incoming[j].serialNumber);
    if(sn && existingBySerial.hasOwnProperty(sn)){
      dupes.push({ incoming: incoming[j], mineIdx: existingBySerial[sn] });
    } else {
      newOnes.push(incoming[j]);
    }
  }
  _showMergePreview(newOnes, dupes, data);
}

function _showMergePreview(newOnes, dupes, data){
  var total=newOnes.length+dupes.length;
  var modal=document.createElement('div');
  modal.id='merge_preview_modal';
  modal.style.cssText='position:fixed;inset:0;background:#000000dd;z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';
  var dupeBtnHTML = dupes.length>0
    ? '<button id="merge_review_btn" style="background:#e8c46a;color:#1a1d24;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Review Duplicates &#8250;</button>'
    : '<button id="merge_review_btn" style="background:#e8c46a;color:#1a1d24;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Add '+newOnes.length+' Firearm'+(newOnes.length!==1?'s':'')+'</button>';
  modal.innerHTML='<div style="background:#222835;border:2px solid #e8c46a60;border-radius:12px;padding:24px;max-width:340px;width:100%">'
    +'<div style="font-size:16px;font-weight:700;color:#e8c46a;margin-bottom:6px">&#128257; Merge Preview</div>'
    +'<div style="font-size:13px;color:#8a95a8;margin-bottom:18px">Reviewing '+total+' incoming firearm'+(total!==1?'s':'')+' against "'+eh(collections[activeCollection].name)+'".</div>'
    +'<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:13px;font-weight:600;color:#f0f2f5">New Firearms</div><div style="font-size:11px;color:#4a5568">Will be added</div></div>'
      +'<div style="font-size:22px;font-weight:800;color:#7eb87e">'+newOnes.length+'</div>'
    +'</div>'
    +'<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:14px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:13px;font-weight:600;color:#f0f2f5">Duplicate Serials</div><div style="font-size:11px;color:#4a5568">'+(dupes.length>0?'Needs your review':'None found')+'</div></div>'
      +'<div style="font-size:22px;font-weight:800;color:'+(dupes.length>0?'#e8c46a':'#4a5568')+'">'+dupes.length+'</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
      +dupeBtnHTML
      +'<button onclick="document.getElementById(\'merge_preview_modal\').remove()" style="background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>'

  +'</div>';

  // Wire the primary button
  document.getElementById('merge_review_btn').onclick=function(){
    modal.remove();
    if(dupes.length===0){
      _applyMergeResolutions(newOnes, [], data);
    } else {

    }

}

function _showMergeConflicts(newOnes, dupes, data){
  var rows='';
  for(var i=0;i<dupes.length;i++){
    var d=dupes[i];
    var mine=guns[d.mineIdx];
    var inc=d.incoming;
    rows+='<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:12px;margin-bottom:10px">'
      +'<div style="font-size:12px;font-weight:700;color:#e8c46a;margin-bottom:8px">Serial: '+eh(inc.serialNumber||'(none)')+'</div>'
      +'<div style="font-size:11px;color:#8a95a8;margin-bottom:10px">'
        +'<div><span style="color:#7eb87e;font-weight:700">Mine:</span> '+eh((mine.make||'')+' '+(mine.model||'')).trim()+' ('+eh(mine.condition||'')+')</div>'
        +'<div style="margin-top:3px"><span style="color:#a0c0ff;font-weight:700">Incoming:</span> '+eh((inc.make||'')+' '+(inc.model||'')).trim()+' ('+eh(inc.condition||'')+')</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px">'
        +'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#f0f2f5"><input type="radio" name="dup_'+i+'" value="keep" checked style="accent-color:#7eb87e"/>Keep Mine</label>'
        +'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#f0f2f5"><input type="radio" name="dup_'+i+'" value="replace" style="accent-color:#a0c0ff"/>Use Incoming</label>'
        +'<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#f0f2f5"><input type="radio" name="dup_'+i+'" value="skip" style="accent-color:#8a95a8"/>Skip</label>'
      +'</div>'
    +'</div>';
  }
  var modal=document.createElement('div');
  modal.id='merge_conflicts_modal';
  modal.style.cssText='position:fixed;inset:0;background:#000000dd;z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML='<div style="background:#222835;border:2px solid #e8c46a60;border-radius:12px;padding:20px;max-width:360px;width:100%;max-height:90vh;display:flex;flex-direction:column">'
    +'<div style="font-size:16px;font-weight:700;color:#e8c46a;margin-bottom:4px">Resolve '+dupes.length+' Duplicate'+(dupes.length!==1?'s':'')+'</div>'
    +'<div style="font-size:12px;color:#8a95a8;margin-bottom:14px">For each duplicate serial, choose what to do.</div>'
    +'<div style="overflow-y:auto;flex:1;margin-bottom:12px">'+rows+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
      +'<button id="merge_apply_btn" style="background:#e8c46a;color:#1a1d24;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Apply Merge</button>'
      +'<button onclick="document.getElementById(\'merge_conflicts_modal\').remove()" style="background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>'

      resolutions.push(el?el.value:'keep');
    }
    modal.remove();
    _applyMergeResolutions(newOnes, dupes.map(function(d,i){return {dupe:d, choice:resolutions[i]};}), data);
  };
}

function _applyMergeResolutions(newOnes, resolved, data){
  var added=0, replaced=0, kept=0, skipped=0;
  // Add all non-duplicates with fresh ids to avoid collision with existing guns
  for(var i=0;i<newOnes.length;i++){
    var g=Object.assign({}, newOnes[i], { id: gid() });
    guns.push(g);
    added++;
  }
  // Apply duplicate resolutions
  for(var j=0;j<resolved.length;j++){
    var r=resolved[j];
    if(r.choice==='keep'){ kept++; }
    else if(r.choice==='replace'){
      // Preserve the existing id so references don't break
      var existingId=guns[r.dupe.mineIdx].id;
      guns[r.dupe.mineIdx]=Object.assign({}, r.dupe.incoming, { id: existingId });
      replaced++;
    }
    else if(r.choice==='skip'){ skipped++; }
  }
  // Merge customPrices (incoming wins only where mine has no entry)
  if(data.customPrices){
    if(!customPrices) customPrices={};
    for(var k in data.customPrices){
      if(data.customPrices.hasOwnProperty(k) && !customPrices.hasOwnProperty(k)){
        customPrices[k]=data.customPrices[k];
      }
    }
  }
  sv();
  haptic('save');
  var parts=[];
  if(added) parts.push(added+' added');
  if(replaced) parts.push(replaced+' replaced');
  if(kept) parts.push(kept+' kept');
  if(skipped) parts.push(skipped+' skipped');
  toast('Merged: '+(parts.length?parts.join(', '):'no changes'));
  VIEW='dashboard';
  rnd();
}
// ── END MERGE IMPORT ─────────────────────────────────────────────────

// Check if opened via QR code scan

  var params = new URLSearchParams(window.location.search);
  var transferData = params.get('transfer');
  var viewData = params.get('view');
  if(transferData){
    try{
      var payload=JSON.parse(decodeURIComponent(atob(transferData)));
      showBuyerTransferPage(payload);
      return;
    }catch(e){}
  }
  if(viewData){
    try{
      var g = JSON.parse(decodeURIComponent(atob(viewData)));
      showQRView(g);
      return;
    }catch(e){}
  }
  loadSettings();
  initPINLock();
loadCollections();
loadMilestones();
loadTransferred();
loadBOS();
loadCustomPrices();
initNavigation();
initSwipeNav();
  document.addEventListener('touchstart', unlockAudio);
  document.addEventListener('click', unlockAudio);
  checkNFCScan();
  ld(); // rnd() called inside ld() after async DB load
})();
