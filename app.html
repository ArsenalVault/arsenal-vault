// ── COLLECTIONS ───────────────────────────────────────────────────────

// T7: resolve a proposed collection name to one that doesn't collide
// (case-insensitive) with any existing collection's name. Appends " (2)",
// " (3)", etc. until a free name is found. Caller is responsible for
// empty-string handling — this helper returns the trimmed input unchanged
// when input is empty/whitespace, so callers must check first.
// Returns {name: string, suffixed: bool}.
function _resolveCollectionName(proposedName){
  var trimmed = (proposedName || '').toString().trim();
  if(!trimmed) return {name: trimmed, suffixed: false};
  // Build a lowercase set of existing names
  var existing = {};
  for(var id in collections){
    if(collections.hasOwnProperty(id) && collections[id] && collections[id].name){
      existing[collections[id].name.toLowerCase()] = true;
    }
  }
  if(!existing[trimmed.toLowerCase()]) return {name: trimmed, suffixed: false};
  // Collision — find the next free " (N)" suffix, starting at 2
  var n = 2;
  while(n < 1000){
    var candidate = trimmed + ' (' + n + ')';
    if(!existing[candidate.toLowerCase()]){
      return {name: candidate, suffixed: true};
    }
    n++;
  }
  // Pathological case — fall back to a timestamped suffix
  return {name: trimmed + ' (' + Date.now().toString(36) + ')', suffixed: true};
}

// T7: one-time cleanup of existing duplicate collection names. Runs inside
// loadCollections() after parsing storage. Idempotent — running twice is a
// no-op because the first run eliminated all duplicates.
//
// Algorithm:
//   1. Group collections by lowercased trimmed name.
//   2. For each group with >=2 members, sort by created ASC (oldest first).
//   3. The 'default' collection, if present in a group, is always pinned
//      first regardless of created date (load-bearing — name is cosmetic
//      but identity matters and other code references collections['default']).
//   4. First member keeps its original name. Subsequent members get " (2)",
//      " (3)", etc., skipping any suffix that collides with another existing
//      collection name.
//   5. Persist only if any rename happened.
function _dedupeCollectionNames(){
  var ids = Object.keys(collections || {});
  if(ids.length < 2) return;
  // Build a case-insensitive set of all current names up front — used so
  // suffixes we pick don't collide with an unrelated, unrenamed collection.
  var takenNames = {};
  for(var a=0; a<ids.length; a++){
    var col = collections[ids[a]];
    if(col && col.name) takenNames[col.name.toLowerCase()] = true;
  }
  // Group by lowercased trimmed name
  var groups = {};
  for(var b=0; b<ids.length; b++){
    var id = ids[b];
    var c = collections[id];
    if(!c || !c.name) continue;
    var key = c.name.trim().toLowerCase();
    if(!groups[key]) groups[key] = [];
    groups[key].push(id);
  }
  var anyRenamed = false;
  for(var key2 in groups){
    var memberIds = groups[key2];
    if(memberIds.length < 2) continue;
    // Sort: 'default' first, then by created ASC
    memberIds.sort(function(x, y){
      if(x === 'default') return -1;
      if(y === 'default') return 1;
      var cx = (collections[x] && collections[x].created) || '';
      var cy = (collections[y] && collections[y].created) || '';
      if(cx < cy) return -1;
      if(cx > cy) return 1;
      // Stable tiebreak by id
      return x < y ? -1 : (x > y ? 1 : 0);
    });
    // First keeps its name; remove it from takenNames temporarily so we
    // don't count its own slot as taken when computing suffixes.
    var baseName = collections[memberIds[0]].name.trim();
    // Rename the rest
    for(var i=1; i<memberIds.length; i++){
      var mid = memberIds[i];
      var n = 2;
      var newName = null;
      while(n < 1000){
        var candidate = baseName + ' (' + n + ')';
        if(!takenNames[candidate.toLowerCase()]){
          newName = candidate;
          break;
        }
        n++;
      }
      if(!newName) newName = baseName + ' (' + Date.now().toString(36) + i + ')';
      collections[mid].name = newName;
      takenNames[newName.toLowerCase()] = true;
      anyRenamed = true;
    }
  }
  if(anyRenamed){
    try{saveCollections();}catch(e){}
  }
}

function loadCollections(){
  try{
    var s=localStorage.getItem('av_collections');
    if(s){
      collections=JSON.parse(s);
    }
  }catch(e){}

  // Ensure default collection exists
  if(!collections['default']){
    collections['default']={
      name:'My Collection',
      created:new Date().toISOString()
    };
    saveCollections();
  }

  // T7: clean up any pre-existing duplicate collection names. One-time pass
  // that renames " (2)", " (3)" etc. Protects users who created duplicates
  // on older builds; idempotent for users who had none.
  _dedupeCollectionNames();

  // Migrate existing guns into default collection if not already done
  var migrated=localStorage.getItem('av_coll_migrated');
  if(!migrated){
    localStorage.setItem('av_coll_migrated','1');
    // guns array already loaded by ld() - they belong to default collection
  }

  // Load active collection preference
  try{
    var ac=localStorage.getItem('av_active_coll');
    if(ac&&collections[ac]) activeCollection=ac;
    else activeCollection='default';
  }catch(e){activeCollection='default';}
}

function saveCollections(){
  try{localStorage.setItem('av_collections',JSON.stringify(collections));}catch(e){}
}

function getCollKey(collId){
  return 'av_guns_'+(collId||activeCollection);
}

function switchCollection(collId){
  if(collId===activeCollection){collMenuOpen=false;rnd();return;}

  // Save current guns to current collection
  saveGunsToCollection(activeCollection);

  // Switch
  activeCollection=collId;
  try{localStorage.setItem('av_active_coll',collId);}catch(e){}

  // Load new collection's guns
  loadGunsFromCollection(collId);

  // Reset state
  collMenuOpen=false;
  bulkMode=false;
  bulkSelected=[];
  showCustodyForm=false;
  editingCustodyId=null;
  aiLoad=null;
  VIEW='dashboard';
  selId=null;editId=null;
  FORM=ef();srch='';
  fCond='All';fWork='All';fType='All';
  SCH=null;aiVal=null;aiDiag=null;
  milestones={};totalCleanings=0;transferredGuns=[];
  loadMilestones();
  loadTransferred();
  rnd();
  toast('Switched to '+collections[collId].name);
}

function saveGunsToCollection(collId){
  var data=JSON.stringify(guns);
  try{localStorage.setItem(getCollKey(collId),data);}catch(e){}
  try{sessionStorage.setItem(getCollKey(collId),data);}catch(e){}
  // Also save to IndexedDB with collection prefix
  openDB(function(db){
    if(!db)return;
    try{
      var tx=db.transaction(['meta'],'readwrite');
      tx.objectStore('meta').put(guns,'guns_'+collId);
    }catch(e){}
  });
}

function loadGunsFromCollection(collId){
  // Try IndexedDB first
  openDB(function(db){
    if(db){
      try{
        var tx=db.transaction(['meta'],'readonly');
        var req=tx.objectStore('meta').get('guns_'+collId);
        req.onsuccess=function(e){
          if(e.target.result&&e.target.result.length>0){
            guns=e.target.result;
          } else {
            // Try localStorage
            var s=localStorage.getItem(getCollKey(collId));
            if(s){try{guns=JSON.parse(s);}catch(ex){guns=[];}}
            else guns=[];
          }
          rnd();
        };
        req.onerror=function(){
          var s=localStorage.getItem(getCollKey(collId));
          if(s){try{guns=JSON.parse(s);}catch(ex){guns=[];}}
          else guns=[];
          rnd();
        };
      }catch(e){guns=[];rnd();}
    } else {
      var s=localStorage.getItem(getCollKey(collId));
      if(s){try{guns=JSON.parse(s);}catch(ex){guns=[];}}
      else guns=[];
      rnd();
    }
  });
}

function createCollection(){
  if(!requireProPlus('Multiple Collections')) return;
  var name=prompt('Collection name:');
  if(!name||!name.trim()) return;
  name=name.trim();
  // T7: silently disambiguate name collisions (case-insensitive)
  var resolved=_resolveCollectionName(name);
  var finalName=resolved.name;
  var id='coll_'+Date.now().toString(36);
  collections[id]={name:finalName,created:new Date().toISOString()};
  saveCollections();
  collMenuOpen=false;
  // Save current and switch
  saveGunsToCollection(activeCollection);
  activeCollection=id;
  try{localStorage.setItem('av_active_coll',id);}catch(e){}
  guns=[];
  milestones={};totalCleanings=0;transferredGuns=[];
  VIEW='dashboard';
  FORM=ef();
  rnd();
  if(resolved.suffixed){
    toast('Collection "'+finalName+'" created — "'+name+'" already existed');
  } else {
    toast('Collection "'+finalName+'" created!');
  }
}

function renameCollection(collId){
  var old=collections[collId]?collections[collId].name:'';
  var name=prompt('Rename collection:',old);
  if(!name||!name.trim()) return;
  name=name.trim();
  // T7: temporarily drop this collection's own name from the "taken" set so
  // the user can rename to the same name (case change, whitespace cleanup)
  // without triggering false collision. We do this by clearing its name
  // before resolving, then writing the resolved name back.
  var prev=collections[collId].name;
  collections[collId].name='';
  var resolved=_resolveCollectionName(name);
  collections[collId].name=resolved.name || prev;
  saveCollections();
  collMenuOpen=false;
  rnd();
  if(resolved.suffixed){
    toast('Renamed to "'+collections[collId].name+'" — "'+name+'" already existed');
  } else {
    toast('Renamed to "'+collections[collId].name+'"');
  }
}

function deleteCollection(collId){
  if(collId==='default'){toast('Cannot delete the default collection','err');return;}
  var name=collections[collId]?collections[collId].name:'this collection';
  var count=guns.length;
  if(!confirm('Delete "'+name+'"?\n\nThis will permanently delete all '+count+' firearms in this collection. This cannot be undone.')) return;

  // Remove from collections
  delete collections[collId];
  saveCollections();

  // Clear stored guns for this collection
  try{localStorage.removeItem(getCollKey(collId));}catch(e){}
  try{sessionStorage.removeItem(getCollKey(collId));}catch(e){}
  openDB(function(db){
    if(!db)return;
    try{
      var tx=db.transaction(['meta'],'readwrite');
      tx.objectStore('meta').delete('guns_'+collId);
    }catch(e){}
  });

  // Switch to default
  activeCollection='default';
  try{localStorage.setItem('av_active_coll','default');}catch(e){}
  loadGunsFromCollection('default');
  milestones={};totalCleanings=0;transferredGuns=[];
  loadMilestones();
  loadTransferred();
  collMenuOpen=false;
  VIEW='dashboard';
  haptic('delete');
  toast('Collection deleted — switched to default');
}

function toggleCollMenu(){

    // 300ms delay prevents the opening tap from immediately self-dismissing
    setTimeout(function(){

          document.removeEventListener('keydown',_collDismissKey);

          document.removeEventListener('keydown',_collDismissKey);
        }
      }

}

// ── PIN LOCK ──────────────────────────────────────────────────────────
var _pinEntry='';
var _pinAttempts=0;
var _pinLockUntil=0;
var _pinVerified=false;
var _appWasLocked=false;


function togglePINSetting(){
  if(appSettings.pinEnabled){
    // Disable PIN - ask for current PIN first
    if(!confirm('Disable PIN lock? Your collection will no longer be protected.')) return;
    localStorage.removeItem('av_pin');
    appSettings.pinEnabled=false;
    saveSettings();
    // Close and reopen settings to refresh
    var m=document.getElementById('settings_modal');
    if(m)m.remove();
    toast('PIN lock disabled');
    openSettings();
  } else {
    // Enable PIN - show set PIN screen
    var m=document.getElementById('settings_modal');
    if(m)m.remove();
    showPINScreen('set');
  }
}

function isPINEnabled(){
  return appSettings.pinEnabled && localStorage.getItem('av_pin');
}

function initPINLock(){
  // Detect when phone screen locks/unlocks using visibilitychange + Page Lifecycle API
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){
      // App going to background - record time
      try{sessionStorage.setItem('av_bg_time',Date.now().toString());}catch(e){}
      _appWasLocked=true;
    } else {
      // App coming back to foreground
      if(_appWasLocked && isPINEnabled() && !_pinVerified){
        // Check if phone was locked (we approximate by checking if page was hidden)
        showPINScreen('unlock');
      }
      _appWasLocked=false;
    }
  });

  // Show PIN on first load if enabled
  if(isPINEnabled()){
    _pinVerified=false;
    showPINScreen('unlock');
  } else {
    _pinVerified=true;
  }
}

function showPINScreen(mode){
  _pinEntry='';
  _pinAttempts=parseInt(localStorage.getItem('av_pin_attempts')||'0');
  _pinLockUntil=parseInt(localStorage.getItem('av_pin_lock_until')||'0');

  var existing=document.getElementById('pin_screen');
  if(existing) existing.remove();

  var screen=document.createElement('div');
  screen.id='pin_screen';
  screen.className='pin-screen';

  var title=mode==='set'?'Set PIN':mode==='change'?'Enter New PIN':'ArsenalDB';
  var sub=mode==='set'?'Choose a 6-digit PIN to secure your collection':
          mode==='change'?'Enter your new 6-digit PIN':
          'Enter your PIN to continue';

  screen.innerHTML=
    '<div class="pin-logo">ArsenalDB</div>'
    +'<div class="pin-title">'+title+'</div>'
    +'<div class="pin-sub">'+sub+'</div>'
    +'<div class="pin-dots" id="pin_dots">'
      +Array(6).fill('<div class="pin-dot"></div>').join('')
    +'</div>'
    +'<div class="pin-error" id="pin_error"></div>'
    +'<div class="pin-keypad">'
      +[1,2,3,4,5,6,7,8,9].map(function(n){
        return '<button class="pin-key" onclick="pinKey(\''+n+'\')">'+n+'</button>';
      }).join('')
      +'<button class="pin-key" onclick="pinForgot()" style="font-size:12px;color:#4a5568">Forgot</button>'
      +'<button class="pin-key" onclick="pinKey(\'0\')">0</button>'
      +'<button class="pin-key" onclick="pinBack()" style="font-size:18px">&#9003;</button>'
    +'</div>'
    +(mode==='unlock'?'<div class="pin-forgot" onclick="pinForgot()">Forgot PIN?</div>':'');

  screen.dataset.mode=mode;
  document.body.appendChild(screen);

  // Check lockout
  checkPINLockout();
}

function checkPINLockout(){
  var now=Date.now();
  var errEl=document.getElementById('pin_error');
  if(_pinLockUntil>now){
    var secs=Math.ceil((_pinLockUntil-now)/1000);
    if(errEl) errEl.textContent='Too many attempts. Try again in '+secs+'s';
    setTimeout(checkPINLockout,1000);
    return true;
  }
  return false;
}

function pinKey(digit){
  if(checkPINLockout()) return;
  if(_pinEntry.length>=6) return;
  _pinEntry+=digit;
  updatePINDots();
  if(_pinEntry.length===6){
    setTimeout(function(){validatePIN();},150);
  }
}

function pinBack(){
  if(_pinEntry.length>0){
    _pinEntry=_pinEntry.slice(0,-1);
    updatePINDots();
  }
}

function updatePINDots(){
  var dots=document.querySelectorAll('.pin-dot');
  dots.forEach(function(d,i){
    d.classList.toggle('filled',i<_pinEntry.length);
    d.classList.remove('error');
  });
  var errEl=document.getElementById('pin_error');
  if(errEl&&_pinEntry.length>0) errEl.textContent='';
}

function validatePIN(){
  var screen=document.getElementById('pin_screen');
  var mode=screen?screen.dataset.mode:'unlock';
  var stored=localStorage.getItem('av_pin');

  if(mode==='set'||mode==='change'){
    // Setting new PIN - store it
    localStorage.setItem('av_pin',btoa(_pinEntry));
    localStorage.removeItem('av_pin_attempts');
    localStorage.removeItem('av_pin_lock_until');
    appSettings.pinEnabled=true;
    saveSettings();
    _pinVerified=true;
    screen.remove();
    haptic('save');
    toast('PIN set successfully');
    rnd();
    return;
  }

  // Unlock mode - verify PIN
  if(btoa(_pinEntry)===stored){
    // Correct
    _pinAttempts=0;
    localStorage.removeItem('av_pin_attempts');
    localStorage.removeItem('av_pin_lock_until');
    _pinVerified=true;
    // Success animation
    var dots=document.querySelectorAll('.pin-dot');
    dots.forEach(function(d){d.style.background='#60e880';d.style.borderColor='#60e880';});
    haptic('save');
    setTimeout(function(){screen.remove();rnd();},300);
  } else {
    // Wrong PIN
    _pinAttempts++;
    localStorage.setItem('av_pin_attempts',_pinAttempts.toString());
    var dots=document.querySelectorAll('.pin-dot');
    dots.forEach(function(d){d.classList.add('error');});
    haptic('error');
    var errEl=document.getElementById('pin_error');

    if(_pinAttempts>=5){
      _pinLockUntil=Date.now()+30000;
      localStorage.setItem('av_pin_lock_until',_pinLockUntil.toString());
      _pinAttempts=0;
      localStorage.removeItem('av_pin_attempts');
      if(errEl) errEl.textContent='Too many attempts. Locked for 30 seconds.';
    } else {
      var remaining=5-_pinAttempts;
      if(errEl) errEl.textContent='Incorrect PIN. '+remaining+' attempt'+(remaining!==1?'s':'')+' remaining.';
    }

    setTimeout(function(){
      _pinEntry='';
      updatePINDots();
    },500);
  }
}

function pinForgot(){
  var modal=document.createElement('div');
  modal.id='pin_forgot_modal';
  modal.style.cssText='position:fixed;inset:0;background:#000000ee;z-index:100000;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML='<div style="background:#222835;border:2px solid #ff707050;border-radius:12px;padding:24px;max-width:340px;width:100%">'
    +'<div style="font-size:16px;font-weight:700;color:#ff7070;margin-bottom:8px">Reset PIN</div>'
    +'<div style="font-size:13px;color:#8a95a8;margin-bottom:16px;line-height:1.6">To reset your PIN, upload a valid ArsenalDB backup file (.json) from this collection. This verifies you are the owner.</div>'
    +'<input type="file" id="pin_reset_file" accept=".json" style="display:none" onchange="verifyPINReset(this)"/>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
      +'<button onclick="document.getElementById(\'pin_reset_file\').click()" style="background:#ff707020;border:2px solid #ff707060;color:#ff7070;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">&#128194; Upload Backup File</button>'
      +'<button onclick="this.closest(\'#pin_forgot_modal\')||document.getElementById(\'pin_forgot_modal\').remove()" style="background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>'
    +'</div>'
    +'</div>';
  document.body.appendChild(modal);
}

function verifyPINReset(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(data.guns&&Array.isArray(data.guns)&&data.guns.length>0){
        // Valid backup - allow PIN reset
        var m=document.getElementById('pin_forgot_modal');
        if(m)m.remove();
        localStorage.removeItem('av_pin');
        localStorage.removeItem('av_pin_attempts');
        localStorage.removeItem('av_pin_lock_until');
        appSettings.pinEnabled=false;
        saveSettings();
        _pinVerified=true;
        var ps=document.getElementById('pin_screen');
        if(ps)ps.remove();
        haptic('save');
        toast('PIN removed. Set a new one in Settings.');
        rnd();
      } else {
        toast('Invalid backup file','err');
      }
    }catch(ex){toast('Could not read file','err');}
  };
  reader.readAsText(file);
  input.value='';
}

function runGunIdentifier(input){
  var file=input.files[0];if(!file)return;

  // Show loading state
  var modal=document.getElementById('identifier_modal');
  if(modal) modal.innerHTML='<div style="background:#222835;border:2px solid #a0c0ff40;border-radius:12px;padding:32px;max-width:340px;width:100%;text-align:center">'
    +'<div class="id-pulse" style="font-size:36px;margin-bottom:14px">&#129302;</div>'
    +'<div style="font-size:16px;font-weight:700;color:#a0c0ff;margin-bottom:8px">Analyzing...</div>'
    +'<div style="font-size:13px;color:#8a95a8">AI is identifying this firearm</div>'
    +'</div>';

  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    var mediaType=file.type||'image/jpeg';

    // Call Claude AI via BYO wrapper
    var messages = [{
      role:'user',
      content:[
        {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
        {type:'text',text:'Identify this firearm. Respond ONLY with a JSON object with these exact fields: {"make":"","model":"","type":"","caliber":"","year":"","confidence":"high/medium/low","notes":""}. Type must be one of: Pistol, Revolver, Rifle, Shotgun, AR-15/Semi-Auto Rifle, Bolt-Action Rifle, Lever-Action Rifle, Pump Shotgun, Semi-Auto Shotgun, Other. If you cannot identify it, use your best guess and set confidence to low. Return ONLY the JSON, no other text.'}
      ]
    }];
    _BYO_claudeCall(messages, {model:_BYO_VISION_MODEL, max_tokens:500})
    .then(function(res){
      var text = res.text || '';
      try{
        var clean=text.replace(/```json|```/g,'').trim();
        var result=JSON.parse(clean);
        showIdentifierResult(result, base64, mediaType);
      }catch(ex){
        showIdentifierError('Could not parse AI response');
      }
    })
    .catch(function(err){
      _BYO_showError(err);
      showIdentifierError(err.errorType === 'no_key' ? 'AI key needed — set up in Settings' : 'AI request failed: '+(err.message||''));
    });
  };
  reader.readAsDataURL(file);
}

  var confColor=result.confidence==='high'?'#60e880':result.confidence==='medium'?'#ffd060':'#ff7070';

    +'<img src="data:'+mediaType+';base64,'+imgBase64+'" style="width:100%;max-height:160px;object-fit:contain;border-radius:8px;border:1px solid #2e3545;margin-bottom:14px"/>'
    +'<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:14px;margin-bottom:12px;text-align:left">'

      +(result.type?'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #252c38;font-size:14px"><span style="color:#8a95a8">Type</span><span style="color:#f0f2f5;font-weight:700">'+result.type+'</span></div>':'')

      +(result.year?'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #252c38;font-size:14px"><span style="color:#8a95a8">Year</span><span style="color:#f0f2f5;font-weight:700">'+result.year+'</span></div>':'')

function applyIdentifierResult(result){
  var m=document.getElementById('identifier_modal');
  if(m) m.remove();
  // Pre-fill new gun form with identified data
  FORM=ef();
  if(result.make) FORM.make=result.make;
  if(result.model) FORM.model=result.model;
  if(result.type) FORM.type=result.type;
  if(result.caliber) FORM.caliber=result.caliber;
  if(result.year) FORM.year=result.year;
  editId=null;
  VIEW='add';

// Swipe detection for picture page AND edit page
function initSwipeNav(){
  var startX=0,startY=0,startTime=0;
  document.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;startTime=Date.now();
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-startX;
    var dy=e.changedTouches[0].clientY-startY;
    var dt=Date.now()-startTime;
    if(dy>80&&Math.abs(dx)<40&&dt<600&&startY<120){rnd();toast('Refreshed');return;}
    if(Math.abs(dx)<40||Math.abs(dy)>80||dt>500) return;
    if(dx>60&&startX<30){handleBack();return;}
    if(Math.abs(dx)>80&&startX>40){
      if(VIEW==='pic'){picSwipe(dx<0?1:-1);}
      else if(VIEW==='add'&&editId){
        var all=filtered();
        var ix=all.findIndex(function(x){return x.id===editId;});
        if(ix>=0){var nxt=all[(ix+(dx<0?1:-1)+all.length)%all.length];if(nxt)editGun(nxt.id);}
      }
    }
  },{passive:true});
}

function qrtDigit(idx,val){
  var clean=val.replace(/[^0-9]/g,'');
  var el=document.getElementById('qrt_d'+idx);
  if(el) el.value=clean?clean[0]:'';
  if(clean&&idx<5){
    var next=document.getElementById('qrt_d'+(idx+1));
    if(next) next.focus();
  }
}

function qrtKey(idx,e){
  if(e.key==='Backspace'){
    var el=document.getElementById('qrt_d'+idx);
    if(el&&!el.value&&idx>0){
      var prev=document.getElementById('qrt_d'+(idx-1));
      if(prev){prev.value='';prev.focus();}
    }
  }
}

function qrtGetCode(){
  var code='';
  for(var i=0;i<6;i++){
    var el=document.getElementById('qrt_d'+i);
    code+=el?el.value:'';
  }
  return code;
}

// Generate 6-digit code from transfer data (deterministic hash)
function qrtGenerateCode(transferData){
  var str=JSON.stringify({
    bosNumber:transferData.bosNumber,
    buyerName:(transferData.buyer&&transferData.buyer.name)||'',
    gunSerial:(transferData.gun&&transferData.gun.serialNumber)||''
  });
  var hash=0;
  for(var i=0;i<str.length;i++){
    hash=((hash<<5)-hash)+str.charCodeAt(i);
    hash=hash&hash;
  }
  var code=Math.abs(hash)%1000000;
  return String(code).padStart(6,'0');
}

function qrtVerifyCode(gunId,bosNum){
  var code=qrtGetCode();
  if(code.length<6){
    document.getElementById('qrt_code_err').textContent='Enter all 6 digits';
    return;
  }
  var modal=document.getElementById('qrt_modal');
  var payload=modal?JSON.parse(modal.dataset.payload||'{}'):{};

  // We need buyer name from completed transfer — look in localStorage
  var stored=null;
  try{
    var key='av_qrt_completed_'+bosNum;
    var raw=localStorage.getItem(key);
    if(raw) stored=JSON.parse(raw);
  }catch(e){}

  var expectedCode='';
  if(stored){
    expectedCode=qrtGenerateCode({bosNumber:bosNum,buyer:stored.buyer,gun:payload.gun});
  }

  // Also accept code computed without stored buyer (fallback)
  var fallbackCode=qrtGenerateCode({bosNumber:bosNum,buyer:{name:''},gun:payload.gun});

  if(code!==expectedCode&&code!==fallbackCode){
    document.getElementById('qrt_code_err').textContent='Code incorrect — check with buyer';
    return;
  }

  // Complete the transfer
  var g=guns.find(function(x){return x.id===gunId;});
  if(!g){toast('Firearm not found','err');return;}

  var completedBos=Object.assign({},payload,{
    buyer:stored?stored.buyer:{},
    buyerSig:stored?stored.buyerSig:'',
    sellerSig:stored?stored.sellerSig:'',
    status:'completed',
    completedAt:new Date().toISOString(),
    transferMethod:stored?stored.transferMethod:'qr',
    salePrice:stored?stored.salePrice:'',
    bosNumber:bosNum
  });

  // Archive gun
  var transferred=Object.assign({},g,{transferred:true,transferredAt:new Date().toISOString(),bosId:bosNum});
  transferredGuns.push(transferred);
  saveTransferred();
  guns=guns.filter(function(x){return x.id!==gunId;});
  sv();

  // Save BOS
  billsOfSale.push(completedBos);
  saveBOS();

  // Log custody
  addCustodyEvent(gunId,{
    type:'Sale',
    date:new Date().toISOString(),
    notes:'QR Transfer — BOS '+bosNum+(stored&&stored.buyer&&stored.buyer.name?' — Buyer: '+stored.buyer.name:''),
    bosId:bosNum
  });

  closeQRTransfer();
  toast((g.make+' '+g.model)+' transferred. BOS: '+bosNum);
  VIEW='list';rnd();

  // Offer print
  setTimeout(function(){
    var pm=document.createElement('div');
    pm.style.cssText='position:fixed;inset:0;background:#000000cc;z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:0';
    pm.innerHTML='<div style="background:#1a1d24;border:2px solid #e8c46a40;border-top:2px solid #e8c46a;border-radius:16px 16px 0 0;padding:24px 20px 36px;width:100%;max-width:480px">'
      +'<div style="font-size:16px;font-weight:800;color:#e8c46a;margin-bottom:6px">&#9654; '+bosNum+'</div>'
      +'<div style="font-size:13px;color:#c0c8d8;margin-bottom:20px">QR Transfer complete. Print your bill of sale?</div>'
      +'<button onclick="genBosPDF(\''+bosNum+'\');this.closest(\'div[style]\').remove()" style="width:100%;background:#e8c46a;color:#1a1d24;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px">'+_iM('printer')+' Print / Save BOS</button>'
      +'<button onclick="this.closest(\'div[style]\').remove()" style="width:100%;background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:12px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit">Skip</button>'
      +'</div>';
    document.body.appendChild(pm);
  },500);
}

// Signature canvas
var _btSigDrawing=false;
var _btSigHasData=false;

function btInitSig(){
  var canvas=document.getElementById('bt_sig_canvas');
  if(!canvas) return;
  canvas.width=canvas.offsetWidth;
  var ctx=canvas.getContext('2d');
  ctx.strokeStyle='#e8c46a';
  ctx.lineWidth=2.5;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  function getPos(e){
    var rect=canvas.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*(canvas.width/rect.width),y:(src.clientY-rect.top)*(canvas.height/rect.height)};
  }
  canvas.addEventListener('mousedown',function(e){_btSigDrawing=true;var p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();});
  canvas.addEventListener('mousemove',function(e){if(!_btSigDrawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();_btSigHasData=true;e.preventDefault();});
  canvas.addEventListener('mouseup',function(){_btSigDrawing=false;});
  canvas.addEventListener('touchstart',function(e){_btSigDrawing=true;var p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();},{passive:false});
  canvas.addEventListener('touchmove',function(e){if(!_btSigDrawing)return;var p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();_btSigHasData=true;e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',function(){_btSigDrawing=false;});
}

function btClearSig(){
  var canvas=document.getElementById('bt_sig_canvas');
  if(!canvas) return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  _btSigHasData=false;
}

    +'</div>';

    html+='<div style="text-align:center;padding:48px 20px">'
      +'<div style="font-size:48px;margin-bottom:14px">🎯</div>'

      +'</div>';

    var sorted=rangeSessions.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    sorted.forEach(function(s){
      var totalRounds=s.guns?s.guns.reduce(function(t,g){return t+(parseInt(g.rounds)||0);},0):0;
      var gunNames=s.guns?s.guns.map(function(ge){
        var found=guns.find(function(g){return g.id===ge.gunId;});
        return found?(found.make+' '+found.model):'Unknown';
      }).filter(Boolean):[];
      var stars='';
      for(var i=1;i<=5;i++) stars+=i<=(s.rating||0)?'★':'☆';
      html+='<div class="range-card" onclick="openRangeSession(\''+s.id+'\')">'
        +'<div class="range-card-header">'
        +'<div><div class="range-card-title">'+(s.rangeName||'Unnamed Range')+'</div>'
        +(s.location?'<div style="font-size:12px;color:#8a95a8;margin-top:2px">📍 '+eh(s.location)+'</div>':'')
        +'</div>'
        +'<div style="text-align:right"><div class="range-card-date">'+eh(s.date)+'</div>'
        +(s.rating?'<div class="range-stars">'+stars+'</div>':'')
        +'</div></div>'
        +'<div class="range-card-meta">'
        +(totalRounds?'<span class="range-meta-pill">🔵 '+totalRounds+' rounds</span>':'')
        +(s.distance?'<span class="range-meta-pill">📏 '+eh(s.distance)+'</span>':'')
        +(s.weather&&s.weather.temp?'<span class="range-meta-pill">🌡 '+eh(s.weather.temp)+'°</span>':'')
        +'</div>'
        +(gunNames.length?'<div class="range-guns-row">'+gunNames.map(function(n){return'<span class="range-gun-tag">'+eh(n)+'</span>';}).join('')+'</div>':'')
        +'</div>';
    });
  }
  html+='</div>';
  return html;
}

  var stars='';
  for(var i=1;i<=5;i++) stars+=i<=(s.rating||0)?'★':'☆';

  var modal=document.createElement('div');
  modal.id='range_detail_modal';

        +(ge.groupSize?'<div><div style="color:#8a95a8;font-size:11px">GROUP SIZE</div><div style="color:#f0f2f5;font-weight:700">'+eh(ge.groupSize)+' '+eh(ge.groupUnit||'MOA')+'</div></div>':'')
        +(ge.score?'<div><div style="color:#8a95a8;font-size:11px">SCORE</div><div style="color:#f0f2f5;font-weight:700">'+eh(ge.score)+'</div></div>':'')
        +(ge.ammoLot?'<div><div style="color:#8a95a8;font-size:11px">AMMO LOT</div><div style="color:#f0f2f5;font-weight:600">'+eh(ge.ammoLot)+'</div></div>':'')
        +(ge.opticSettings?'<div style="grid-column:span 2"><div style="color:#8a95a8;font-size:11px">OPTIC SETTINGS</div><div style="color:#f0f2f5">'+eh(ge.opticSettings)+'</div></div>':'')

        +(ge.drills?'<div style="grid-column:span 2"><div style="color:#8a95a8;font-size:11px">DRILLS</div><div style="color:#f0f2f5">'+eh(ge.drills)+'</div></div>':'')
        +(ge.recoilNotes?'<div style="grid-column:span 2"><div style="color:#8a95a8;font-size:11px">FELT RECOIL / FUNCTION</div><div style="color:#f0f2f5">'+eh(ge.recoilNotes)+'</div></div>':'')

function deleteRangeSession(id){
  if(!confirm('Delete this range session?')) return;
  rangeSessions=rangeSessions.filter(function(s){return s.id!==id;});
  saveRangeSessions();
  var m=document.getElementById('range_detail_modal');
  if(m) m.remove();
  rnd();
}

function editRangeSession(id){
  var s=rangeSessions.find(function(x){return x.id===id;});
  if(!s) return;
  var m=document.getElementById('range_detail_modal');
  if(m) m.remove();
  // Load session into rangeForm preserving id for overwrite on save
  rangeForm=JSON.parse(JSON.stringify(s));
  rangeForm._editId=id; // flag so submitRangeSession overwrites instead of creating new
  renderRangeFormModal();
}

function addRangeGun(){
  var picker=document.getElementById('range_gun_picker');
  if(!picker||!picker.value) return;
  collectRangeFormData();
  rangeForm.guns.push({gunId:picker.value,rounds:0,groupSize:'',groupUnit:'MOA',score:'',ammoLot:'',opticSettings:'',loadData:'',drills:'',recoilNotes:''});
  renderRangeFormModal();
}

function removeRangeGun(idx){
  collectRangeFormData();
  rangeForm.guns.splice(idx,1);
  renderRangeFormModal();
}

function adjRangeRounds(idx,delta){
  var current=parseInt(document.getElementById('rounds_val_'+idx).textContent)||0;
  var newVal=Math.max(0,current+delta);
  rangeForm.guns[idx].rounds=newVal;
  document.getElementById('rounds_val_'+idx).textContent=newVal;
  document.getElementById('rounds_inp_'+idx).value=newVal;
}

function syncRoundsInp(idx,val){
  var newVal=Math.max(0,parseInt(val)||0);
  rangeForm.guns[idx].rounds=newVal;
  document.getElementById('rounds_val_'+idx).textContent=newVal;
}

function setRangeRating(r){
  rangeForm.rating=r;
  for(var i=1;i<=5;i++){
    var el=document.getElementById('star_'+i);
    if(el) el.style.color=i<=r?'#e8c46a':'#3a4455';
  }
}

function handleRangePhotos(input){
  collectRangeFormData();
  var files=Array.from(input.files);
  var pending=files.length;
  files.forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      // 2026-04-25-D: compress at capture (1600 max edge, JPEG q0.85, 500 KB cap)
      _compressPhotoForStorage(e.target.result).then(function(compressed){
        rangeForm.photos.push(compressed);
        pending--;
        if(pending===0) renderRangeFormModal();
      });
    };
    reader.readAsDataURL(file);
  });
}

function removeRangePhoto(idx){
  collectRangeFormData();
  rangeForm.photos.splice(idx,1);
  renderRangeFormModal();
}

function rangeDistChange(val){
  var inp=document.getElementById('rs_dist');
  if(!inp) return;
  if(val==='Custom'){
    inp.style.display='block';
    inp.value='';
    inp.focus();
  } else {
    inp.style.display='none';
    inp.value=val;
  }
}

function collectRangeFormData(){
  rangeForm.date=document.getElementById('rs_date')?document.getElementById('rs_date').value:'';
  rangeForm.rangeName=document.getElementById('rs_name')?document.getElementById('rs_name').value:'';
  rangeForm.location=document.getElementById('rs_loc')?document.getElementById('rs_loc').value:'';
  // Distance: use custom input value if visible, else dropdown value
  var distSel=document.getElementById('rs_dist_sel');
  var distInp=document.getElementById('rs_dist');
  if(distSel&&distSel.value==='Custom'&&distInp) rangeForm.distance=distInp.value;
  else if(distSel&&distSel.value&&distSel.value!=='Custom') rangeForm.distance=distSel.value;
  else if(distInp) rangeForm.distance=distInp.value;
  rangeForm.weather.temp=document.getElementById('rs_temp')?document.getElementById('rs_temp').value:'';
  rangeForm.weather.wind=document.getElementById('rs_wind')?document.getElementById('rs_wind').value:'';
  rangeForm.weather.humidity=document.getElementById('rs_humid')?document.getElementById('rs_humid').value:'';
  rangeForm.notes=document.getElementById('rs_notes')?document.getElementById('rs_notes').value:'';
  rangeForm.guns.forEach(function(ge,idx){
    ge.rounds=parseInt(document.getElementById('rounds_inp_'+idx)?document.getElementById('rounds_inp_'+idx).value:0)||0;
    ge.groupSize=document.getElementById('grp_'+idx)?document.getElementById('grp_'+idx).value:'';
    ge.groupUnit=document.getElementById('grpu_'+idx)?document.getElementById('grpu_'+idx).value:'MOA';
    ge.score=document.getElementById('score_'+idx)?document.getElementById('score_'+idx).value:'';
    ge.ammoLot=document.getElementById('lot_'+idx)?document.getElementById('lot_'+idx).value:'';
    ge.opticSettings=document.getElementById('optic_'+idx)?document.getElementById('optic_'+idx).value:'';
    ge.loadData=document.getElementById('load_'+idx)?document.getElementById('load_'+idx).value:'';
    ge.drills=document.getElementById('drills_'+idx)?document.getElementById('drills_'+idx).value:'';
    ge.recoilNotes=document.getElementById('recoil_'+idx)?document.getElementById('recoil_'+idx).value:'';
  });
}

function submitRangeSession(){
  collectRangeFormData();
  if(!rangeForm.date){toast('Please enter a date','err');return;}

  var isEdit=!!rangeForm._editId;
  var session=Object.assign({},rangeForm,{id:isEdit?rangeForm._editId:'rs_'+Date.now()});
  delete session._editId;

  if(isEdit){
    var idx=rangeSessions.findIndex(function(s){return s.id===session.id;});
    if(idx>=0) rangeSessions[idx]=session;
    else rangeSessions.push(session);
  } else {
    rangeSessions.push(session);
  }
  saveRangeSessions();

  // Update totalRounds on each linked gun and check service intervals
  var alerts=[];
  session.guns.forEach(function(ge){
    var g=guns.find(function(x){return x.id===ge.gunId;});
    if(!g) return;
    var prev=parseInt(g.totalRounds)||0;
    var added=parseInt(ge.rounds)||0;
    var newTotal=prev+added;
    g.totalRounds=newTotal;
    // Check service interval
    var interval=parseInt(g.serviceInterval)||0;
    if(interval>0){
      var prevBucket=Math.floor(prev/interval);
      var newBucket=Math.floor(newTotal/interval);
      if(newBucket>prevBucket){
        alerts.push({gun:g,total:newTotal,interval:interval});
      }
    }
  });
  sv();

  var modal=document.getElementById('range_form_modal');
  if(modal) modal.remove();

  // Show maintenance alerts if triggered
  if(alerts.length){
    setTimeout(function(){
      showRangeMaintenanceAlerts(alerts);
    },400);
  } else {
    toast('Range session saved!');
    rnd();
  }
}

// ── BEGIN BYO-T1 BRING YOUR OWN API KEY ──────────────────────────────
// BYO-T1: Users provide their own Anthropic API key.
// Key stored in localStorage (same trust model as rest of app data).
// Unified wrapper for all AI calls + unified gate for all AI features.
// ─────────────────────────────────────────────────────────────────────

var _BYO_STORAGE_KEY = 'arsenal_byo_api_key';
var _BYO_API_URL = 'https://api.anthropic.com/v1/messages';
var _BYO_ANTHROPIC_VERSION = '2023-06-01';
var _BYO_MODEL = 'claude-sonnet-4-5';  // Current Sonnet model
var _BYO_VISION_MODEL = 'claude-sonnet-4-5'; // Same model — Sonnet supports vision

// Key format validation. Anthropic keys start with sk-ant- and are ~100+ chars.
function _BYO_validateKeyFormat(key){
  if(!key || typeof key !== 'string') return false;
  var trimmed = key.trim();
  if(trimmed.length < 20) return false;
  return /^sk-ant-/.test(trimmed);
}

function _BYO_loadKey(){
  try {
    if(typeof localStorage === 'undefined') return '';
    var k = localStorage.getItem(_BYO_STORAGE_KEY);
    return k ? k.trim() : '';
  } catch(e) { return ''; }
}

function _BYO_saveKey(key){
  try {
    if(typeof localStorage === 'undefined') return false;
    var trimmed = (key || '').trim();
    if(!_BYO_validateKeyFormat(trimmed)) return false;
    localStorage.setItem(_BYO_STORAGE_KEY, trimmed);
    return true;
  } catch(e) { return false; }
}

function _BYO_clearKey(){
  try {
    if(typeof localStorage === 'undefined') return false;
    localStorage.removeItem(_BYO_STORAGE_KEY);
    return true;
  } catch(e) { return false; }
}

function _BYO_hasKey(){
  return !!_BYO_loadKey();
}

// Mask a key for display. Shows sk-ant- prefix + last 4 chars.
function _BYO_maskKey(key){
  if(!key) return '';
  if(key.length < 12) return '••••••••';
  return key.substring(0, 7) + '…' + key.substring(key.length - 4);
}

// Classify API errors into user-friendly types.
function _BYO_classifyError(status, data){
  var msg = (data && data.error && data.error.message) || '';
  var type = (data && data.error && data.error.type) || '';

  if(status === 401 || type === 'authentication_error'){
    return { errorType:'auth', message:'Invalid API key. Check your key in Settings.' };
  }
  if(status === 402 || type === 'billing_error' || /credit/i.test(msg) || /billing/i.test(msg) || /insufficient/i.test(msg)){
    return { errorType:'billing', message:'Your Anthropic account needs credits. Visit console.anthropic.com/billing.' };
  }
  if(status === 429 || type === 'rate_limit_error'){
    return { errorType:'rate_limit', message:'Rate limit hit. Wait a moment and try again.' };
  }
  if(type === 'overloaded_error'){
    return { errorType:'overloaded', message:'Claude is busy right now. Try again in a minute.' };
  }
  if(status === 400 && /model/i.test(msg)){
    return { errorType:'model', message:'Model unavailable. The app may need an update.' };
  }
  if(status >= 500 && status < 600){
    return { errorType:'server', message:'Anthropic service issue. Try again shortly.' };
  }
  return { errorType:'other', message: msg || 'AI request failed.' };
}

// Unified API wrapper. All AI calls go through this.
// messages: array in Anthropic API shape
// options: { model, max_tokens, system }
// Returns: Promise resolving to { text, raw } or rejecting with { errorType, message }.
function _BYO_claudeCall(messages, options){
  var key = _BYO_loadKey();
  if(!key){
    return Promise.reject({ errorType:'no_key', message:'No API key configured.' });
  }
  if(!_BYO_validateKeyFormat(key)){
    return Promise.reject({ errorType:'bad_key_format', message:'API key format invalid.' });
  }
  options = options || {};
  var body = {
    model: options.model || _BYO_MODEL,
    max_tokens: options.max_tokens || 1024,
    messages: messages
  };
  if(options.system) body.system = options.system;

  return fetch(_BYO_API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': _BYO_ANTHROPIC_VERSION,
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  }).then(function(r){
    return r.json().then(function(data){
      if(!r.ok || (data && data.error)){
        return Promise.reject(_BYO_classifyError(r.status, data));
      }
      if(!data.content || !data.content.length){
        return Promise.reject({ errorType:'empty', message:'Empty response from AI.' });
      }
      var text = data.content.map(function(c){ return c.text || ''; }).join('');
      return { text: text, raw: data };
    }).catch(function(err){
      if(err && err.errorType) return Promise.reject(err);
      return Promise.reject({ errorType:'parse', message:'Could not parse AI response.' });
    });
  }).catch(function(err){
    if(err && err.errorType) return Promise.reject(err);
    return Promise.reject({ errorType:'network', message:(err && err.message) || 'Network error.' });
  });
}

// Show error from _BYO_claudeCall in a user-friendly way.
function _BYO_showError(err){
  if(!err) return;
  if(err.errorType === 'no_key' || err.errorType === 'bad_key_format'){
    _BYO_showSetupModal('AI features');
    return;
  }
  var title = 'AI request failed';
  if(err.errorType === 'auth') title = 'Invalid API key';
  else if(err.errorType === 'billing') title = 'Account needs credits';
  else if(err.errorType === 'rate_limit') title = 'Rate limit';
  else if(err.errorType === 'overloaded') title = 'AI busy';
  else if(err.errorType === 'server') title = 'Service issue';
  toast(title + ': ' + (err.message || 'unknown'), 'err');
}

function _ONB_isDone(tourId){
  try {
    if(typeof localStorage === 'undefined') return false;
    var key = tourId === 'first_run' ? _ONB_FIRST_RUN_DONE : _ONB_FEATURE_DISC_DONE;
    return !!localStorage.getItem(key);
  } catch(e) { return false; }
}

function _ONB_markDone(tourId){
  try {
    if(typeof localStorage === 'undefined') return;
    var key = tourId === 'first_run' ? _ONB_FIRST_RUN_DONE : _ONB_FEATURE_DISC_DONE;
    localStorage.setItem(key, '1');
  } catch(e) {}
}

function _ONB_resetAll(){
  try {
    if(typeof localStorage === 'undefined') return;
    localStorage.removeItem(_ONB_FIRST_RUN_DONE);
    localStorage.removeItem(_ONB_FEATURE_DISC_DONE);
  } catch(e) {}
}

// Decide which tour (if any) should fire on app load. Pure logic.
function _ONB_pickTour(state){
  state = state || {};
  var gunCount = state.gunCount || 0;
  var tier = state.tier || 'free';
  if(!_ONB_isDone('first_run') && gunCount === 0) return 'first_run';
  if(!_ONB_isDone('feature_discovery') && gunCount >= 2 && (tier === 'pro' || tier === 'proplus')){
    return 'feature_discovery';
  }
  return null;
}

function _ONB_maybeStartTours(){
  var tourId = _ONB_pickTour({ gunCount: (typeof guns !== 'undefined' && guns) ? guns.length : 0, tier: (appSettings && appSettings.tier) || 'free' });
  if(!tourId) return;
  // Small delay so app render settles before tour overlays it
  setTimeout(function(){ _ONB_startTour(tourId); }, 500);
}

function _ONB_startTour(tourId){
  if(!_ONB_TOURS[tourId]) return;
  _ONB_currentTour = tourId;
  _ONB_currentStep = 0;
  _ONB_renderCurrentStep();
}

function _ONB_endTour(){
  var ids = ['onb_highlight', 'onb_overlay', 'onb_tooltip'];
  ids.forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.remove();
  });
  if(_ONB_currentTour) _ONB_markDone(_ONB_currentTour);
  _ONB_currentTour = null;
  _ONB_currentStep = 0;
}

function _ONB_nextStep(){
  _ONB_currentStep++;
  var tour = _ONB_TOURS[_ONB_currentTour];
  if(!tour || _ONB_currentStep >= tour.length){
    _ONB_endTour();
    return;
  }
  _ONB_renderCurrentStep();
}

function _ONB_renderCurrentStep(){
  var tour = _ONB_TOURS[_ONB_currentTour];
  if(!tour) return;
  var step = tour[_ONB_currentStep];
  if(!step){ _ONB_endTour(); return; }

  // Find target (if any) — skip step silently if missing
  var target = null;
  if(step.target){
    try { target = document.querySelector(step.target); } catch(e){ target = null; }
    if(!target){
      _ONB_nextStep();
      return;
    }
  }

  // Clear previous-step artifacts
  ['onb_highlight', 'onb_overlay', 'onb_tooltip'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.remove();
  });

  if(target){
    _ONB_createHighlight(target);
  } else {
    _ONB_createOverlay();
  }

  var tt = _ONB_createTooltip(_ONB_currentTour, _ONB_currentStep);
  _ONB_positionTooltip(target, tt, step.position);

  var nextBtn = document.getElementById('onb_next_btn');
  var skipBtn = document.getElementById('onb_skip_btn');
  if(nextBtn) nextBtn.onclick = _ONB_nextStep;
  if(skipBtn) skipBtn.onclick = _ONB_endTour;
}

// Spotlight highlight around target element. The box-shadow trick gives us
// a darkened screen outside the highlighted area without a separate overlay.
function _ONB_createHighlight(target){
  var rect = target.getBoundingClientRect();
  var hl = document.createElement('div');
  hl.id = 'onb_highlight';
  hl.style.cssText = 'position:fixed;pointer-events:none;border:3px solid #e8c46a;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.68),0 0 24px rgba(232,196,106,0.5);z-index:10006;transition:all 0.25s ease';
  hl.style.top = (rect.top - _ONB_TARGET_PADDING) + 'px';
  hl.style.left = (rect.left - _ONB_TARGET_PADDING) + 'px';
  hl.style.width = (rect.width + _ONB_TARGET_PADDING * 2) + 'px';
  hl.style.height = (rect.height + _ONB_TARGET_PADDING * 2) + 'px';
  document.body.appendChild(hl);
  return hl;
}

function _ONB_createOverlay(){
  var ov = document.createElement('div');
  ov.id = 'onb_overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.68);z-index:10006;pointer-events:auto';
  document.body.appendChild(ov);
  return ov;
}

function _ONB_createTooltip(tourId, stepIndex){
  var tour = _ONB_TOURS[tourId];
  var step = tour[stepIndex];
  var isLast = stepIndex === tour.length - 1;
  var text = step.text;
  if(tourId === 'feature_discovery' && typeof guns !== 'undefined'){
    text = text.replace('{N}', String(guns.length));
  }

  var tt = document.createElement('div');
  tt.id = 'onb_tooltip';
  tt.style.cssText = 'position:fixed;z-index:10007;background:#222835;border:2px solid #e8c46a;border-radius:12px;padding:16px;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.6);font-family:inherit';
  tt.innerHTML =
    '<div style="font-size:10px;color:#8a95a8;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px">Step '+(stepIndex+1)+' of '+tour.length+'</div>'
    +'<div style="font-size:14px;color:#f0f2f5;line-height:1.5;margin-bottom:14px">'+eh(text)+'</div>'
    +'<div style="display:flex;gap:8px;align-items:center">'
      +'<button id="onb_next_btn" style="flex:1;background:linear-gradient(135deg,#e8c46a,#c8a040);color:#1a1d24;border:none;padding:10px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit">'+(isLast?'Finish':'Next')+'</button>'

    +'</div>';

// Position tooltip near target. Tries preferred position, falls back gracefully.
function _ONB_positionTooltip(target, ttEl, preferred){
  var vw = window.innerWidth, vh = window.innerHeight;
  var margin = 10;

  if(!target || preferred === 'center'){
    // Center of screen
    var ttRect = ttEl.getBoundingClientRect();
    ttEl.style.top = Math.max(margin, (vh - ttRect.height) / 2) + 'px';
    ttEl.style.left = Math.max(margin, (vw - ttRect.width) / 2) + 'px';
    return;
  }

  var rect = target.getBoundingClientRect();
  var ttRect = ttEl.getBoundingClientRect();
  var placement = preferred || 'below';

  // Auto-flip if preferred doesn't fit
  if(placement === 'below' && (rect.bottom + ttRect.height + margin) > vh){
    placement = 'above';
  }
  if(placement === 'above' && (rect.top - ttRect.height - margin) < 0){
    // neither fits — center on screen instead
    ttEl.style.top = Math.max(margin, (vh - ttRect.height) / 2) + 'px';
    ttEl.style.left = Math.max(margin, (vw - ttRect.width) / 2) + 'px';
    return;
  }

  var top;
  if(placement === 'above'){
    top = rect.top - ttRect.height - margin;
  } else {
    top = rect.bottom + margin;
  }

  // Center horizontally over target, clamp within viewport
  var left = rect.left + rect.width / 2 - ttRect.width / 2;
  left = Math.max(margin, Math.min(vw - ttRect.width - margin, left));
  top = Math.max(margin, Math.min(vh - ttRect.height - margin, top));

  ttEl.style.top = top + 'px';
  ttEl.style.left = left + 'px';
}

function claude(prompt,mt,cb){
  _BYO_claudeCall([{role:'user', content:prompt}], {max_tokens: mt||600})
    .then(function(res){
      var txt = (res.text || '').replace(/```json|```/g,'').trim();

    });

function doVal(){
  collect();
  if(!FORM.make||!FORM.model){toast('Enter make and model first','err');return;}

  // Hybrid: Pro+ with API key → real AI; otherwise → local lookup baseline
  var tier = appSettings.tier || 'free';
  var canUseAI = (tier === 'proplus') && _BYO_hasKey();

  aiLoad='val';
  var valBtn=document.getElementById('val_btn');
  var valBox=document.getElementById('val_box');
  if(valBtn){valBtn.disabled=true;valBtn.innerHTML='<span class="spinning">&#8635;</span> Estimating...';}
  if(valBox){valBox.style.display='none';}

  if(canUseAI){
    // Real AI path — build prompt, call Claude, parse JSON shape matching valLookup output
    var prompt = 'You are a firearms market valuation expert. Estimate current US retail market value for this firearm based on general market knowledge. Your estimate is based on training-time knowledge, not live pricing — the user understands this is an approximation.\n\n'
      + 'Firearm: ' + FORM.make + ' ' + FORM.model
      + (FORM.caliber ? ' (' + FORM.caliber + ')' : '')
      + (FORM.year ? ', year ' + FORM.year : '')
      + ', condition: ' + (FORM.condition || 'Good')
      + '.\n\nRespond ONLY with valid JSON in this exact shape, no markdown, no extra text:\n'
      + '{"low": 450, "mid": 550, "high": 700, "notes": "Brief description and collector context under 80 chars", "caveats": "Optional note on factors that could shift this significantly"}\n\n'
      + 'Use USD. Round to sensible increments ($5 or $10). Notes must be under 80 chars. If you cannot estimate confidently, return conservative ranges with a clear caveat.';

    _BYO_claudeCall([{role:'user', content: prompt}], {max_tokens:400})
      .then(function(res){
        var txt = (res.text || '').replace(/```json|```/g,'').trim();
        var result;
        try { result = JSON.parse(txt); }
        catch(ex){
          // Fallback to local on parse failure
          result = valLookup(FORM.make,FORM.model,FORM.caliber,FORM.condition,FORM.year);
          result.notes = (result.notes||'') + ' (AI parse failed — using local estimate)';
        }
        aiLoad=null;
        aiVal=result;
        if(result.mid) FORM.currentValue=String(result.mid);
        if(valBtn){valBtn.disabled=false;valBtn.innerHTML='&#10022; AI Est.';}
        rnd();
      })
      .catch(function(err){
        _BYO_showError(err);
        // Graceful fallback to local lookup
        var result = valLookup(FORM.make,FORM.model,FORM.caliber,FORM.condition,FORM.year);
        result.notes = (result.notes||'') + ' (AI failed — using local estimate)';
        aiLoad=null;
        aiVal=result;
        if(result.mid) FORM.currentValue=String(result.mid);
        if(valBtn){valBtn.disabled=false;valBtn.innerHTML='&#10022; AI Est.';}
        rnd();
      });
  } else {
    // Local path — same as before (800ms delay for perceived work)
    setTimeout(function(){
      var result=valLookup(FORM.make,FORM.model,FORM.caliber,FORM.condition,FORM.year);
      aiLoad=null;
      aiVal=result;
      if(result.mid) FORM.currentValue=String(result.mid);
      // Honest label for non-AI path
      if(valBtn){valBtn.disabled=false;valBtn.innerHTML='&#10022; Est. Value';}
      rnd();
    },800);
  }
}

var acIdx=-1;

function acInput(val){
  var list=document.getElementById('ac_list');
  acIdx=-1;
  if(!val||val.length<1){if(list)list.innerHTML='';return;}
  var q=val.toLowerCase();
  var matches=MAKES.filter(function(m){return m.toLowerCase().indexOf(q)===0;}).slice(0,8);
  if(!matches.length){if(list)list.innerHTML='';return;}
  if(list){
    list.innerHTML=matches.map(function(m,i){
      var bold='<strong>'+m.substring(0,val.length)+'</strong>'+m.substring(val.length);
      return '<div class="ac-item" id="ac_'+i+'" onmousedown="acPick(\''+m.replace(/'/g,"\\'")+'\')" onmouseover="acHover('+i+')">'+bold+'</div>';
    }).join('');
  }
}

function acKey(e){
  var list=document.getElementById('ac_list');
  if(!list)return;
  var items=list.querySelectorAll('.ac-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);acHighlight(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);acHighlight(items);}
  else if(e.key==='Enter'||e.key==='Tab'){
    if(acIdx>=0&&items[acIdx]){e.preventDefault();acPick(items[acIdx].textContent);}
    else{list.innerHTML='';}
  }
  else if(e.key==='Escape'){list.innerHTML='';}
}

function acHighlight(items){
  for(var i=0;i<items.length;i++){items[i].className='ac-item'+(i===acIdx?' sel':'');}
}

function acHover(i){acIdx=i;}

function acPick(val){
  FORM.make=val;
  var inp=document.getElementById('f_make');
  if(inp)inp.value=val;
  var list=document.getElementById('ac_list');
  if(list)list.innerHTML='';
  // Focus model field next
  setTimeout(function(){var m=document.getElementById('f_model');if(m)m.focus();},50);
}

function acBlur(){
  // Small delay so mousedown on item fires first
  setTimeout(function(){var l=document.getElementById('ac_list');if(l)l.innerHTML='';},200);
}

function doSnLookup(){
  var snEl=document.getElementById('f_sn');
  var mkEl=document.getElementById('f_make');
  var mdEl=document.getElementById('f_model');
  var yrEl=document.getElementById('f_yr');
  var yrSt=document.getElementById('yr_st');
  var snBtn=document.getElementById('sn_btn');

  var sn=snEl?snEl.value.trim():'';
  var mk=mkEl?mkEl.value.trim():'';
  var md=mdEl?mdEl.value.trim():'';

  if(!sn||sn.length<2){toast('Enter a serial number first','err');return;}
  if(!mk){toast('Enter Make first','err');return;}

  FORM.serialNumber=sn;FORM.make=mk;FORM.model=md;

  if(snBtn){snBtn.disabled=true;snBtn.innerHTML='<span class="spinning">&#8635;</span> Searching...';}
  if(yrEl){yrEl.value='';yrEl.placeholder='Searching...';}
  if(yrSt){yrSt.style.display='block';yrSt.style.color='#a0b8ff';yrSt.textContent='Searching serial number database...';}

  var result = snYearLookup(mk, sn);

  setTimeout(function(){
    if(snBtn){snBtn.disabled=false;snBtn.innerHTML='&#128269; Look Up Year';}
    var fillMsg=[];
    if(result.year){
      FORM.year=result.year;
      if(yrEl){yrEl.value=result.year;yrEl.placeholder='e.g. 2018';}
      fillMsg.push('Year: '+result.year);
    } else {
      if(yrEl)yrEl.placeholder='Enter year manually';
    }
    // Auto-fill Type if found and not already set
    if(result.type){
      var typeEl=document.getElementById('f_type');
      if(typeEl&&!FORM.type){typeEl.value=result.type;FORM.type=result.type;fillMsg.push('Type: '+result.type);}
    }
    // Auto-fill Caliber if found and not already set
    if(result.caliber){
      var calEl=document.getElementById('f_cal');
      if(calEl&&!FORM.caliber){
        var opts=calEl.options;
        for(var oi=0;oi<opts.length;oi++){
          if(opts[oi].text.toLowerCase()===result.caliber.toLowerCase()||opts[oi].value.toLowerCase()===result.caliber.toLowerCase()){
            calEl.value=opts[oi].value;FORM.caliber=opts[oi].value;fillMsg.push('Caliber: '+opts[oi].value);break;
          }
        }
      }
    }
    if(fillMsg.length>0){
      if(yrSt){yrSt.style.color='#60e880';yrSt.textContent='✓ '+result.confidence+' — '+result.source;}
      toast('Found: '+fillMsg.join(' · '));
    } else {
      if(yrSt){yrSt.style.color='#ffd060';yrSt.textContent='⚠ '+result.source;}
      toast('Could not determine info — enter manually','err');
    }
  }, 600);
}

function onPhoto(){
  var files=Array.from(this.files);if(!files.length)return;
  if(!FORM.photos)FORM.photos=FORM.photo?[FORM.photo]:[];
  var remaining=10-FORM.photos.length;
  if(remaining<=0){toast('Maximum 10 photos reached','err');this.value='';return;}
  files=files.slice(0,remaining);
  var loaded=0;
  files.forEach(function(file){
    var r=new FileReader();
    r.onload=function(e){
      // 2026-04-25-D: compress at capture (1600 max edge, JPEG q0.85, 500 KB cap)
      _compressPhotoForStorage(e.target.result).then(function(compressed){
        FORM.photos.push(compressed);
        if(FORM.photos.length>0)FORM.photo=FORM.photos[0];
        loaded++;
        if(loaded===files.length)rnd();
      });
    };
    r.readAsDataURL(file);
  });
  this.value='';
}

// T1.9: rotate a single dataURL 90° clockwise via canvas.
// Returns a Promise that resolves to the rotated dataURL (JPEG).
// Called by rotatePhotoIdx() from the per-photo rotate button.
function _rotatePhoto90(dataUrl){
  return new Promise(function(resolve, reject){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      canvas.width = img.height;
      canvas.height = img.width;
      var ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0);
      ctx.rotate(Math.PI / 2);
      ctx.drawImage(img, 0, 0);
      try{
        resolve(canvas.toDataURL('image/jpeg', 0.92));
      }catch(e){ reject(e); }
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

// T1.9: rotate a specific photo by index (0-based). Wired to the 🔄 button
// on each photo thumbnail. User can tap multiple times to cycle.
function rotatePhotoIdx(idx){
  if(!FORM.photos || !FORM.photos[idx]) return;
  _rotatePhoto90(FORM.photos[idx]).then(function(rotated){
    FORM.photos[idx] = rotated;
    if(idx === 0) FORM.photo = rotated;
    rnd();
  }).catch(function(){
    toast('Could not rotate photo','err');
  });
}

function removePhoto(idx){
  if(!FORM.photos)return;
  FORM.photos.splice(idx,1);
  FORM.photo=FORM.photos.length>0?FORM.photos[0]:'';
  rnd();
}

function onSch(){
  var file=this.files[0];if(!file)return;
  var nm=file.name;
  var r=new FileReader();
  r.onload=function(e){
    // 2026-04-25-D: compress images at capture; non-image schematics (PDFs etc.)
    // pass through unchanged because the compressor img.onerror's on non-decodable input.
    _compressPhotoForStorage(e.target.result).then(function(compressed){

}

function schDiagram(sch){
  if(!sch||!sch.partsList) return '<div style="color:#8a95a8;padding:20px">No diagram available</div>';
  var notes = sch.notes||'';
  var isGlock = notes.indexOf('Safe Action')>=0||notes.indexOf('Glock')>=0;
  var isSW = notes.indexOf('J-Frame')>=0||notes.indexOf('J-frame')>=0||notes.indexOf('revolver')>=0;
  var is870 = notes.indexOf('870')>=0||notes.indexOf('best-selling shotgun')>=0;
  var isMoss = notes.indexOf('500/590')>=0||notes.indexOf('Mossberg')>=0;
  var is1911 = notes.indexOf('1911')>=0&&(notes.indexOf('pistol')>=0||notes.indexOf('Pistol')>=0);
  var is1022 = notes.indexOf('10/22')>=0||notes.indexOf('rotary magazine')>=0;

  if(isGlock) return svgGlock();
  if(isSW) return svgJFrame();
  if(is870) return svg870();
  if(isMoss) return svgMoss();
  if(is1911) return svg1911();
  if(is1022) return svg1022();
  return svgGeneric(sch);
}

function svgWrap(w,h,inner){
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;background:#13161d;border-radius:8px;padding:10px">'+
    '<style>.lbl{font:bold 11px monospace;fill:#f0f2f5}.sub{font:10px monospace;fill:#8a95a8}.gold{fill:#e8c46a}.line{stroke:#e8c46a;stroke-width:1;fill:none}.part{fill:#2a3a50;stroke:#3a5070;stroke-width:1.5}.hi{fill:#1e3050;stroke:#e8c46a;stroke-width:1.5}</style>'+
    inner+'</svg>';
}

function callout(x,y,lx,ly,num,label){
  var dx = lx>x?8:-8;
  return '<line x1="'+x+'" y1="'+y+'" x2="'+lx+'" y2="'+ly+'" class="line"/>'
    +'<circle cx="'+lx+'" cy="'+ly+'" r="10" fill="#e8c46a22" stroke="#e8c46a" stroke-width="1"/>'
    +'<text x="'+lx+'" y="'+(ly+4)+'" text-anchor="middle" class="lbl gold">'+num+'</text>'
    +'<text x="'+(lx+dx+( lx>x?2:-2))+'" y="'+(ly+4)+'" text-anchor="'+(lx>x?'start':'end')+'" class="lbl">'+label+'</text>';
}

function openLb(photos, idx){
  lbPhotos = photos;
  lbIdx = idx||0;
  showLb();
}

function showLb(){
  var existing = document.getElementById('lightbox');
  if(existing) existing.remove();
  if(!lbPhotos||!lbPhotos.length) return;
  var lb = document.createElement('div');
  lb.id = 'lightbox';
  lb.className = 'lightbox';
  lb.onclick = function(e){ if(e.target===lb) closeLb(); };
  lb.innerHTML =
    '<img src="'+lbPhotos[lbIdx]+'" alt="Photo '+(lbIdx+1)+'"/>'+
    '<div class="lightbox-nav">'+
    (lbPhotos.length>1?'<button class="lb-btn" onclick="lbPrev()">&#8592;</button>':'')+
    '<span class="lb-counter">'+(lbIdx+1)+' / '+lbPhotos.length+'</span>'+
    (lbPhotos.length>1?'<button class="lb-btn" onclick="lbNext()">&#8594;</button>':'')+
    '<button class="lb-btn" onclick="closeLb()" style="margin-left:10px;color:#ff7070">✕ Close</button>'+
    '</div>';
  document.body.appendChild(lb);
}

function lbNext(){
  lbIdx = (lbIdx+1) % lbPhotos.length;
  showLb();
}

function lbPrev(){
  lbIdx = (lbIdx-1+lbPhotos.length) % lbPhotos.length;
  showLb();
}

function closeLb(){
  var lb = document.getElementById('lightbox');
  if(lb) lb.remove();
}

// Keyboard nav for lightbox
document.addEventListener('keydown', function(e){
  if(!document.getElementById('lightbox')) return;
  if(e.key==='ArrowRight') lbNext();
  else if(e.key==='ArrowLeft') lbPrev();
  else if(e.key==='Escape') closeLb();
});

// ── FULLSCREEN PHOTO VIEWER (2026-04-25-E) ───────────────────────────
// Album-style takeover. Photos only — no chrome, no firearm details,
// no swipe hint. Tap × or device back to close. State is local; no
// VIEW change or history pushState, so device back via handleBack
// closes the modal and returns the user to wherever they came from.
var _pvPhotos = [];
var _pvIdx = 0;
var _pvTouchStartX = 0;
var _pvTouchStartY = 0;
var _pvTouchStartT = 0;

function openPhotoView(photos, startIdx){
  if(!photos || !photos.length) return;
  _pvPhotos = photos;
  _pvIdx = startIdx || 0;
  _renderPhotoView();
}

function _renderPhotoView(){
  var existing = document.getElementById('photo_view_modal');
  if(existing) existing.remove();

  var multi = _pvPhotos.length > 1;
  var dots = '';
  if(multi){
    var d = '';
    for(var i = 0; i < _pvPhotos.length; i++){
      d += '<span class="pv-dot' + (i === _pvIdx ? ' pv-dot-on' : '') + '"></span>';
    }
    dots = '<div class="pv-dots">' + d + '</div>';
  }
  var counter = multi ? '<div class="pv-counter">' + (_pvIdx+1) + ' / ' + _pvPhotos.length + '</div>' : '';

  var m = document.createElement('div');
  m.id = 'photo_view_modal';
  m.className = 'pv-modal';
  m.innerHTML =
    '<button class="pv-close" onclick="_closePhotoView()" aria-label="Close">&times;</button>'
    + counter
    + '<div class="pv-stage" id="pv_stage"><img src="' + _pvPhotos[_pvIdx] + '" class="pv-img" alt="Photo ' + (_pvIdx+1) + '"/></div>'
    + dots;

  // Tap on backdrop or stage closes; image has pointer-events:none so taps fall through.
  m.addEventListener('click', function(e){
    if(e.target === m || e.target.id === 'pv_stage' || e.target.classList && e.target.classList.contains('pv-stage')) _closePhotoView();
  });

  // Swipe nav (only meaningful when multiple photos)
  if(multi){
    m.addEventListener('touchstart', function(e){
      _pvTouchStartX = e.touches[0].clientX;
      _pvTouchStartY = e.touches[0].clientY;
      _pvTouchStartT = Date.now();
    }, {passive: true});
    m.addEventListener('touchend', function(e){
      var dx = e.changedTouches[0].clientX - _pvTouchStartX;
      var dy = e.changedTouches[0].clientY - _pvTouchStartY;
      var dt = Date.now() - _pvTouchStartT;
      if(dt > 600) return;
      if(Math.abs(dx) < 60 || Math.abs(dy) > 60) return;
      if(dx < 0) _pvIdx = (_pvIdx + 1) % _pvPhotos.length;
      else _pvIdx = (_pvIdx - 1 + _pvPhotos.length) % _pvPhotos.length;
      _renderPhotoView();
      if(typeof haptic === 'function') haptic('light');
    }, {passive: true});
  }

  document.body.appendChild(m);
  if(typeof haptic === 'function') haptic('light');
}

function _closePhotoView(){
  var m = document.getElementById('photo_view_modal');
  if(m) m.remove();
  _pvPhotos = [];
  _pvIdx = 0;
}

// Keyboard nav for fullscreen photo viewer
document.addEventListener('keydown', function(e){
  if(!document.getElementById('photo_view_modal')) return;
  if(_pvPhotos.length > 1){
    if(e.key === 'ArrowRight'){ _pvIdx = (_pvIdx + 1) % _pvPhotos.length; _renderPhotoView(); }
    else if(e.key === 'ArrowLeft'){ _pvIdx = (_pvIdx - 1 + _pvPhotos.length) % _pvPhotos.length; _renderPhotoView(); }
  }
  if(e.key === 'Escape') _closePhotoView();
});
