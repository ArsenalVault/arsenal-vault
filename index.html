function runGunIdentifier(input){
  var file=input.files[0];if(!file)return;

  // Show loading state
  var modal=document.getElementById('identifier_modal');
  if(modal) modal.innerHTML='<div style="background:#222835;border:2px solid #a0c0ff40;border-radius:12px;padding:32px;max-width:340px;width:100%;text-align:center">'
    +'<div class="id-pulse" style="font-size:36px;margin-bottom:14px">&#129302;</div>'
    +'<div style="font-size:16px;font-weight:700;color:#a0c0ff;margin-bottom:8px">Analyzing...</div>'
    +'<div style="font-size:13px;color:#8a95a8">AI is identifying this firearm</div>'
    +'</div>';

  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    var mediaType=file.type||'image/jpeg';

    // Call Claude AI
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:'Identify this firearm. Respond ONLY with a JSON object with these exact fields: {"make":"","model":"","type":"","caliber":"","year":"","confidence":"high/medium/low","notes":""}. Type must be one of: Pistol, Revolver, Rifle, Shotgun, AR-15/Semi-Auto Rifle, Bolt-Action Rifle, Lever-Action Rifle, Pump Shotgun, Semi-Auto Shotgun, Other. If you cannot identify it, use your best guess and set confidence to low. Return ONLY the JSON, no other text.'}
          ]
        }]
      })
    })
    .then(function(r){return r.json();})
    .then(function(data){
      var text='';
      if(data.content&&data.content[0]) text=data.content[0].text||'';
      // Parse JSON response
      try{
        var clean=text.replace(/```json|```/g,'').trim();
        var result=JSON.parse(clean);
        showIdentifierResult(result, base64, mediaType);
      }catch(ex){
        showIdentifierError('Could not parse AI response');
      }
    })
    .catch(function(err){
      showIdentifierError('AI request failed: '+err.message);
    });
  };
  reader.readAsDataURL(file);
}

    +'<div style="font-size:16px;font-weight:700;color:#a0c0ff;margin-bottom:12px">&#10003; Identified!</div>'
    +'<img src="data:'+mediaType+';base64,'+imgBase64+'" style="width:100%;max-height:160px;object-fit:contain;border-radius:8px;border:1px solid #2e3545;margin-bottom:14px"/>'
    +'<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:14px;margin-bottom:12px;text-align:left">'
      +(result.make?'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #252c38;font-size:14px"><span style="color:#8a95a8">Make</span><span style="color:#f0f2f5;font-weight:700">'+result.make+'</span></div>':'')

      +(result.type?'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #252c38;font-size:14px"><span style="color:#8a95a8">Type</span><span style="color:#f0f2f5;font-weight:700">'+result.type+'</span></div>':'')

      +(result.year?'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #252c38;font-size:14px"><span style="color:#8a95a8">Year</span><span style="color:#f0f2f5;font-weight:700">'+result.year+'</span></div>':'')

    +'</div>'

    +'<div style="display:flex;flex-direction:column;gap:8px">'

function applyIdentifierResult(result){
  var m=document.getElementById('identifier_modal');
  if(m) m.remove();
  // Pre-fill new gun form with identified data
  FORM=ef();
  if(result.make) FORM.make=result.make;
  if(result.model) FORM.model=result.model;
  if(result.type) FORM.type=result.type;
  if(result.caliber) FORM.caliber=result.caliber;
  if(result.year) FORM.year=result.year;
  editId=null;
  VIEW='add';
  playRack();
  rnd();
  toast('Fields pre-filled — review and save');
}

function picSwipe(dir){

  if(!allGuns.length) return;
  var idx = allGuns.findIndex(function(x){return x.id===picGunId;});
  if(idx < 0) idx = 0;

  picGunId = allGuns[idx].id;

// Swipe detection for picture page AND edit page
function initSwipeNav(){
  var startX=0, startY=0, startTime=0;

  document.addEventListener('touchstart', function(e){
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
  }, {passive:true});

  document.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - startX;
    var dy = e.changedTouches[0].clientY - startY;
    var dt = Date.now() - startTime;

    // Pull down from top = refresh CURRENT page (not go home)
    if(dy > 80 && Math.abs(dx) < 40 && dt < 600 && startY < 120){
      rnd();
      toast('Refreshed');
      return;
    }

    // Only process horizontal swipes from here
    if(Math.abs(dx) < 40 || Math.abs(dy) > 80 || dt > 500) return;

    // Right swipe from left edge = back
    if(dx > 60 && startX < 30){
      handleBack();
      return;
    }

    // Left/right swipe for gun navigation
    if(Math.abs(dx) > 80 && startX > 40){
      if(VIEW === 'pic'){
        picSwipe(dx < 0 ? 1 : -1);
      } else if(VIEW === 'add' && editId){
        var all = filtered();
        var idx = all.findIndex(function(x){return x.id===editId;});
        if(idx >= 0){
          var next = all[(idx + (dx<0?1:-1) + all.length) % all.length];
          if(next) editGun(next.id);
        }
      }
    }
  }, {passive:true});
}

function openQR(id){
  var g=guns.find(function(x){return x.id===id;});
  if(!g){toast('Gun not found','err');return;}

  function buildAndShow(photoData){
    var shareData={
      make:g.make,model:g.model,type:g.type,caliber:g.caliber,
      serialNumber:g.serialNumber,year:g.year,condition:g.condition,
      working:g.working,storageLocation:g.storageLocation,
      currentValue:g.currentValue,insuranceValue:g.insuranceValue,
      lastCleaned:g.lastCleaned,ammoType:g.ammoType,ammoCount:g.ammoCount,
      maintenanceLog:g.maintenanceLog?g.maintenanceLog.substring(0,100):'',
      photo:photoData,photos:photoData?[photoData]:[]
    };

    var encoded='';
    try{encoded=btoa(unescape(encodeURIComponent(JSON.stringify(shareData))));}catch(e){}

    var scanUrl='https://arsenalvault.github.io/arsenal-vault'+(encoded?'?view='+encoded:'');

    // If URL too long, strip photo and maintenance log
    if(scanUrl.length>1500){
      shareData.photo='';shareData.photos=[];shareData.maintenanceLog='';
      try{encoded=btoa(unescape(encodeURIComponent(JSON.stringify(shareData))));}catch(e){}
      scanUrl='https://arsenalvault.github.io/arsenal-vault'+(encoded?'?view='+encoded:'');
    }

    // If still too long, use minimal data
    if(scanUrl.length>1500){
      var min={make:g.make,model:g.model,serialNumber:g.serialNumber,caliber:g.caliber,condition:g.condition};
      try{encoded=btoa(unescape(encodeURIComponent(JSON.stringify(min))));}catch(e){}
      scanUrl='https://arsenalvault.github.io/arsenal-vault'+(encoded?'?view='+encoded:'');
    }

    var sz=qrSize||260;
    var apiUrl='https://api.qrserver.com/v1/create-qr-code/?size='+sz+'x'+sz+'&ecc=M&color=e8c46a&bgcolor=1a1d24&data='+encodeURIComponent(scanUrl);

    closeQR();
    var modal=document.createElement('div');
    modal.id='qr_modal';
    modal.style.cssText='position:fixed;inset:0;background:#000000cc;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    modal.innerHTML=
      '<div style="background:#222835;border:2px solid #3a4455;border-radius:12px;padding:24px;max-width:320px;width:100%;text-align:center">'
      +'<div style="font-size:16px;font-weight:700;color:#e8c46a;margin-bottom:4px">&#9646;&#9646; QR Code</div>'
      +'<div style="font-size:12px;color:#8a95a8;margin-bottom:4px">'+eh(g.make)+' '+eh(g.model)+'</div>'
      +'<div style="font-size:11px;color:#60e880;margin-bottom:8px">Scan to view full details</div>'
      +'<div style="display:flex;justify-content:center;gap:6px;margin-bottom:12px">'
        +'<button onclick="qrSize=180;rebuildQR()" style="background:'+(sz===180?'#e8c46a20':'transparent')+';border:1px solid '+(sz===180?'#e8c46a':'#3a4455')+';color:'+(sz===180?'#e8c46a':'#8a95a8')+';padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">S</button>'
        +'<button onclick="qrSize=260;rebuildQR()" style="background:'+(sz===260?'#e8c46a20':'transparent')+';border:1px solid '+(sz===260?'#e8c46a':'#3a4455')+';color:'+(sz===260?'#e8c46a':'#8a95a8')+';padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">M</button>'
        +'<button onclick="qrSize=360;rebuildQR()" style="background:'+(sz===360?'#e8c46a20':'transparent')+';border:1px solid '+(sz===360?'#e8c46a':'#3a4455')+';color:'+(sz===360?'#e8c46a':'#8a95a8')+';padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">L</button>'
        +'<button onclick="qrSize=480;rebuildQR()" style="background:'+(sz===480?'#e8c46a20':'transparent')+';border:1px solid '+(sz===480?'#e8c46a':'#3a4455')+';color:'+(sz===480?'#e8c46a':'#8a95a8')+';padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">XL</button>'
      +'</div>'
      +'<div style="background:#1a1d24;padding:12px;border-radius:8px;display:inline-block;margin-bottom:8px;border:2px solid #e8c46a20">'
        +'<img id="qr_img" src="'+apiUrl+'" width="'+sz+'" height="'+sz+'" style="display:block;max-width:100%"/>'
      +'</div>'
      +'<div id="qr_status" style="font-size:12px;color:#8a95a8;margin-bottom:14px">Loading... (requires wifi)</div>'
      +'<div style="display:flex;flex-direction:column;gap:8px">'
        +'<button onclick="saveQRImg()" style="background:#1e3050;border:2px solid #a0c0ff60;color:#a0c0ff;padding:11px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">&#128190; Save QR</button>'
        +'<button onclick="printQR()" style="background:#1e2535;border:2px solid #3a4455;color:#c0c8d8;padding:11px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">&#9113; Print Label</button>'
        +'<button onclick="closeQR()" style="background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:9px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Close</button>'
      +'</div>'
      +'</div>';

    modal.onclick=function(e){if(e.target===modal)closeQR();};
    document.body.appendChild(modal);
    window._qrGun=g;
    window._qrApiUrl=apiUrl;

    var imgEl=document.getElementById('qr_img');
    if(imgEl){
      imgEl.onload=function(){
        var st=document.getElementById('qr_status');
        if(st){st.textContent='Ready to scan!';st.style.color='#60e880';}
      };
      imgEl.onerror=function(){
        var st=document.getElementById('qr_status');

  var photos=(g.photos&&g.photos.length)?g.photos:(g.photo?[g.photo]:[]);
  if(photos.length){
    var img=new Image();
    img.onload=function(){
      try{
        var c=document.createElement('canvas');
        var max=60;
        var ratio=Math.min(max/img.width,max/img.height);
        c.width=Math.round(img.width*ratio);
        c.height=Math.round(img.height*ratio);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        buildAndShow(c.toDataURL('image/jpeg',0.3));
      }catch(e){buildAndShow('');}
    };
    img.onerror=function(){buildAndShow('');};
    img.src=photos[0];
  } else {
    buildAndShow('');
  }
}

function generateQR(text){
  var container=document.getElementById('qr_canvas');
  if(!container)return;
  container.innerHTML='';
  var canvas=document.createElement('canvas');
  container.appendChild(canvas);
  try{
    // Use module size 9 — larger = easier for phone cameras to scan
    var ok=QRGen.draw(canvas,text,10);
    if(!ok){
      container.innerHTML='<div style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;color:#ff7070;font-size:12px;padding:16px;text-align:center">Data too large for QR.<br>Try removing some fields.</div>';
    }
  }catch(e){
    container.innerHTML='<div style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;color:#ff7070;font-size:12px;padding:16px;text-align:center">QR generation failed.</div>';
  }
}

function claude(prompt,mt,cb){
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:mt||600,messages:[{role:'user',content:prompt}]})})
  .then(function(r){return r.json();})
  .then(function(d){
    try{
      if(d.error){cb(new Error(d.error.message||'API error'),null);return;}
      if(!d.content||!d.content.length){cb(new Error('Empty response from API'),null);return;}
      var txt=d.content.map(function(i){return i.text||'';}).join('').replace(/```json|```/g,'').trim();
      cb(null,txt);
    }catch(ex){cb(ex,null);}
  })
  .catch(function(e){cb(e,null);});
}

var acIdx=-1;

function acInput(val){
  var list=document.getElementById('ac_list');
  acIdx=-1;
  if(!val||val.length<1){if(list)list.innerHTML='';return;}
  var q=val.toLowerCase();
  var matches=MAKES.filter(function(m){return m.toLowerCase().indexOf(q)===0;}).slice(0,8);
  if(!matches.length){if(list)list.innerHTML='';return;}
  if(list){
    list.innerHTML=matches.map(function(m,i){
      var bold='<strong>'+m.substring(0,val.length)+'</strong>'+m.substring(val.length);
      return '<div class="ac-item" id="ac_'+i+'" onmousedown="acPick(\''+m.replace(/'/g,"\\'")+'\')" onmouseover="acHover('+i+')">'+bold+'</div>';
    }).join('');
  }
}

function acKey(e){
  var list=document.getElementById('ac_list');
  if(!list)return;
  var items=list.querySelectorAll('.ac-item');
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);acHighlight(items);}
  else if(e.key==='ArrowUp'){e.preventDefault();acIdx=Math.max(acIdx-1,0);acHighlight(items);}
  else if(e.key==='Enter'||e.key==='Tab'){
    if(acIdx>=0&&items[acIdx]){e.preventDefault();acPick(items[acIdx].textContent);}
    else{list.innerHTML='';}
  }
  else if(e.key==='Escape'){list.innerHTML='';}
}

function acHighlight(items){
  for(var i=0;i<items.length;i++){items[i].className='ac-item'+(i===acIdx?' sel':'');}
}

function acHover(i){acIdx=i;}

function acPick(val){
  FORM.make=val;
  var inp=document.getElementById('f_make');
  if(inp)inp.value=val;
  var list=document.getElementById('ac_list');
  if(list)list.innerHTML='';
  // Focus model field next
  setTimeout(function(){var m=document.getElementById('f_model');if(m)m.focus();},50);
}

function acBlur(){
  // Small delay so mousedown on item fires first
  setTimeout(function(){var l=document.getElementById('ac_list');if(l)l.innerHTML='';},200);
}

function doSnLookup(){
  var snEl=document.getElementById('f_sn');
  var mkEl=document.getElementById('f_make');
  var mdEl=document.getElementById('f_model');
  var yrEl=document.getElementById('f_yr');
  var yrSt=document.getElementById('yr_st');
  var snBtn=document.getElementById('sn_btn');

  var sn=snEl?snEl.value.trim():'';
  var mk=mkEl?mkEl.value.trim():'';
  var md=mdEl?mdEl.value.trim():'';

  if(!sn||sn.length<2){toast('Enter a serial number first','err');return;}
  if(!mk){toast('Enter Make first','err');return;}

  FORM.serialNumber=sn;FORM.make=mk;FORM.model=md;

  if(snBtn){snBtn.disabled=true;snBtn.innerHTML='<span class="spinning">&#8635;</span> Searching...';}
  if(yrEl){yrEl.value='';yrEl.placeholder='Searching...';}
  if(yrSt){yrSt.style.display='block';yrSt.style.color='#a0b8ff';yrSt.textContent='Searching serial number database...';}

  var result = snYearLookup(mk, sn);

  setTimeout(function(){
    if(snBtn){snBtn.disabled=false;snBtn.innerHTML='&#128269; Look Up Year';}
    var fillMsg=[];
    if(result.year){
      FORM.year=result.year;
      if(yrEl){yrEl.value=result.year;yrEl.placeholder='e.g. 2018';}
      fillMsg.push('Year: '+result.year);
    } else {
      if(yrEl)yrEl.placeholder='Enter year manually';
    }
    // Auto-fill Type if found and not already set
    if(result.type){
      var typeEl=document.getElementById('f_type');
      if(typeEl&&!FORM.type){typeEl.value=result.type;FORM.type=result.type;fillMsg.push('Type: '+result.type);}
    }
    // Auto-fill Caliber if found and not already set
    if(result.caliber){
      var calEl=document.getElementById('f_cal');
      if(calEl&&!FORM.caliber){
        var opts=calEl.options;
        for(var oi=0;oi<opts.length;oi++){
          if(opts[oi].text.toLowerCase()===result.caliber.toLowerCase()||opts[oi].value.toLowerCase()===result.caliber.toLowerCase()){
            calEl.value=opts[oi].value;FORM.caliber=opts[oi].value;fillMsg.push('Caliber: '+opts[oi].value);break;
          }
        }
      }
    }
    if(fillMsg.length>0){
      if(yrSt){yrSt.style.color='#60e880';yrSt.textContent='✓ '+result.confidence+' — '+result.source;}
      toast('Found: '+fillMsg.join(' · '));
    } else {
      if(yrSt){yrSt.style.color='#ffd060';yrSt.textContent='⚠ '+result.source;}
      toast('Could not determine info — enter manually','err');
    }
  }, 600);
}

    // Post-1969 letter prefix codes
    var swPfx={
      'C':1972,'D':1975,'E':1977,'F':1979,'G':1980,'H':1981,'J':1982,'K':1983,
      'L':1984,'M':1985,'N':1986,'P':1987,'R':1988,'S':1989,'T':1990,'U':1991,

function loadSch(id){
  var g=guns.find(function(x){return x.id===id;});if(!g)return;
  // Check built-in database first
  var db=schDB(g.make,g.model,g.caliber,g.type);
  if(db){SCH=db;scLoad=false;rnd();return;}
  // Not in database — try AI if online
  if(!navigator.onLine){
    scLoad=false;
    SCH={_notFound:true,make:g.make,model:g.model};
    rnd();return;
  }
  scLoad=true;SCH=null;rnd();
  var done=false;
  var timer=setTimeout(function(){
    if(!done){done=true;scLoad=false;SCH={_notFound:true,make:g.make,model:g.model};rnd();toast('Schematic lookup timed out','err');}
  },20000);
  claude('Firearms technical expert. For the '+g.make+' '+g.model+' ('+g.caliber+' '+(g.type||'')+'), provide detailed field strip and assembly info. Respond ONLY with JSON no markdown: {"assemblySteps":[{"step":1,"title":"title","description":"detail","caution":null}],"disassemblySteps":[{"step":1,"title":"title","description":"detail","caution":null}],"partsList":[{"partNumber":"1","name":"name","description":"function","replaceable":true}],"safetyWarnings":["warning"],"toolsRequired":["tool"],"notes":"notes"} Include 7+ disassembly steps, 7+ assembly steps, 18+ parts.',2500,function(e,txt){
    clearTimeout(timer);if(done)return;done=true;
    if(e){scLoad=false;SCH={_notFound:true,make:g.make,model:g.model};rnd();toast('Could not load schematics','err');}
    else{try{SCH=JSON.parse(txt);}catch(ex){SCH={_notFound:true,make:g.make,model:g.model};}scLoad=false;rnd();}
  });
}

function onPhoto(){
  var files=Array.from(this.files);if(!files.length)return;
  if(!FORM.photos)FORM.photos=FORM.photo?[FORM.photo]:[];
  var remaining=10-FORM.photos.length;
  if(remaining<=0){toast('Maximum 10 photos reached','err');this.value='';return;}
  files=files.slice(0,remaining);
  var loaded=0;
  files.forEach(function(file){
    var r=new FileReader();
    r.onload=function(e){
      FORM.photos.push(e.target.result);
      if(FORM.photos.length>0)FORM.photo=FORM.photos[0];
      loaded++;
      if(loaded===files.length)rnd();
    };
    r.readAsDataURL(file);
  });
  this.value='';
}

function removePhoto(idx){
  if(!FORM.photos)return;
  FORM.photos.splice(idx,1);
  FORM.photo=FORM.photos.length>0?FORM.photos[0]:'';
  rnd();
}

function onSch(){
  var file=this.files[0];if(!file)return;
  var nm=file.name;
  var r=new FileReader();
  r.onload=function(e){
    guns=guns.map(function(g){return g.id===selId?Object.assign({},g,{uploadedSchematic:e.target.result,uploadedSchematicName:nm}):g;});
    sv();rnd();toast('Schematic uploaded');
  };
  r.readAsDataURL(file);this.value='';
}

function remSch(id){
  guns=guns.map(function(g){return g.id===id?Object.assign({},g,{uploadedSchematic:null,uploadedSchematicName:null}):g;});
  sv();rnd();toast('Schematic removed');
}

function schDiagram(sch){
  if(!sch||!sch.partsList) return '<div style="color:#8a95a8;padding:20px">No diagram available</div>';
  var notes = sch.notes||'';
  var isGlock = notes.indexOf('Safe Action')>=0||notes.indexOf('Glock')>=0;
  var isSW = notes.indexOf('J-Frame')>=0||notes.indexOf('J-frame')>=0||notes.indexOf('revolver')>=0;
  var is870 = notes.indexOf('870')>=0||notes.indexOf('best-selling shotgun')>=0;
  var isMoss = notes.indexOf('500/590')>=0||notes.indexOf('Mossberg')>=0;
  var is1911 = notes.indexOf('1911')>=0&&(notes.indexOf('pistol')>=0||notes.indexOf('Pistol')>=0);
  var is1022 = notes.indexOf('10/22')>=0||notes.indexOf('rotary magazine')>=0;

  if(isGlock) return svgGlock();
  if(isSW) return svgJFrame();
  if(is870) return svg870();
  if(isMoss) return svgMoss();
  if(is1911) return svg1911();
  if(is1022) return svg1022();
  return svgGeneric(sch);
}

function svgWrap(w,h,inner){
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;background:#13161d;border-radius:8px;padding:10px">'+
    '<style>.lbl{font:bold 11px monospace;fill:#f0f2f5}.sub{font:10px monospace;fill:#8a95a8}.gold{fill:#e8c46a}.line{stroke:#e8c46a;stroke-width:1;fill:none}.part{fill:#2a3a50;stroke:#3a5070;stroke-width:1.5}.hi{fill:#1e3050;stroke:#e8c46a;stroke-width:1.5}</style>'+
    inner+'</svg>';
}

function callout(x,y,lx,ly,num,label){
  var dx = lx>x?8:-8;
  return '<line x1="'+x+'" y1="'+y+'" x2="'+lx+'" y2="'+ly+'" class="line"/>'
    +'<circle cx="'+lx+'" cy="'+ly+'" r="10" fill="#e8c46a22" stroke="#e8c46a" stroke-width="1"/>'
    +'<text x="'+lx+'" y="'+(ly+4)+'" text-anchor="middle" class="lbl gold">'+num+'</text>'
    +'<text x="'+(lx+dx+( lx>x?2:-2))+'" y="'+(ly+4)+'" text-anchor="'+(lx>x?'start':'end')+'" class="lbl">'+label+'</text>';
}

function svgGeneric(sch){
  // Generic labeled diagram using actual parts list
  var parts = sch.partsList||[];
  var s='';
  s+='<rect x="20" y="20" width="340" height="160" rx="8" class="part"/>';
  s+='<text x="190" y="50" text-anchor="middle" style="font:bold 14px monospace;fill:#e8c46a">Parts Reference</text>';
  var cols = [60,230];
  var perCol = Math.ceil(Math.min(parts.length,20)/2);
  parts.slice(0,20).forEach(function(p,i){
    var col = i<perCol?0:1;
    var row = i<perCol?i:i-perCol;
    var x=cols[col], y=70+row*13;
    s+='<circle cx="'+(x-12)+'" cy="'+(y-3)+'" r="6" fill="#e8c46a22" stroke="#e8c46a" stroke-width="1"/>';
    s+='<text x="'+(x-12)+'" y="'+(y+1)+'" text-anchor="middle" style="font:bold 9px monospace;fill:#e8c46a">'+(p.partNumber||i+1)+'</text>';
    s+='<text x="'+x+'" y="'+y+'" style="font:10px monospace;fill:#d0d8e8">'+p.name.substring(0,22)+'</text>';
  });
  if(parts.length>20){
    s+='<text x="190" y="195" text-anchor="middle" class="sub">...and '+(parts.length-20)+' more parts — see Parts List tab</text>';
  }
  return svgWrap(380,210,s);
}

// ── LIGHTBOX ─────────────────────────────────────────────────────────
function openLb(photos, idx){
  lbPhotos = photos;
  lbIdx = idx||0;
  showLb();
}

function showLb(){
  var existing = document.getElementById('lightbox');
  if(existing) existing.remove();
  if(!lbPhotos||!lbPhotos.length) return;
  var lb = document.createElement('div');
  lb.id = 'lightbox';
  lb.className = 'lightbox';
  lb.onclick = function(e){ if(e.target===lb) closeLb(); };
  lb.innerHTML =
    '<img src="'+lbPhotos[lbIdx]+'" alt="Photo '+(lbIdx+1)+'"/>'+
    '<div class="lightbox-nav">'+
    (lbPhotos.length>1?'<button class="lb-btn" onclick="lbPrev()">&#8592;</button>':'')+
    '<span class="lb-counter">'+(lbIdx+1)+' / '+lbPhotos.length+'</span>'+
    (lbPhotos.length>1?'<button class="lb-btn" onclick="lbNext()">&#8594;</button>':'')+
    '<button class="lb-btn" onclick="closeLb()" style="margin-left:10px;color:#ff7070">✕ Close</button>'+
    '</div>';
  document.body.appendChild(lb);
}

function lbNext(){
  lbIdx = (lbIdx+1) % lbPhotos.length;
  showLb();
}

function lbPrev(){
  lbIdx = (lbIdx-1+lbPhotos.length) % lbPhotos.length;
  showLb();
}

function closeLb(){
  var lb = document.getElementById('lightbox');
  if(lb) lb.remove();
}

// Keyboard nav for lightbox
document.addEventListener('keydown', function(e){
  if(!document.getElementById('lightbox')) return;
  if(e.key==='ArrowRight') lbNext();
  else if(e.key==='ArrowLeft') lbPrev();
  else if(e.key==='Escape') closeLb();
});

// ── BACKUP & RESTORE ─────────────────────────────────────────────────

function clearAllData(){
  if(!confirm('Delete ALL firearms from inventory? This cannot be undone.\n\nTip: tap Backup first to save your data.'))return;
  guns=[];
  // Clear IndexedDB
  openDB(function(db){
    if(db){
      try{
        var tx=db.transaction([STORE],'readwrite');
        tx.objectStore(STORE).clear();
      }catch(e){}
    }
  });
  // Clear localStorage too
  try{localStorage.removeItem(SK);}catch(e){}
  try{sessionStorage.removeItem(SK);}catch(e){}
  window._gunBackup=null;
  haptic('delete');toast('All data cleared');
  rnd();
}

function backupData(){
  var collName=collections[activeCollection]?collections[activeCollection].name:'My Collection';
  var data={guns:guns,customPrices:customPrices,version:SK,exported:new Date().toISOString(),collectionName:collName};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='arsenal_vault_'+collName.replace(/[^a-z0-9]/gi,'_')+'_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup saved to Downloads');
}

function restoreData(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!data.guns||!Array.isArray(data.guns)){
        toast('Invalid backup file','err');
        return;
      }

      var count=data.guns.length;

      // Ask how to import
      var modal=document.createElement('div');
      modal.id='import_modal';
      modal.style.cssText='position:fixed;inset:0;background:#000000cc;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
      modal.innerHTML='<div style="background:#222835;border:2px solid #e8c46a40;border-radius:12px;padding:24px;max-width:340px;width:100%">'
        +'<div style="font-size:16px;font-weight:700;color:#e8c46a;margin-bottom:6px">&#128194; Import Backup</div>'
        +'<div style="font-size:13px;color:#8a95a8;margin-bottom:18px">Found '+count+' firearm'+(count!==1?'s':'')+' in this backup file.</div>'
        +'<div style="margin-bottom:14px">'
          +'<div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8a95a8;font-weight:600;margin-bottom:6px">Collection Name</div>'
          +'<input id="import_name" type="text" placeholder="e.g. John\'s Collection" value="'+(data.collectionName||'Imported Collection')+'" style="width:100%;background:#13161d;border:2px solid #3a4455;border-radius:6px;color:#f0f2f5;padding:11px 12px;font-size:14px;outline:none;font-family:inherit"/>'
        +'</div>'
        +'<div style="background:#1a1d24;border:1px solid #2e3545;border-radius:8px;padding:12px;margin-bottom:16px">'
          +'<div style="font-size:12px;color:#8a95a8;margin-bottom:8px">Import as:</div>'
          +'<label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:8px">'
            +'<input type="radio" name="import_mode" value="new" checked style="accent-color:#e8c46a;width:16px;height:16px"/>'
            +'<div><div style="font-size:13px;font-weight:600;color:#f0f2f5">New Collection</div><div style="font-size:11px;color:#4a5568">Creates a separate collection — your data is safe</div></div>'
          +'</label>'
          +'<label style="display:flex;align-items:center;gap:10px;cursor:pointer">'
            +'<input type="radio" name="import_mode" value="replace" style="accent-color:#ff7070;width:16px;height:16px"/>'
            +'<div><div style="font-size:13px;font-weight:600;color:#ff7070">Replace Current Collection</div><div style="font-size:11px;color:#4a5568">Overwrites "'+( collections[activeCollection]?collections[activeCollection].name:'current')+'" — cannot be undone</div></div>'
          +'</label>'
        +'</div>'
        +'<div style="display:flex;flex-direction:column;gap:8px">'
          +'<button onclick="doImport('+JSON.stringify(data).replace(/'/g,"&#39;")+')" style="background:#e8c46a;color:#1a1d24;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">Import</button>'
          +'<button onclick="document.getElementById(\'import_modal\').remove()" style="background:transparent;border:1px solid #3a4455;color:#8a95a8;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button>'
        +'</div>'
        +'</div>';
      modal.onclick=function(e){if(e.target===modal)modal.remove();};
      document.body.appendChild(modal);

    }catch(ex){toast('Could not read backup file','err');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function doImport(data){
  var nameEl=document.getElementById('import_name');
  var modeEl=document.querySelector('input[name="import_mode"]:checked');
  var name=nameEl?nameEl.value.trim():'Imported Collection';
  var mode=modeEl?modeEl.value:'new';

  if(!name) name='Imported Collection';

  var m=document.getElementById('import_modal');
  if(m) m.remove();

  if(mode==='new'){
    // Create new collection
    var id='coll_'+Date.now().toString(36);
    collections[id]={name:name,created:new Date().toISOString()};
    saveCollections();

    // Save current collection first
    saveGunsToCollection(activeCollection);

    // Switch to new collection with imported guns
    activeCollection=id;
    try{localStorage.setItem('av_active_coll',id);}catch(e){}
    guns=data.guns;
    if(data.customPrices) customPrices=data.customPrices;
    sv();
    milestones={};totalCleanings=0;transferredGuns=[];
    loadMilestones();loadTransferred();
    haptic('save');
    toast('Imported '+guns.length+' firearms into "'+name+'"');
    VIEW='dashboard';
    rnd();
  } else {
    // Replace current collection
    if(!confirm('Replace all firearms in "'+collections[activeCollection].name+'" with '+data.guns.length+' firearms from backup? This cannot be undone.')) return;
    guns=data.guns;
    if(data.customPrices) customPrices=data.customPrices;
    sv();
    haptic('save');
    toast('Restored '+guns.length+' firearms');
    VIEW='dashboard';
    rnd();
  }
}
